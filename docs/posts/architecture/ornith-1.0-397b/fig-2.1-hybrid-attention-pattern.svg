<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" width="1100" height="480" font-family="Courier New, monospace">
  <!-- =========== Fig 2.1: Hybrid Attention Pattern (3:1) =========== -->
  <text x="550" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3a6e">Hybrid Attention Layer Pattern (3:1)</text>
  <text x="550" y="46" text-anchor="middle" font-size="11" fill="#888">60 layers = 15 groups × (3 linear_attention + 1 full_attention) · full_attention_interval = 4</text>

  <defs>
    <marker id="fig21-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>

  <!-- ============ LEFT: Layer index axis ============ -->
  <line x1="80" y1="80" x2="80" y2="380" stroke="#000" stroke-width="1.2"/>
  <polygon points="76,80 80,70 84,80" fill="#000"/>
  <text x="40" y="225" font-size="10" fill="#000" transform="rotate(-90 40 225)">layer_idx (bottom → top)</text>

  <!-- Layer index labels -->
  <text x="70" y="386" text-anchor="end" font-size="9" fill="#000">L0</text>
  <text x="70" y="298" text-anchor="end" font-size="9" fill="#000">L20</text>
  <text x="70" y="210" text-anchor="end" font-size="9" fill="#000">L40</text>
  <text x="70" y="84" text-anchor="end" font-size="9" fill="#000">L59</text>

  <!-- ============ Stack visualization: 60 cells in 15 groups ============ -->
  <!-- Total stack height = 300, distributed over 60 cells = 5px each, but we group 4 -->
  <!-- Group height = 20px (4 cells × 4.5px + 2 gap), 15 groups total = 300px+ -->
  <!-- Cell width = 28px, group width = 4*28 + 3 = 115px -->

  <!-- Use single column visualization, 60 stacked cells -->
  <!-- Group width: 540px, group height: 300px, each cell ~5px -->
  <!-- Better: show as 15 rows × 4 cols grid -->

  <text x="400" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">60 Layers as 15 Groups (Group = 4 layers)</text>

  <!-- Grid: 15 rows × 4 columns -->
  <!-- Start: x=120, y=110; row height 18, col width 80 -->
  <!-- col 0-2 = linear (light dashed), col 3 = full (dark solid) -->

  <g font-size="9" fill="#000">
    <!-- Header row -->
    <text x="160" y="106" text-anchor="middle" font-size="9" fill="#888">slot 0</text>
    <text x="240" y="106" text-anchor="middle" font-size="9" fill="#888">slot 1</text>
    <text x="320" y="106" text-anchor="middle" font-size="9" fill="#888">slot 2</text>
    <text x="400" y="106" text-anchor="middle" font-size="9" fill="#888">slot 3</text>
    <text x="500" y="106" font-size="9" fill="#888">→ layer idx (mod 4)</text>
  </g>

  <!-- 15 group rows -->
  <!-- row y centers: 124, 142, 160, 178, 196, 214, 232, 250, 268, 286, 304, 322, 340, 358, 376 -->
  <!-- That's 15 rows × 18px = 270, starting y=120, ending y=390 -->

  <!-- Helper inline: each row is a <g transform="translate(0,y)"> -->
  <!-- Row 1 (L0-3) -->
  <g transform="translate(0,120)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G1</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,138)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G2</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,156)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G3</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,174)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G4</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,192)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G5</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>

  <!-- G6..G10 collapsed into ellipsis -->
  <g transform="translate(0,210)">
    <text x="200" y="11" text-anchor="middle" font-size="14" fill="#888">. . .</text>
    <text x="320" y="11" text-anchor="middle" font-size="14" fill="#888">. . .</text>
    <text x="400" y="11" text-anchor="middle" font-size="14" fill="#888">. . .</text>
  </g>

  <g transform="translate(0,228)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G11</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,246)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G12</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,264)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G13</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,282)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G14</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>
  <g transform="translate(0,300)">
    <text x="110" y="13" text-anchor="end" font-size="9" fill="#000">G15</text>
    <rect x="120" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="160" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="200" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="240" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="280" y="0" width="80" height="14" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="320" y="11" text-anchor="middle" font-size="9" fill="#4a7ab0">linear</text>
    <rect x="360" y="0" width="80" height="14" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="400" y="11" text-anchor="middle" font-size="9" fill="#fff">FULL</text>
  </g>

  <!-- Summary counts box -->
  <g transform="translate(120,335)">
    <rect x="0" y="0" width="320" height="50" fill="none" stroke="#000" stroke-width="1"/>
    <text x="160" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">TOTAL COUNT</text>
    <text x="20" y="30" font-size="10" fill="#4a7ab0">linear_attention: 45 (75%)</text>
    <text x="20" y="44" font-size="10" fill="#1a3a6e">full_attention:  15 (25%)</text>
    <text x="180" y="30" font-size="10" fill="#000">3:1 ratio</text>
    <text x="180" y="44" font-size="10" fill="#000">interval = 4</text>
  </g>

  <!-- ============ RIGHT: Complexity comparison ============ -->
  <g transform="translate(540,100)">
    <text x="160" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a6e">Per-Layer Mixer Comparison</text>

    <!-- linear_attention box -->
    <rect x="0" y="14" width="160" height="180" fill="none" stroke="#4a7ab0" stroke-width="1.4" stroke-dasharray="3 2"/>
    <text x="80" y="32" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a7ab0">linear_attention</text>
    <text x="80" y="46" text-anchor="middle" font-size="9" fill="#888">(Gated DeltaNet)</text>

    <text x="10" y="68" font-size="9" fill="#000">Type: linear recurrency</text>
    <text x="10" y="82" font-size="9" fill="#000">Params (this layer):</text>
    <text x="20" y="96" font-size="9" fill="#000">· key_head=16 × dim 128</text>
    <text x="20" y="110" font-size="9" fill="#000">· value_head=64 × dim 128</text>
    <text x="20" y="124" font-size="9" fill="#000">· conv_kernel_dim = 4</text>

    <text x="10" y="142" font-size="9" font-weight="bold" fill="#000">Complexity:</text>
    <text x="10" y="158" font-size="11" fill="#b8721a" font-weight="bold">  O(n · d)</text>
    <text x="10" y="174" font-size="9" fill="#888">constant memory in seq</text>
    <text x="10" y="188" font-size="9" fill="#888">gate = sigmoid</text>

    <!-- full_attention box -->
    <rect x="180" y="14" width="160" height="180" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.4"/>
    <text x="260" y="32" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">full_attention</text>
    <text x="260" y="46" text-anchor="middle" font-size="9" fill="#fff">(GQA + RoPE + sigmoid Q-gate)</text>

    <text x="190" y="68" font-size="9" fill="#fff">Type: MHA with GQA</text>
    <text x="190" y="82" font-size="9" fill="#fff">Params (this layer):</text>
    <text x="200" y="96" font-size="9" fill="#fff">· num_Q_heads = 32</text>
    <text x="200" y="110" font-size="9" fill="#fff">· num_KV_heads = 2</text>
    <text x="200" y="124" font-size="9" fill="#fff">· head_dim = 256</text>

    <text x="190" y="142" font-size="9" font-weight="bold" fill="#fff">Complexity:</text>
    <text x="190" y="158" font-size="11" fill="#fff" font-weight="bold">  O(n² · d)</text>
    <text x="190" y="174" font-size="9" fill="#fff">full pairwise attention</text>
    <text x="190" y="188" font-size="9" fill="#fff">attn_output_gate = on</text>
  </g>

  <!-- Connector arrow from grid to comparison -->
  <line x1="450" y1="180" x2="540" y2="180" stroke="#000" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#fig21-arrow)"/>
  <text x="495" y="174" text-anchor="middle" font-size="9" fill="#888">per layer</text>

  <!-- ============ LEGEND (bottom-left) ============ -->
  <g transform="translate(20,400)">
    <rect x="0" y="0" width="380" height="68" fill="none" stroke="#000" stroke-width="1"/>
    <text x="10" y="16" font-size="11" font-weight="bold" fill="#1a3a6e">LEGEND</text>

    <rect x="10" y="22" width="14" height="10" fill="none" stroke="#4a7ab0" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="30" y="31" font-size="10" fill="#4a7ab0">linear_attention (GDN)</text>

    <rect x="180" y="22" width="14" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="200" y="31" font-size="10" fill="#1a3a6e">full_attention (MHA+GQA)</text>

    <text x="10" y="47" font-size="10" fill="#b8721a">orange text = complexity order</text>
    <text x="10" y="61" font-size="10" fill="#000">every 4th layer is full_attention (interval=4)</text>
  </g>
</svg>
