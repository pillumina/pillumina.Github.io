<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" width="1080" height="700" font-family="Courier New, monospace">
  <!-- =========== Fig 4.1: Self-Scaffolding RL (training method, not network) =========== -->
  <text x="540" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3a6e">Self-Scaffolding RL — Two-Stage Training Loop</text>
  <text x="540" y="46" text-anchor="middle" font-size="11" fill="#888">TRAINING METHOD (not architecture). Joint optimization of scaffold author + solution generator · staleness-weighted token-level GRPO</text>

  <defs>
    <marker id="fig41-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="fig41-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8721a"/>
    </marker>
    <marker id="fig41-arrow-grad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8721a"/>
    </marker>
  </defs>

  <!-- ============ TOP: Task input ============ -->
  <rect x="440" y="68" width="200" height="46" fill="none" stroke="#000" stroke-width="1.4"/>
  <text x="540" y="89" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Task Input</text>
  <text x="540" y="105" text-anchor="middle" font-size="9" fill="#888">coding task description</text>

  <!-- Fan out to both stages -->
  <line x1="540" y1="114" x2="540" y2="135" stroke="#000" stroke-width="1.2"/>
  <line x1="200" y1="135" x2="880" y2="135" stroke="#000" stroke-width="1.2"/>
  <line x1="200" y1="135" x2="200" y2="160" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>
  <line x1="880" y1="135" x2="880" y2="160" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>

  <!-- ============ STAGE 1 (left): Scaffold Refinement ============ -->
  <g>
    <rect x="40" y="160" width="380" height="240" fill="none" stroke="#1a3a6e" stroke-width="1.6"/>
    <text x="230" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a6e">STAGE 1 — Scaffold Refinement</text>
    <text x="230" y="194" text-anchor="middle" font-size="9" fill="#888">(policy also acts as scaffold author)</text>

    <!-- Inputs to Stage 1 -->
    <rect x="60" y="210" width="120" height="50" fill="none" stroke="#000" stroke-width="1"/>
    <text x="120" y="228" text-anchor="middle" font-size="10" fill="#000">task</text>
    <text x="120" y="244" text-anchor="middle" font-size="9" fill="#888">description</text>

    <rect x="200" y="210" width="200" height="50" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="300" y="228" text-anchor="middle" font-size="10" fill="#000">previous scaffold</text>
    <text x="300" y="244" text-anchor="middle" font-size="9" fill="#888">(from last iter on this task)</text>

    <!-- Model box -->
    <line x1="230" y1="260" x2="230" y2="285" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>

    <rect x="100" y="290" width="260" height="46" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.4"/>
    <text x="230" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Ornith-1.0 Policy π_θ</text>
    <text x="230" y="326" text-anchor="middle" font-size="9" fill="#fff">(same weights, scaffold mode)</text>

    <!-- Output: refined scaffold -->
    <line x1="230" y1="336" x2="230" y2="360" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>

    <rect x="100" y="362" width="260" height="34" fill="none" stroke="#b8721a" stroke-width="1.4"/>
    <text x="230" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="#b8721a">refined scaffold s_t</text>
  </g>

  <!-- Bridge: refined scaffold flows to Stage 2 -->
  <line x1="420" y1="379" x2="460" y2="379" stroke="#000" stroke-width="1.4"/>
  <line x1="460" y1="379" x2="460" y2="245" stroke="#000" stroke-width="1.4"/>
  <line x1="460" y1="245" x2="610" y2="245" stroke="#000" stroke-width="1.4" marker-end="url(#fig41-arrow)"/>

  <text x="490" y="320" font-size="10" fill="#000" font-style="italic">s_t feeds</text>
  <text x="490" y="334" font-size="10" fill="#000" font-style="italic">Stage 2</text>

  <!-- ============ STAGE 2 (right): Solution Rollout ============ -->
  <g>
    <rect x="620" y="160" width="420" height="240" fill="none" stroke="#1a3a6e" stroke-width="1.6"/>
    <text x="830" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a6e">STAGE 2 — Solution Rollout</text>
    <text x="830" y="194" text-anchor="middle" font-size="9" fill="#888">(policy generates solution conditioned on refined scaffold)</text>

    <!-- Inputs to Stage 2 -->
    <rect x="640" y="210" width="170" height="50" fill="none" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="3 2"/>
    <text x="725" y="228" text-anchor="middle" font-size="10" fill="#000">refined scaffold s_t</text>
    <text x="725" y="244" text-anchor="middle" font-size="9" fill="#888">(from Stage 1)</text>

    <rect x="820" y="210" width="200" height="50" fill="none" stroke="#000" stroke-width="1"/>
    <text x="920" y="228" text-anchor="middle" font-size="10" fill="#000">task description</text>
    <text x="920" y="244" text-anchor="middle" font-size="9" fill="#888">(same task as Stage 1)</text>

    <!-- Model box -->
    <line x1="830" y1="260" x2="830" y2="285" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>

    <rect x="700" y="290" width="260" height="46" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.4"/>
    <text x="830" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Ornith-1.0 Policy π_θ</text>
    <text x="830" y="326" text-anchor="middle" font-size="9" fill="#fff">(same weights, rollout mode)</text>

    <!-- Output: rollout -->
    <line x1="830" y1="336" x2="830" y2="360" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>

    <rect x="700" y="362" width="120" height="34" fill="none" stroke="#000" stroke-width="1"/>
    <text x="760" y="383" text-anchor="middle" font-size="10" fill="#000">solution rollout τ_t</text>

    <!-- Environment -->
    <line x1="820" y1="379" x2="845" y2="379" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>

    <rect x="845" y="362" width="120" height="34" fill="none" stroke="#4a7ab0" stroke-width="1.2"/>
    <text x="905" y="378" text-anchor="middle" font-size="10" fill="#4a7ab0">Sandbox Env</text>
    <text x="905" y="390" text-anchor="middle" font-size="9" fill="#888">tools + tests</text>
  </g>

  <!-- Reward signal: comes out of environment, fans out to both stages -->
  <line x1="905" y1="396" x2="905" y2="440" stroke="#b8721a" stroke-width="1.6" marker-end="url(#fig41-arrow-orange)"/>

  <rect x="820" y="442" width="170" height="34" fill="none" stroke="#b8721a" stroke-width="1.6"/>
  <text x="905" y="463" text-anchor="middle" font-size="11" font-weight="bold" fill="#b8721a">Reward r_t</text>

  <!-- Reward fans out as gradient signal to both Stage 1 and Stage 2 -->
  <line x1="905" y1="476" x2="905" y2="495" stroke="#b8721a" stroke-width="1.4" stroke-dasharray="5 3"/>
  <line x1="200" y1="495" x2="905" y2="495" stroke="#b8721a" stroke-width="1.4" stroke-dasharray="5 3"/>
  <line x1="200" y1="495" x2="200" y2="478" stroke="#b8721a" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#fig41-arrow-grad)"/>
  <line x1="830" y1="495" x2="830" y2="478" stroke="#b8721a" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#fig41-arrow-grad)"/>

  <text x="500" y="490" text-anchor="middle" font-size="10" fill="#b8721a" font-style="italic">∇θ (joint; same reward reaches both stages)</text>

  <text x="135" y="473" font-size="9" fill="#b8721a" font-style="italic">grad → Stage 1</text>
  <text x="730" y="473" font-size="9" fill="#b8721a" font-style="italic">grad → Stage 2</text>

  <!-- ============ BOTTOM: 3-Layer Reward Hacking Defense ============ -->
  <text x="540" y="525" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a6e">3-Layer Reward Hacking Defense (always active)</text>

  <!-- Layer 1: Trust boundary -->
  <rect x="40" y="540" width="320" height="80" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="200" y="558" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Layer 1 — Outer Trust Boundary</text>
  <text x="200" y="574" text-anchor="middle" font-size="9" fill="#888">(immutable, outside model reach)</text>
  <text x="55" y="591" font-size="9" fill="#000">· environment, tool surface, test isolation</text>
  <text x="55" y="604" font-size="9" fill="#000">· model can only evolve inner policy scaffold</text>
  <text x="55" y="617" font-size="9" fill="#000">  (memory, error-handling, orchestration)</text>

  <!-- Layer 2: Deterministic monitor -->
  <rect x="380" y="540" width="320" height="80" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="540" y="558" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Layer 2 — Deterministic Monitor</text>
  <text x="540" y="574" text-anchor="middle" font-size="9" fill="#888">(exact spec, no LLM)</text>
  <text x="395" y="591" font-size="9" fill="#000">· flags read-blocked-path / modify-verify</text>
  <text x="395" y="604" font-size="9" fill="#000">· flags calls outside approved tool surface</text>
  <text x="395" y="617" font-size="9" fill="#000">· zero reward + excluded from advantage</text>

  <!-- Layer 3: Frozen LLM judge -->
  <rect x="720" y="540" width="320" height="80" fill="none" stroke="#b8721a" stroke-width="1.4"/>
  <text x="880" y="558" text-anchor="middle" font-size="11" font-weight="bold" fill="#b8721a">Layer 3 — Frozen LLM Judge</text>
  <text x="880" y="574" text-anchor="middle" font-size="9" fill="#888">(veto, not primary reward)</text>
  <text x="735" y="591" font-size="9" fill="#000">· covers intent-layer gaming</text>
  <text x="735" y="604" font-size="9" fill="#000">· acts entirely within approved surface</text>
  <text x="735" y="617" font-size="9" fill="#000">· frozen weights (no RL pressure)</text>

  <!-- ============ LEGEND (bottom-left) ============ -->
  <g transform="translate(40,635)">
    <rect x="0" y="0" width="540" height="55" fill="none" stroke="#000" stroke-width="1"/>
    <text x="10" y="16" font-size="11" font-weight="bold" fill="#1a3a6e">LEGEND</text>

    <rect x="10" y="22" width="14" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
    <text x="30" y="31" font-size="10" fill="#000">policy / structural</text>

    <rect x="160" y="22" width="14" height="10" fill="none" stroke="#b8721a" stroke-width="1.4"/>
    <text x="180" y="31" font-size="10" fill="#b8721a">refined scaffold / reward</text>

    <rect x="340" y="22" width="14" height="10" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="360" y="31" font-size="10" fill="#888">previous scaffold</text>

    <line x1="10" y1="46" x2="24" y2="46" stroke="#000" stroke-width="1.2" marker-end="url(#fig41-arrow)"/>
    <text x="30" y="49" font-size="10" fill="#000">forward data flow</text>

    <line x1="160" y1="46" x2="174" y2="46" stroke="#b8721a" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#fig41-arrow-grad)"/>
    <text x="180" y="49" font-size="10" fill="#b8721a">gradient / reward signal</text>

    <rect x="340" y="42" width="14" height="10" fill="none" stroke="#4a7ab0" stroke-width="1.2"/>
    <text x="360" y="49" font-size="10" fill="#4a7ab0">environment / sandbox</text>
  </g>
</svg>
