<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 580" width="1160" height="580" font-family="Courier New, monospace">
  <defs>
    <marker id="fig31-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="fig31-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8721a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="580" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3a6e">MoE Routing Topology (per token)</text>
  <text x="580" y="46" text-anchor="middle" font-size="10" fill="#888">512 routed experts × top-10 (softmax + renormalize) + 1 always-on shared expert · sigmoid-gated</text>

  <!-- ========== STAGE 1: Token input ========== -->
  <rect x="30" y="270" width="100" height="50" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="80" y="290" text-anchor="middle" font-size="11" fill="#000">Token hidden</text>
  <text x="80" y="306" text-anchor="middle" font-size="9" fill="#888">[hidden=4096]</text>

  <!-- Main forward arrow to router -->
  <line x1="130" y1="295" x2="170" y2="295" stroke="#000" stroke-width="1.2" marker-end="url(#fig31-arrow)"/>

  <!-- ========== STAGE 2: Router (4 steps vertical) ========== -->
  <rect x="170" y="175" width="175" height="240" fill="none" stroke="#1a3a6e" stroke-width="1.6"/>
  <text x="257" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Qwen3_5MoeTopKRouter</text>
  <text x="257" y="212" text-anchor="middle" font-size="9" fill="#888">weight: [512, 4096]</text>

  <!-- Step 1: score -->
  <rect x="182" y="222" width="150" height="32" fill="none" stroke="#000" stroke-width="1"/>
  <text x="257" y="242" text-anchor="middle" font-size="10" fill="#000">1. score = h·Wᵀ</text>
  <text x="257" y="252" text-anchor="middle" font-size="9" fill="#888">router_logits [n,512]</text>

  <!-- Step 2: softmax -->
  <rect x="182" y="260" width="150" height="32" fill="none" stroke="#000" stroke-width="1"/>
  <text x="257" y="280" text-anchor="middle" font-size="10" fill="#000">2. softmax (fp32)</text>
  <text x="257" y="290" text-anchor="middle" font-size="9" fill="#888">probs over 512 exp</text>

  <!-- Step 3: top-k -->
  <rect x="182" y="298" width="150" height="32" fill="none" stroke="#000" stroke-width="1"/>
  <text x="257" y="318" text-anchor="middle" font-size="10" fill="#000">3. top-k (k=10)</text>
  <text x="257" y="328" text-anchor="middle" font-size="9" fill="#888">keep 10 highest probs</text>

  <!-- Step 4: renormalize -->
  <rect x="182" y="336" width="150" height="32" fill="none" stroke="#000" stroke-width="1"/>
  <text x="257" y="356" text-anchor="middle" font-size="10" fill="#000">4. renormalize</text>
  <text x="257" y="366" text-anchor="middle" font-size="9" fill="#888">w_i = w_i / Σw</text>

  <!-- Annotation -->
  <text x="257" y="402" text-anchor="middle" font-size="9" fill="#b8721a" font-style="italic">softmax (NOT sigmoid)</text>

  <!-- Router output arrow to expert pool -->
  <line x1="345" y1="295" x2="385" y2="295" stroke="#000" stroke-width="1.2" marker-end="url(#fig31-arrow)"/>

  <!-- ========== STAGE 3: Expert Pool ========== -->
  <text x="600" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Expert Pool (512 routed experts)</text>
  <text x="600" y="145" text-anchor="middle" font-size="9" fill="#888">32 cols × 16 rows = 512 · intermediate=1024 each · SiLU-gated MLP</text>

  <!-- Grid: 32 cols × 16 rows, each cell 10×10px → 320×160 px -->
  <g transform="translate(440,155)" shape-rendering="crispEdges">
    <!-- Background rect for all 512 cells -->
    <rect x="0" y="0" width="320" height="160" fill="none" stroke="#888" stroke-width="0.6"/>

    <!-- 10 selected expert cells (highlighted) -->
    <!-- Row 0 (idx 0-31): sel 7 (col 7), sel 23 (col 23) -->
    <rect x="70"  y="0" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <rect x="230" y="0" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 1 (idx 32-63): sel 41 (col 9) -->
    <rect x="90"  y="10" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 2 (idx 64-95): sel 88 (col 24) -->
    <rect x="240" y="20" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 4 (idx 128-159): sel 142 (col 14) -->
    <rect x="140" y="40" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 5 (idx 160-191): sel 178 (col 18) -->
    <rect x="180" y="50" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 6 (idx 192-223): sel 211 (col 19) -->
    <rect x="190" y="60" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 9 (idx 288-319): sel 304 (col 16) -->
    <rect x="160" y="90" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 12 (idx 384-415): sel 399 (col 15) -->
    <rect x="150" y="120" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <!-- Row 14 (idx 448-479): sel 471 (col 23) -->
    <rect x="230" y="140" width="10" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>

    <!-- Grid lines: rows -->
    <line x1="0" y1="10" x2="320" y2="10" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="20" x2="320" y2="20" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="30" x2="320" y2="30" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="40" x2="320" y2="40" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="50" x2="320" y2="50" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="60" x2="320" y2="60" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="70" x2="320" y2="70" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="80" x2="320" y2="80" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="90" x2="320" y2="90" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="100" x2="320" y2="100" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="110" x2="320" y2="110" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="120" x2="320" y2="120" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="130" x2="320" y2="130" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="140" x2="320" y2="140" stroke="#888" stroke-width="0.4"/>
    <line x1="0" y1="150" x2="320" y2="150" stroke="#888" stroke-width="0.4"/>
    <!-- Grid lines: cols -->
    <line x1="10" y1="0" x2="10" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="20" y1="0" x2="20" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="30" y1="0" x2="30" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="40" y1="0" x2="40" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="50" y1="0" x2="50" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="60" y1="0" x2="60" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="70" y1="0" x2="70" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="80" y1="0" x2="80" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="90" y1="0" x2="90" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="100" y1="0" x2="100" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="110" y1="0" x2="110" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="120" y1="0" x2="120" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="130" y1="0" x2="130" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="140" y1="0" x2="140" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="150" y1="0" x2="150" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="160" y1="0" x2="160" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="170" y1="0" x2="170" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="180" y1="0" x2="180" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="190" y1="0" x2="190" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="200" y1="0" x2="200" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="210" y1="0" x2="210" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="220" y1="0" x2="220" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="230" y1="0" x2="230" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="240" y1="0" x2="240" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="250" y1="0" x2="250" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="260" y1="0" x2="260" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="270" y1="0" x2="270" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="280" y1="0" x2="280" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="290" y1="0" x2="290" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="300" y1="0" x2="300" y2="160" stroke="#888" stroke-width="0.4"/>
    <line x1="310" y1="0" x2="310" y2="160" stroke="#888" stroke-width="0.4"/>

    <text x="160" y="178" text-anchor="middle" font-size="10" fill="#888">[ 512 routed experts · 32 cols × 16 rows · 10 selected (dark) ]</text>
  </g>

  <!-- ========== STAGE 4: Aggregation ========== -->
  <!-- Arrow from expert pool right edge to aggregation -->
  <line x1="760" y1="235" x2="800" y2="235" stroke="#000" stroke-width="1.2" marker-end="url(#fig31-arrow)"/>

  <rect x="800" y="180" width="165" height="130" fill="none" stroke="#1a3a6e" stroke-width="1.6"/>
  <text x="882" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Aggregation</text>
  <text x="882" y="216" text-anchor="middle" font-size="9" fill="#888">Σ w_i · expert_i(x)</text>

  <text x="812" y="240" font-size="9" fill="#000">expert_output =</text>
  <text x="812" y="254" font-size="9" fill="#000">  Σ_i w_i·FFN_i(x)</text>
  <text x="812" y="268" font-size="9" fill="#888">  (top-10 only)</text>

  <text x="812" y="290" font-size="9" fill="#b8721a" font-style="italic">+ shared_expert(x)</text>
  <text x="812" y="300" font-size="9" fill="#b8721a" font-style="italic">  × σ(gate(x))</text>

  <!-- ========== SHARED EXPERT PATH (bottom, clean: no crossing arrows) ========== -->
  <!-- Branch off from token output, go down to shared expert, then up to aggregation -->
  <g stroke="#b8721a" stroke-width="1.2" stroke-dasharray="4 3" fill="none">
    <!-- Vertical from token -->
    <line x1="80" y1="320" x2="80" y2="460"/>
    <line x1="80" y1="460" x2="310" y2="460" marker-end="url(#fig31-arrow-orange)"/>
  </g>
  <text x="180" y="452" font-size="9" fill="#b8721a" font-style="italic">always-on path</text>

  <!-- Shared expert block centered on its path -->
  <rect x="310" y="425" width="190" height="70" fill="none" stroke="#b8721a" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="405" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#b8721a">Shared Expert</text>
  <text x="405" y="462" text-anchor="middle" font-size="9" fill="#000">intermediate=1024</text>
  <text x="405" y="476" text-anchor="middle" font-size="9" fill="#888">runs on every token</text>
  <text x="405" y="490" text-anchor="middle" font-size="9" fill="#888">gate = σ(linear(h))</text>

  <!-- Arrow from shared expert around grid to aggregation -->
  <!-- Route: up from shared expert right edge, right past grid, then up to aggregation -->
  <line x1="500" y1="425" x2="500" y2="370" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="500" y1="370" x2="790" y2="370" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="790" y1="370" x2="790" y2="240" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="790" y1="240" x2="800" y2="240" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#fig31-arrow-orange)"/>

  <!-- Arrow from aggregation to output -->
  <line x1="965" y1="245" x2="1005" y2="245" stroke="#000" stroke-width="1.2" marker-end="url(#fig31-arrow)"/>

  <!-- ========== OUTPUT ========== -->
  <rect x="1005" y="220" width="120" height="50" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="1065" y="240" text-anchor="middle" font-size="11" fill="#000">MoE output</text>
  <text x="1065" y="257" text-anchor="middle" font-size="9" fill="#888">[hidden=4096]</text>

  <!-- ========== Comparison note ========== -->
  <text x="580" y="500" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">Key Difference from DeepSeek-MoE</text>
  <text x="580" y="516" text-anchor="middle" font-size="9" fill="#000">Qwen3.5: softmax(logits) → top-k → renormalize (weights sum to 1)</text>
  <text x="580" y="530" text-anchor="middle" font-size="9" fill="#888">DeepSeek: sigmoid(logits) → top-k → use-as-is (no renormalization, then sum)</text>

  <!-- ========== LEGEND ========== -->
  <g transform="translate(30,500)">
    <rect x="0" y="0" width="420" height="65" fill="none" stroke="#000" stroke-width="1"/>
    <text x="10" y="15" font-size="10" font-weight="bold" fill="#1a3a6e">LEGEND</text>

    <rect x="10" y="22" width="12" height="8" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="0.5"/>
    <text x="28" y="30" font-size="9" fill="#000">selected expert (top-10 of 512)</text>

    <rect x="210" y="22" width="12" height="8" fill="none" stroke="#888" stroke-width="0.5"/>
    <text x="228" y="30" font-size="9" fill="#888">inactive expert (502)</text>

    <rect x="10" y="38" width="12" height="8" fill="none" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="3 2"/>
    <text x="28" y="46" font-size="9" fill="#b8721a">shared expert (always-on)</text>

    <line x1="210" y1="42" x2="228" y2="42" stroke="#000" stroke-width="1.2" marker-end="url(#fig31-arrow)"/>
    <text x="234" y="46" font-size="9" fill="#000">data flow</text>

    <text x="10" y="60" font-size="9" fill="#888">10 selected + 1 shared = 11 experts activated per token per layer (×60 layers)</text>
  </g>
</svg>
