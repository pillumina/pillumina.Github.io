<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="Courier New, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a3a6e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b8721a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="30" font-size="14" font-weight="bold" fill="#1a3a6e">MiniMax M3 -- MoE Routing Topology (128 Experts, Top-4, Sigmoid)</text>
  <line x1="30" y1="38" x2="800" y2="38" stroke="#1a3a6e" stroke-width="1"/>

  <!-- ===== LEFT: Router ===== -->
  <rect x="30" y="55" width="200" height="50" rx="0" fill="none" stroke="#b8721a" stroke-width="1.5"/>
  <text x="130" y="73" text-anchor="middle" font-size="10" font-weight="bold" fill="#b8721a">Router (Gate)</text>
  <text x="130" y="88" text-anchor="middle" font-size="8" fill="#888">W: [128, 6144] + bias</text>
  <text x="130" y="100" text-anchor="middle" font-size="8" fill="#888">Sigmoid scoring (not softmax)</text>

  <!-- Router -> experts -->
  <line x1="230" y1="80" x2="270" y2="80" stroke="#b8721a" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- ===== Expert Grid (8x16) ===== -->
  <rect x="275" y="55" width="620" height="155" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="585" y="73" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">128 Routed Experts (4 active per token)</text>
  <line x1="295" y1="81" x2="875" y2="81" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- Row 1 -->
  <g>
    <rect x="295" y="88" width="68" height="20" rx="0" fill="none" stroke="#4a7ab0" stroke-width="0.8"/>
    <text x="329" y="101" text-anchor="middle" font-size="7" fill="#000">E0</text>
  </g>
  <g>
    <rect x="368" y="88" width="68" height="20" rx="0" fill="none" stroke="#4a7ab0" stroke-width="0.8"/>
    <text x="402" y="101" text-anchor="middle" font-size="7" fill="#000">E1</text>
  </g>
  <g>
    <rect x="441" y="88" width="68" height="20" rx="0" fill="none" stroke="#4a7ab0" stroke-width="0.8"/>
    <text x="475" y="101" text-anchor="middle" font-size="7" fill="#000">E2</text>
  </g>
  <text x="519" y="101" font-size="7" fill="#888">...</text>
  <g>
    <rect x="540" y="88" width="68" height="20" rx="0" fill="none" stroke="#4a7ab0" stroke-width="0.8"/>
    <text x="574" y="101" text-anchor="middle" font-size="7" fill="#000">E7</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="295" y="113" width="68" height="20" rx="0" fill="none" stroke="#4a7ab0" stroke-width="0.8"/>
    <text x="329" y="126" text-anchor="middle" font-size="7" fill="#000">E8</text>
  </g>
  <text x="393" y="126" font-size="7" fill="#888">...</text>

  <!-- Active highlight example -->
  <g>
    <rect x="441" y="113" width="68" height="20" rx="0" fill="#b8721a" fill-opacity="0.15" stroke="#b8721a" stroke-width="1.2"/>
    <text x="475" y="126" text-anchor="middle" font-size="7" fill="#b8721a">E10 (active)</text>
  </g>

  <text x="519" y="126" font-size="7" fill="#888">...</text>
  <g>
    <rect x="540" y="113" width="68" height="20" rx="0" fill="#b8721a" fill-opacity="0.15" stroke="#b8721a" stroke-width="1.2"/>
    <text x="574" y="126" text-anchor="middle" font-size="7" fill="#b8721a">E15 (active)</text>
  </g>

  <!-- Row 16 (last) -->
  <text x="329" y="149" font-size="7" fill="#888">.........</text>
  <text x="441" y="149" font-size="7" fill="#888">.........</text>
  <text x="574" y="149" font-size="7" fill="#888">.........</text>

  <g>
    <rect x="295" y="158" width="68" height="20" rx="0" fill="none" stroke="#4a7ab0" stroke-width="0.8"/>
    <text x="329" y="171" text-anchor="middle" font-size="7" fill="#000">E120</text>
  </g>
  <text x="393" y="171" font-size="7" fill="#888">...</text>
  <g>
    <rect x="441" y="158" width="68" height="20" rx="0" fill="#b8721a" fill-opacity="0.15" stroke="#b8721a" stroke-width="1.2"/>
    <text x="475" y="171" text-anchor="middle" font-size="7" fill="#b8721a">E125 (active)</text>
  </g>
  <text x="519" y="171" font-size="7" fill="#888">...</text>
  <g>
    <rect x="540" y="158" width="68" height="20" rx="0" fill="#b8721a" fill-opacity="0.15" stroke="#b8721a" stroke-width="1.2"/>
    <text x="574" y="171" text-anchor="middle" font-size="7" fill="#b8721a">E127 (active)</text>
  </g>

  <!-- Expert output aggregation -->
  <line x1="585" y1="210" x2="585" y2="240" stroke="#b8721a" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- ===== Weighted Sum ===== -->
  <rect x="480" y="243" width="210" height="40" rx="0" fill="none" stroke="#b8721a" stroke-width="1.5"/>
  <text x="585" y="259" text-anchor="middle" font-size="10" fill="#000">Weighted Sum (index_add)</text>
  <text x="585" y="275" text-anchor="middle" font-size="8" fill="#888">Sum_i(w_i * E_i(x)), w_i = sigmoid scores / sum</text>

  <!-- ===== SHARED EXPERT ===== -->
  <rect x="30" y="220" width="200" height="65" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1.5"/>
  <text x="130" y="240" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a7ab0">Shared Expert (x1)</text>
  <line x1="50" y1="248" x2="210" y2="248" stroke="#4a7ab0" stroke-width="0.5"/>
  <text x="130" y="264" text-anchor="middle" font-size="9" fill="#000">Always active</text>
  <text x="130" y="280" text-anchor="middle" font-size="8" fill="#888">SwiGLU, inter=3072</text>

  <!-- Arrow shared -> sum -->
  <line x1="230" y1="260" x2="265" y2="260" stroke="#4a7ab0" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Dense MLP box -->
  <rect x="270" y="243" width="190" height="40" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="365" y="259" text-anchor="middle" font-size="10" fill="#000">Dense MLP (L1-3)</text>
  <text x="365" y="275" text-anchor="middle" font-size="8" fill="#888">SwiGLU-OAI, inter=12288</text>

  <line x1="460" y1="263" x2="478" y2="263" stroke="#4a7ab0" stroke-width="0.5"/>

  <!-- ===== BOTTOM: Routing Algorithm Steps ===== -->
  <text x="30" y="310" font-size="11" font-weight="bold" fill="#b8721a">Sigmoid Routing Algorithm (per token):</text>

  <rect x="30" y="322" width="1040" height="50" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="50" y="340" font-size="9" fill="#000">Step 1: router_logits = x @ W^T (shape: [128])</text>
  <text x="50" y="358" font-size="9" fill="#000">Step 2: scores = sigmoid(router_logits) + e_score_correction_bias</text>

  <rect x="30" y="380" width="1040" height="50" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="50" y="398" font-size="9" fill="#000">Step 3: top_k_index = argtopk(scores, k=4) -- select 4 experts</text>
  <text x="50" y="416" font-size="9" fill="#000">Step 4: top_k_weights = sigmoid(router_logits[top_k]) / sum(...) -- L1 normalize</text>

  <rect x="30" y="438" width="1040" height="50" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="50" y="456" font-size="9" fill="#000">Step 5: For each of top-4 experts: y_i = SwiGLU(x @ W_gate_up[i]) @ W_down[i]</text>
  <text x="50" y="474" font-size="9" fill="#000">Step 6: output = sum_i(weight_i * y_i) + shared_expert(x)  [index_add_]</text>

  <!-- ===== Expert FFN Detail ===== -->
  <rect x="30" y="500" width="520" height="100" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="290" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">Expert FFN Internals (SwiGLU-OAI, non-gated)</text>
  <line x1="50" y1="528" x2="530" y2="528" stroke="#1a3a6e" stroke-width="0.5"/>

  <text x="50" y="548" font-size="9" fill="#000">gate_up_proj: [128, 2*3072, 6144] (3D, all experts batched)</text>
  <text x="50" y="568" font-size="9" fill="#000">down_proj:     [128, 6144, 3072] (3D, all experts batched)</text>
  <text x="50" y="588" font-size="9" fill="#000">Activation: gate = sigmoid(gate * alpha) * gate; up = clamp(up, -7, 7); out = (up+1) * gate</text>

  <!-- ===== RIGHT: Load Balancing ===== -->
  <rect x="580" y="500" width="490" height="100" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="825" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="#b8721a">Load Balancing</text>
  <line x1="600" y1="528" x2="1050" y2="528" stroke="#b8721a" stroke-width="0.5"/>

  <text x="600" y="548" font-size="9" fill="#000">use_routing_bias: True</text>
  <text x="600" y="568" font-size="9" fill="#888">e_score_correction_bias: [128] buffer, non-gradient</text>
  <text x="600" y="588" font-size="9" fill="#888">routed_scaling_factor: 2.0</text>

  <!-- ===== KEY PROPERTIES ===== -->
  <rect x="30" y="615" width="1040" height="45" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="50" y="635" font-size="9" fill="#000">Key: Sigmoid routing (vs DeepSeek softmax). Each expert scored independently -- allows 0-4 active (flexible). L1-normalize weights after selection.</text>
  <text x="50" y="652" font-size="9" fill="#888">Total MoE params: 128 x (2*3072*6144 + 6144*3072) + routing bias + shared expert = ~128 x (37.7M + 18.9M) = ~7.2B per layer subset</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="670" width="500" height="40" rx="0" fill="none" stroke="#888" stroke-width="0.5"/>
  <text x="45" y="687" font-size="10" font-weight="bold" fill="#1a3a6e">Legend:</text>
  <rect x="105" y="678" width="20" height="10" rx="0" fill="none" stroke="#4a7ab0" stroke-width="0.8"/>
  <text x="132" y="688" font-size="9" fill="#000">Expert (inactive)</text>
  <rect x="230" y="678" width="20" height="10" rx="0" fill="#b8721a" fill-opacity="0.15" stroke="#b8721a" stroke-width="1.2"/>
  <text x="257" y="688" font-size="9" fill="#000">Expert (active for this token)</text>
  <rect x="400" y="678" width="20" height="10" rx="0" fill="none" stroke="#b8721a" stroke-width="1.5"/>
  <text x="427" y="688" font-size="9" fill="#000">Router/Fusion path</text>
</svg>