<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Courier New, monospace">
  <rect width="1100" height="720" fill="#ffffff"/>

  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3a6e">LongCat-2.0 — LongCat Sparse Attention (LSA) Three Components</text>
  <text x="550" y="48" text-anchor="middle" font-size="10" fill="#888">Evolution of DeepSeek Sparse Attention. SI + CLI + HI. [!] HI not in open release.</text>

  <!-- Legend -->
  <g>
    <rect x="20" y="650" width="320" height="58" fill="none" stroke="#888" stroke-width="1"/>
    <text x="28" y="666" font-size="10" font-weight="bold" fill="#1a3a6e">LEGEND</text>
    <rect x="28" y="674" width="14" height="10" fill="none" stroke="#1a3a6e"/>
    <text x="48" y="683" font-size="9" fill="#000">indexer / data path</text>
    <rect x="28" y="690" width="14" height="10" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="48" y="699" font-size="9" fill="#000">selected KV (top-k)</text>
    <text x="200" y="683" font-size="9" fill="#b8721a">[!] HI training-only /</text>
    <text x="200" y="699" font-size="9" fill="#b8721a">    not open-sourced</text>
  </g>

  <!-- Formula panel -->
  <rect x="700" y="650" width="380" height="58" fill="none" stroke="#888" stroke-width="1"/>
  <text x="710" y="666" font-size="10" font-weight="bold" fill="#1a3a6e">LSA FORMULAS</text>
  <text x="710" y="681" font-size="9" fill="#000">SI: budget = contiguous_block + dynamic_random</text>
  <text x="710" y="694" font-size="9" fill="#000">CLI: 1 indexer pass -&gt; 2 attn layers (cli_factor=2)</text>
  <text x="710" y="705" font-size="9" fill="#000">MTP CLI: 3 drafts share 1 indexer pass</text>

  <!-- =========== TOP: DSA indexer (baseline) =========== -->
  <rect x="40" y="80" width="1020" height="100" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="50" y="98" font-size="10" font-weight="bold" fill="#888">BASELINE: DeepSeek Sparse Attention (DSA) Indexer</text>

  <!-- quadratic scoring -->
  <rect x="80" y="110" width="160" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="160" y="126" text-anchor="middle" font-size="9" fill="#000">Q x K^T scoring</text>
  <text x="160" y="138" text-anchor="middle" font-size="8" fill="#888">quadratic, O(N^2)</text>

  <line x1="240" y1="126" x2="290" y2="126" stroke="#000" stroke-width="1.2" marker-end="url(#arrL)"/>

  <rect x="290" y="110" width="160" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="370" y="126" text-anchor="middle" font-size="9" fill="#000">top-2048 selection</text>
  <text x="370" y="138" text-anchor="middle" font-size="8" fill="#888">per query</text>

  <line x1="450" y1="126" x2="500" y2="126" stroke="#000" stroke-width="1.2" marker-end="url(#arrL)"/>

  <rect x="500" y="110" width="200" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="600" y="126" text-anchor="middle" font-size="9" fill="#000">gather KV into attn</text>
  <text x="600" y="138" text-anchor="middle" font-size="8" fill="#888">MLA prolog</text>

  <line x1="700" y1="126" x2="750" y2="126" stroke="#000" stroke-width="1.2" marker-end="url(#arrL)"/>

  <rect x="750" y="110" width="220" height="32" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="860" y="126" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">MLA Attention (target layer)</text>
  <text x="860" y="138" text-anchor="middle" font-size="8" fill="#ffffff">1 layer -&gt; 1 indexer pass</text>

  <text x="50" y="166" font-size="9" fill="#888">Bottleneck: indexer latency &gt;&gt; MLA compute at long context. LSA reduces cost 3 ways:</text>

  <!-- =========== MIDDLE: 3 improvements =========== -->

  <!-- SI panel -->
  <rect x="40" y="200" width="320" height="240" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="200" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">SI: Streaming-aware Indexing</text>
  <text x="200" y="232" text-anchor="middle" font-size="9" fill="#888">(hardware-aligned token selection)</text>

  <!-- contiguous block -->
  <rect x="60" y="246" width="280" height="48" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="80" y="262" font-size="9" font-weight="bold" fill="#000">Contiguous block budget</text>
  <text x="80" y="276" font-size="8" fill="#000">- index_local_tokens = 1024</text>
  <text x="80" y="288" font-size="8" fill="#000">- coalesced HBM access</text>

  <!-- random selection -->
  <rect x="60" y="304" width="280" height="56" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="80" y="320" font-size="9" font-weight="bold" fill="#ffffff">Dynamic random selection</text>
  <text x="80" y="334" font-size="8" fill="#ffffff">- fill remaining top-2048</text>
  <text x="80" y="346" font-size="8" fill="#ffffff">- preserves global coverage</text>
  <text x="80" y="358" font-size="8" fill="#ffffff">- streaming: tokens added as they arrive</text>

  <!-- diagram: streaming blocks -->
  <rect x="60" y="370" width="280" height="56" fill="none" stroke="#888" stroke-width="1"/>
  <text x="70" y="384" font-size="8" fill="#888">streaming KV:</text>

  <rect x="68" y="390" width="36" height="14" fill="#1a3a6e"/>
  <rect x="104" y="390" width="36" height="14" fill="#1a3a6e"/>
  <rect x="140" y="390" width="36" height="14" fill="#1a3a6e"/>
  <text x="180" y="400" font-size="8" fill="#888">contiguous</text>

  <rect x="68" y="408" width="14" height="12" fill="none" stroke="#1a3a6e"/>
  <rect x="98" y="408" width="14" height="12" fill="none" stroke="#1a3a6e"/>
  <rect x="140" y="408" width="14" height="12" fill="none" stroke="#1a3a6e"/>
  <rect x="180" y="408" width="14" height="12" fill="none" stroke="#1a3a6e"/>
  <rect x="220" y="408" width="14" height="12" fill="none" stroke="#1a3a6e"/>
  <rect x="260" y="408" width="14" height="12" fill="none" stroke="#1a3a6e"/>
  <text x="300" y="418" font-size="8" fill="#888">+ random</text>

  <!-- CLI panel -->
  <rect x="380" y="200" width="320" height="240" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="540" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">CLI: Cross-Layer Indexing</text>
  <text x="540" y="232" text-anchor="middle" font-size="9" fill="#888">(cli_factor = 2)</text>

  <!-- indexer -->
  <rect x="400" y="246" width="280" height="34" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="540" y="262" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">1 indexer pass</text>
  <text x="540" y="274" text-anchor="middle" font-size="8" fill="#ffffff">computes top-2048 KV once</text>

  <!-- 2 layers consuming -->
  <line x1="540" y1="280" x2="540" y2="298" stroke="#000" stroke-width="1.2"/>
  <line x1="540" y1="298" x2="450" y2="298" stroke="#000" stroke-width="1.2"/>
  <line x1="540" y1="298" x2="630" y2="298" stroke="#000" stroke-width="1.2"/>
  <line x1="450" y1="298" x2="450" y2="312" stroke="#000" stroke-width="1.2" marker-end="url(#arrL)"/>
  <line x1="630" y1="298" x2="630" y2="312" stroke="#000" stroke-width="1.2" marker-end="url(#arrL)"/>

  <rect x="400" y="314" width="100" height="34" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="450" y="330" text-anchor="middle" font-size="9" fill="#000">Attn layer i</text>
  <text x="450" y="342" text-anchor="middle" font-size="8" fill="#888">reuse index</text>

  <rect x="580" y="314" width="100" height="34" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="630" y="330" text-anchor="middle" font-size="9" fill="#000">Attn layer i+1</text>
  <text x="630" y="342" text-anchor="middle" font-size="8" fill="#888">reuse index</text>

  <!-- savings -->
  <rect x="400" y="358" width="280" height="62" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="410" y="372" font-size="8" fill="#000">target model: 2 layers / 1 pass</text>
  <text x="410" y="386" font-size="8" fill="#000">=&gt; 50% indexer cost saved</text>
  <text x="410" y="400" font-size="8" fill="#000">trained via cross-layer distillation</text>
  <text x="410" y="414" font-size="8" fill="#b8721a">[!] MTP: 3 drafts share 1 pass</text>

  <!-- HI panel -->
  <rect x="720" y="200" width="340" height="240" fill="none" stroke="#b8721a" stroke-width="1.5"/>
  <text x="890" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#b8721a">HI: Hierarchical Indexing</text>
  <text x="890" y="232" text-anchor="middle" font-size="9" fill="#888">(two-stage selection) [NOT OPEN]</text>

  <!-- coarse stage -->
  <rect x="740" y="246" width="300" height="60" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="760" y="262" font-size="9" font-weight="bold" fill="#000">Stage 1: Coarse (block-level)</text>
  <text x="760" y="276" font-size="8" fill="#000">- approximate score per block</text>
  <text x="760" y="288" font-size="8" fill="#000">- prune to candidate set</text>
  <text x="760" y="300" font-size="8" fill="#000">- cheap, large reduction</text>

  <line x1="890" y1="306" x2="890" y2="320" stroke="#000" stroke-width="1.2" marker-end="url(#arrL)"/>

  <!-- fine stage -->
  <rect x="740" y="322" width="300" height="60" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="760" y="338" font-size="9" font-weight="bold" fill="#ffffff">Stage 2: Fine (within candidates)</text>
  <text x="760" y="352" font-size="8" fill="#ffffff">- token-level precise scoring</text>
  <text x="760" y="364" font-size="8" fill="#ffffff">- final top-2048 selected</text>
  <text x="760" y="376" font-size="8" fill="#ffffff">- training-free at inference</text>

  <text x="740" y="400" font-size="8" fill="#b8721a">[!] HI used in training + ultra-long</text>
  <text x="740" y="412" font-size="8" fill="#b8721a">    context tasks; not shipped in</text>
  <text x="740" y="424" font-size="8" fill="#b8721a">    open-source GPU release.</text>

  <!-- =========== BOTTOM: pipeline / overlap =========== -->
  <rect x="40" y="460" width="1020" height="180" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="50" y="478" font-size="10" font-weight="bold" fill="#1a3a6e">COMPUTE-COMM OVERLAP: Indexer pipelined with MLA prolog</text>

  <!-- time axis -->
  <line x1="60" y1="500" x2="1040" y2="500" stroke="#000" stroke-width="1"/>
  <text x="50" y="504" font-size="8" fill="#888">t=</text>

  <!-- indexer bar -->
  <rect x="60" y="510" width="280" height="20" fill="#1a3a6e"/>
  <text x="200" y="524" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">indexer pass (1x, shared)</text>
  <text x="60" y="544" font-size="8" fill="#888">indexer:</text>

  <!-- MLA prolog for layer i -->
  <rect x="200" y="540" width="200" height="20" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="300" y="554" text-anchor="middle" font-size="9" fill="#000">MLA prolog layer i</text>

  <!-- MLA attention layer i -->
  <rect x="320" y="568" width="200" height="20" fill="#1a3a6e" stroke="#1a3a6e"/>
  <text x="420" y="582" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">attn layer i</text>

  <!-- MLA prolog layer i+1 -->
  <rect x="440" y="540" width="200" height="20" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="540" y="554" text-anchor="middle" font-size="9" fill="#000">MLA prolog layer i+1</text>

  <!-- MLA attention layer i+1 -->
  <rect x="560" y="568" width="200" height="20" fill="#1a3a6e" stroke="#1a3a6e"/>
  <text x="660" y="582" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">attn layer i+1</text>

  <!-- layer labels -->
  <text x="60" y="554" font-size="8" fill="#888">MLA prolog:</text>
  <text x="60" y="582" font-size="8" fill="#888">attn:</text>

  <!-- vertical arrows showing pipeline -->
  <line x1="300" y1="560" x2="300" y2="568" stroke="#000" stroke-width="1" stroke-dasharray="2,1" marker-end="url(#arrL)"/>
  <line x1="540" y1="560" x2="540" y2="568" stroke="#000" stroke-width="1" stroke-dasharray="2,1" marker-end="url(#arrL)"/>

  <!-- summary callout -->
  <rect x="780" y="510" width="260" height="118" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="790" y="526" font-size="10" font-weight="bold" fill="#1a3a6e">LSA Config (from config.json)</text>
  <text x="790" y="542" font-size="9" fill="#000">index_n_heads .... 32</text>
  <text x="790" y="556" font-size="9" fill="#000">index_head_dim ... 128</text>
  <text x="790" y="570" font-size="9" fill="#000">index_topk ....... 2048</text>
  <text x="790" y="584" font-size="9" fill="#000">index_local_tokens  1024</text>
  <text x="790" y="598" font-size="9" fill="#000">cli_factor ........ 2</text>
  <text x="790" y="612" font-size="9" fill="#000">dsa_mtp_cli ...... true</text>
  <text x="790" y="624" font-size="9" fill="#b8721a">HI not in open release</text>

  <defs>
    <marker id="arrL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
