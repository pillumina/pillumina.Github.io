<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Courier New, monospace">
  <!-- LongCat-2.0 Architecture Overview -->
  <rect width="1000" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3a6e">LongCat-2.0 — Architecture Overview</text>
  <text x="500" y="52" text-anchor="middle" font-size="11" fill="#888">1.6T total | 48B active | 38 layers | 768+128 experts | 1M context</text>

  <!-- Legend (bottom-left) -->
  <g>
    <rect x="20" y="640" width="290" height="68" fill="none" stroke="#888" stroke-width="1"/>
    <text x="28" y="656" font-size="10" fill="#1a3a6e" font-weight="bold">LEGEND</text>
    <rect x="28" y="664" width="14" height="10" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
    <text x="48" y="673" font-size="9" fill="#000">Module / Sublayer</text>
    <rect x="28" y="680" width="14" height="10" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.5"/>
    <text x="48" y="689" font-size="9" fill="#000">Activated component</text>
    <text x="160" y="673" font-size="9" fill="#888">---&gt; data flow</text>
    <text x="160" y="689" font-size="9" fill="#b8721a">[!] caveat / not open</text>
  </g>

  <!-- INPUT -->
  <rect x="380" y="78" width="240" height="34" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="500" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Input Token IDs</text>
  <text x="500" y="106" text-anchor="middle" font-size="9" fill="#888">seq_len up to 1,048,576</text>

  <line x1="500" y1="112" x2="500" y2="130" stroke="#000" stroke-width="1.2" marker-end="url(#arr21)"/>

  <!-- EMBEDDING cluster -->
  <rect x="290" y="132" width="420" height="78" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="500" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Embedding Layer</text>
  <rect x="306" y="154" width="186" height="48" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="399" y="170" text-anchor="middle" font-size="10" fill="#000">Token Embedding</text>
  <text x="399" y="184" text-anchor="middle" font-size="9" fill="#000">vocab=163,840</text>
  <text x="399" y="196" text-anchor="middle" font-size="9" fill="#888">hidden=8,192</text>
  <rect x="510" y="154" width="186" height="48" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="603" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">N-gram Embedding</text>
  <text x="603" y="184" text-anchor="middle" font-size="9" fill="#ffffff">5-gram, ratio=100.567x</text>
  <text x="603" y="196" text-anchor="middle" font-size="9" fill="#ffffff">135B params (8.4%)</text>
  <text x="503" y="182" text-anchor="middle" font-size="10" fill="#000">+</text>

  <line x1="500" y1="210" x2="500" y2="232" stroke="#000" stroke-width="1.2" marker-end="url(#arr21)"/>

  <!-- DECODER STACK (38 layers) -->
  <rect x="100" y="234" width="800" height="280" fill="none" stroke="#1a3a6e" stroke-width="2"/>
  <text x="500" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a6e">Decoder Stack x 38 Logical Layers</text>
  <text x="500" y="266" text-anchor="middle" font-size="9" fill="#888">(each logical layer = Dual-Sublayer + Shortcut MoE)</text>

  <!-- Single layer detail (zoomed) -->
  <rect x="160" y="280" width="680" height="200" fill="none" stroke="#1a3a6e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="180" y="296" font-size="10" fill="#1a3a6e" font-weight="bold">Logical Layer i (i = 1..38)</text>

  <!-- Sublayer 1 -->
  <rect x="180" y="306" width="320" height="158" fill="none" stroke="#888" stroke-width="1"/>
  <text x="340" y="320" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">Sublayer 1</text>
  <rect x="200" y="330" width="120" height="22" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="260" y="345" text-anchor="middle" font-size="9" fill="#000">input_norm[0]</text>
  <rect x="340" y="330" width="140" height="22" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="410" y="345" text-anchor="middle" font-size="9" fill="#ffffff">LSA + MLA Attn[0]</text>
  <rect x="200" y="364" width="120" height="22" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="260" y="379" text-anchor="middle" font-size="9" fill="#000">post_attn_norm[0]</text>
  <rect x="340" y="364" width="140" height="22" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="410" y="379" text-anchor="middle" font-size="9" fill="#000">Dense MLP[0]</text>
  <!-- Shortcut MoE -->
  <rect x="200" y="400" width="280" height="50" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="340" y="416" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Shortcut MoE (async)</text>
  <text x="340" y="430" text-anchor="middle" font-size="9" fill="#ffffff">768 routed + 128 identity</text>
  <text x="340" y="442" text-anchor="middle" font-size="8" fill="#ffffff">top-12, scaling=9</text>

  <!-- Sublayer 2 -->
  <rect x="520" y="306" width="300" height="158" fill="none" stroke="#888" stroke-width="1"/>
  <text x="670" y="320" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">Sublayer 2</text>
  <rect x="540" y="330" width="120" height="22" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="600" y="345" text-anchor="middle" font-size="9" fill="#000">input_norm[1]</text>
  <rect x="680" y="330" width="120" height="22" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="740" y="345" text-anchor="middle" font-size="9" fill="#ffffff">Attn[1] (LSA)</text>
  <rect x="540" y="364" width="120" height="22" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="600" y="379" text-anchor="middle" font-size="9" fill="#000">post_attn_norm[1]</text>
  <rect x="680" y="364" width="120" height="22" fill="none" stroke="#1a3a6e" stroke-width="1.2"/>
  <text x="740" y="379" text-anchor="middle" font-size="9" fill="#000">Dense MLP[1]</text>
  <!-- Shortcut fusion -->
  <rect x="540" y="400" width="260" height="50" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="670" y="416" text-anchor="middle" font-size="9" font-weight="bold" fill="#000">h += shortcut_mlp_output</text>
  <text x="670" y="430" text-anchor="middle" font-size="8" fill="#888">(ScMoE: MoE comm masked by</text>
  <text x="670" y="442" text-anchor="middle" font-size="8" fill="#888">Attn+MLP compute)</text>

  <!-- arrows shortcut async -->
  <line x1="480" y1="425" x2="540" y2="425" stroke="#1a3a6e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr21)"/>

  <!-- Output flow -->
  <line x1="500" y1="514" x2="500" y2="540" stroke="#000" stroke-width="1.2" marker-end="url(#arr21)"/>

  <!-- RMSNorm + LM Head -->
  <rect x="340" y="542" width="320" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="500" y="558" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">Final RMSNorm + LM Head</text>
  <text x="500" y="574" text-anchor="middle" font-size="9" fill="#888">tie weights with token embedding</text>

  <!-- Output -->
  <line x1="500" y1="582" x2="500" y2="600" stroke="#000" stroke-width="1.2" marker-end="url(#arr21)"/>
  <rect x="380" y="602" width="240" height="26" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="500" y="619" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Next-Token Logits</text>

  <!-- Key numbers panel (right side) -->
  <rect x="720" y="80" width="260" height="130" fill="none" stroke="#888" stroke-width="1"/>
  <text x="730" y="96" font-size="10" font-weight="bold" fill="#1a3a6e">KEY NUMBERS</text>
  <text x="730" y="114" font-size="9" fill="#000">total params .... 1.6T</text>
  <text x="730" y="128" font-size="9" fill="#000">active/token .... 48B (3.0%)</text>
  <text x="730" y="142" font-size="9" fill="#000">layers .......... 38</text>
  <text x="730" y="156" font-size="9" fill="#000">routed experts .. 768</text>
  <text x="730" y="170" font-size="9" fill="#000">identity zero ... 128</text>
  <text x="730" y="184" font-size="9" fill="#000">MoE top-k ...... 12</text>
  <text x="730" y="198" font-size="9" fill="#000">context ......... 1,048,576</text>

  <text x="730" y="214" font-size="9" fill="#b8721a">[!] HI not in open release</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arr21" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
