<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" font-family="Courier New, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a3a6e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Attention Sink Bias 机制 — SWA 128-token 窗口内的注意力聚焦</text>

  <!-- Left: Standard Softmax -->
  <text x="220" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#888">标准 Softmax（无 Sink）</text>

  <rect x="60" y="72" width="320" height="140" rx="2" fill="#fff5f5" stroke="#888" stroke-width="1"/>
  <text x="75" y="92" font-size="10" fill="#000">attn_weights = QKᵀ / √d  [B, H, S, S]</text>
  <text x="75" y="110" font-size="10" fill="#000">+ causal_mask  (SWA: 仅最近 128 token)</text>
  <line x1="80" y1="118" x2="360" y2="118" stroke="#888" stroke-width="0.5"/>
  <text x="75" y="135" font-size="10" fill="#000">probs = softmax(attn_weights, dim=-1)</text>
  <text x="75" y="155" font-size="10" fill="#b8721a">⚠ 128 token 均匀分配概率 → 每个 token ~0.78%</text>
  <text x="75" y="175" font-size="10" fill="#b8721a">⚠ 真正相关的 2-3 token 被「稀释」</text>
  <text x="75" y="195" font-size="10" fill="#000">output = probs @ values</text>

  <!-- Arrow between -->
  <text x="430" y="145" text-anchor="middle" font-size="18" fill="#1a3a6e">→</text>

  <!-- Right: With Sink -->
  <text x="620" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Sink Bias（有 Sink）</text>

  <rect x="460" y="72" width="340" height="140" rx="2" fill="#f0f4ff" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="475" y="92" font-size="10" fill="#000">attn_weights = QKᵀ / √d  [B, H, S, S]</text>
  <text x="475" y="110" font-size="10" fill="#000">sink = sink_bias.reshape(B,H,S,1)  [H 个可学习参数]</text>
  <text x="475" y="128" font-size="10" fill="#1a3a6e">attn = concat(attn_weights, sink, dim=-1)  [S+1]</text>
  <line x1="480" y1="136" x2="780" y2="136" stroke="#888" stroke-width="0.5"/>
  <text x="475" y="153" font-size="10" fill="#000">probs = softmax(attn, dim=-1)      # sink 吸收部分概率</text>
  <text x="475" y="171" font-size="10" fill="#1a3a6e">probs = probs[:,:,:,:-1]            # 丢弃 sink 概率质量</text>
  <text x="475" y="191" font-size="10" fill="#000">✓ 剩余 2-3 token 各获 10-20% 注意力 → 聚焦</text>
  <text x="475" y="209" font-size="10" fill="#000">output = probs @ values</text>

  <!-- Code window -->
  <text x="500" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">核心代码 (`eager_attention_forward`, L112-L120)</text>

  <rect x="100" y="262" width="800" height="90" rx="2" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
  <text x="120" y="282" font-size="10" fill="#1a3a6e" font-weight="bold">if sinks is not None:</text>
  <text x="140" y="300" font-size="10" fill="#888"># 将 sink bias 扩展到 [B, H, S, 1] 并拼接到注意力矩阵尾部</text>
  <text x="140" y="318" font-size="10" fill="#000">sinks = module.attention_sink_bias.reshape(1,-1,1,1).expand(B, H, S, -1)</text>
  <text x="140" y="336" font-size="10" fill="#000">attn_weights = torch.cat([attn_weights, sinks], dim=-1)  </text>
  <text x="160" y="340" font-size="9" fill="#888"># → [B,H,S,S+1]</text>

  <!-- Learnable sink visualization -->
  <text x="500" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Sink Bias 参数</text>

  <rect x="60" y="398" width="180" height="65" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="150" y="418" text-anchor="middle" font-size="10" fill="#000">attention_sink_bias</text>
  <text x="150" y="436" text-anchor="middle" font-size="9" fill="#888">形状: [64] (每头一个)</text>
  <text x="150" y="452" text-anchor="middle" font-size="9" fill="#888">requires_grad=False</text>

  <rect x="280" y="398" width="220" height="65" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="390" y="418" text-anchor="middle" font-size="10" fill="#000">SWA: add_swa_sink_bias=true ✓</text>
  <text x="390" y="436" text-anchor="middle" font-size="9" fill="#888">GA: add_full_sink_bias=false ✗</text>
  <text x="390" y="452" text-anchor="middle" font-size="9" fill="#888">仅 SWA 层使用 sink</text>

  <rect x="540" y="398" width="220" height="65" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="650" y="418" text-anchor="middle" font-size="10" fill="#000">注册为 nn.Parameter</text>
  <text x="650" y="436" text-anchor="middle" font-size="9" fill="#888">但 requires_grad=False</text>
  <text x="650" y="452" text-anchor="middle" font-size="9" fill="#888">外部优化器更新 (推测 Muon)</text>

  <!-- Performance note -->
  <text x="500" y="495" text-anchor="middle" font-size="9" fill="#b8721a">⚠ 当前仅 eager 实现（未集成 FlashAttention），推理效率有优化空间</text>

  <!-- Legend -->
  <rect x="20" y="470" width="280" height="20" rx="2" fill="none" stroke="#888" stroke-width="0.5"/>
  <text x="30" y="484" font-size="9" fill="#888">消融: SWA(W=128)+sink 超越 All GA (MMLU 58.3 vs 57.3)</text>
</svg>