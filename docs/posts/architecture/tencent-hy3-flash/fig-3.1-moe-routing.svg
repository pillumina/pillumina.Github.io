  <!-- Legend -->
  <rect x="30" y="640" width="400" height="35" rx="4" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="42" y="655" class="fig31-text-legend-title">Legend:</text>
  <rect x="105" y="646" width="16" height="10" rx="1" class="fig31-fill" fill="#fdf6ed" stroke="#b8721a" stroke-width="1"/>
  <text x="125" y="655" class="fig31-text-legend">Router path (Sigmoid)</text>
  <rect x="250" y="646" width="16" height="10" rx="1" class="fig31-box-shared" fill="#eaf0f8"/>
  <text x="270" y="655" class="fig31-text-legend">Shared Expert</text>
</svg>