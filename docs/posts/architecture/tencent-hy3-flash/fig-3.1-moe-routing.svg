  <!-- Row 7: E144-E167 -->
  <rect x="60" y="612" width="840" height="22" rx="1" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <rect x="62" y="614" width="33" height="18" rx="1" stroke="#888" stroke-width="0.8" fill="#fff"/>
