  <text x="113" y="555" text-anchor="middle" class="fig31-text-tiny">E73</text>
  <text x="160" y="555" class="fig31-text-tiny" fill="#888">E74..E94</text>
  <rect x="832" y="542" width="33" height="18" rx="1" stroke="#888" stroke-width="0.8" fill="#fff"/>
  <text x="848" y="555" text-anchor="middle" class="fig31-text-tiny">E95</text>

  <!-- Row 5: E96-E119 -->
  <rect x="60" y="564" width="840" height="22" rx="1" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <rect x="62" y="566" width="33" height="18" rx="1" stroke="#888" stroke-width="0.8" fill="#fff"/>
  <text x="78" y="579" text-anchor="middle" class="fig31-text-tiny">E96</text>
  <rect x="97" y="566" width="33" height="18" rx="1" stroke="#888" stroke-width="0.8" fill="#fff"/>
  <text x="113" y="579" text-anchor="middle" class="fig31-text-tiny">E97</text>
  <text x="160" y="579" class="fig31-text-tiny" fill="#888">E98..E118</text>
  <rect x="832" y="566" width="33" height="18" rx="1" stroke="#888" stroke-width="0.8" fill="#fff"/>
  <text x="848" y="579" text-anchor="middle" class="fig31-text-tiny">E119</text>

  <!-- Row 6: E120-E143 -->
  <rect x="60" y="588" width="840" height="22" rx="1" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <rect x="62" y="590" width="33" height="18" rx="1" stroke="#888" stroke-width="0.8" fill="#fff"/>
  <text x="78" y="603" text-anchor="middle" class="fig31-text-tiny">E120</text>
  <rect x="97" y="590" width="33" height="18" rx="1" stroke="#888" stroke-width="0.8" fill="#fff"/>
