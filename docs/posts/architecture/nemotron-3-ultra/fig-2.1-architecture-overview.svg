<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 920" width="1050" height="920">
  <defs>
    <style>
      .fig-21-box { fill: none; stroke: #1a3a6e; stroke-width: 2; }
      .fig-21-box-alt { fill: none; stroke: #b8721a; stroke-width: 2; }
      .fig-21-text { font-family: "Courier New", monospace; font-size: 13px; fill: #000; }
      .fig-21-text-sm { font-family: "Courier New", monospace; font-size: 11px; fill: #000; }
      .fig-21-text-xs { font-family: "Courier New", monospace; font-size: 9px; fill: #888; }
      .fig-21-text-hl { font-family: "Courier New", monospace; font-size: 13px; fill: #1a3a6e; font-weight: bold; }
      .fig-21-text-accent { font-family: "Courier New", monospace; font-size: 12px; fill: #b8721a; }
      .fig-21-line { stroke: #1a3a6e; stroke-width: 1.5; fill: none; }
      .fig-21-line-gray { stroke: #888; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
      .fig-21-line-accent { stroke: #b8721a; stroke-width: 1.5; fill: none; }
      .fig-21-legend-box { fill: none; stroke: #888; stroke-width: 1; }
      .fig-21-fill-blue { fill: #1a3a6e; fill-opacity: 0.07; }
      .fig-21-fill-orange { fill: #b8721a; fill-opacity: 0.07; }
      .fig-21-arrow-head { fill: #1a3a6e; }
      .fig-21-arrow-head-accent { fill: #b8721a; }
    </style>
  </defs>

  <!-- Title -->
  <text x="30" y="28" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#000">Fig 2.1 — Nemotron 3 Ultra: Top-Level Architecture Overview</text>
  <line x1="30" y1="36" x2="620" y2="36" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- ===== LEFT COLUMN: Pipeline ===== -->

  <!-- Input Tokens -->
  <rect x="60" y="60" width="180" height="46" rx="0" ry="0" class="fig-21-box"/>
  <text x="150" y="80" text-anchor="middle" class="fig-21-text">Input Tokens</text>
  <text x="150" y="95" text-anchor="middle" class="fig-21-text-xs">[B, S], vocab=131072</text>

  <!-- Arrow: Input -> Embed -->
  <line x1="150" y1="106" x2="150" y2="132" class="fig-21-line"/>
  <polygon points="145,128 150,138 155,128" class="fig-21-arrow-head"/>

  <!-- Token Embedding -->
  <rect x="60" y="138" width="180" height="46" rx="0" ry="0" class="fig-21-box"/>
  <text x="150" y="158" text-anchor="middle" class="fig-21-text">Token Embedding</text>
  <text x="150" y="173" text-anchor="middle" class="fig-21-text-xs">131072 &#215; 8192</text>

  <!-- Arrow: Embed -> Layers -->
  <line x1="150" y1="184" x2="150" y2="210" class="fig-21-line"/>
  <polygon points="145,206 150,216 155,206" class="fig-21-arrow-head"/>

  <!-- 60 Hybrid Layers (large box) -->
  <rect x="30" y="216" width="240" height="280" rx="0" ry="0" stroke="#1a3a6e" stroke-width="2.5" fill="none"/>
  <text x="150" y="236" text-anchor="middle" class="fig-21-text-hl">60 Hybrid Layers</text>
  <text x="150" y="252" text-anchor="middle" class="fig-21-text-xs">550B total / 55B active params</text>

  <!-- Internal layer illustration -->
  <rect x="48" y="268" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.08"/>
  <text x="67" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">M</text>
  <rect x="92" y="268" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.08"/>
  <text x="111" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">M</text>
  <rect x="136" y="268" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.08"/>
  <text x="155" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">M</text>
  <rect x="180" y="268" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.08"/>
  <text x="199" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">M</text>
  <rect x="224" y="268" width="38" height="20" stroke="#b8721a" stroke-width="1.2" fill="#b8721a" fill-opacity="0.08"/>
  <text x="243" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#b8721a">A</text>

  <text x="150" y="308" text-anchor="middle" class="fig-21-text-xs">&#215; 48 Mamba-2 Mixers + &#215; 12 Attn Mixers</text>
  <line x1="50" y1="316" x2="250" y2="316" class="fig-21-line-gray"/>

  <!-- MoE row -->
  <rect x="48" y="324" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.04"/>
  <text x="67" y="337" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">E</text>
  <rect x="92" y="324" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.04"/>
  <text x="111" y="337" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">E</text>
  <rect x="136" y="324" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.04"/>
  <text x="155" y="337" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">E</text>
  <rect x="180" y="324" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.04"/>
  <text x="199" y="337" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">E</text>
  <rect x="224" y="324" width="38" height="20" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.04"/>
  <text x="243" y="337" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1a3a6e">E</text>

  <text x="150" y="360" text-anchor="middle" class="fig-21-text-xs">&#215; 48 LatentMoE (512 experts, top-22)</text>

  <text x="150" y="388" text-anchor="middle" class="fig-21-text-xs">Pattern: Mamba&#8594;MoE&#8594;Mamba&#8594;MoE&#8594;...</text>
  <text x="150" y="404" text-anchor="middle" class="fig-21-text-xs">Attn replaces Mamba every ~5 layers</text>

  <!-- Arrow: Layers -> MTP -->
  <line x1="150" y1="496" x2="150" y2="522" class="fig-21-line"/>
  <polygon points="145,518 150,528 155,518" class="fig-21-arrow-head"/>

  <!-- MTP Layer -->
  <rect x="55" y="528" width="190" height="52" rx="0" ry="0" class="fig-21-box-alt"/>
  <text x="150" y="549" text-anchor="middle" class="fig-21-text">MTP Layer (&#215; 1)</text>
  <text x="150" y="565" text-anchor="middle" class="fig-21-text-xs">Attention + MoE</text>

  <!-- Arrow: MTP -> LM Head -->
  <line x1="150" y1="580" x2="150" y2="606" class="fig-21-line"/>
  <polygon points="145,602 150,612 155,602" class="fig-21-arrow-head"/>

  <!-- LM Head -->
  <rect x="60" y="612" width="180" height="46" rx="0" ry="0" class="fig-21-box"/>
  <text x="150" y="632" text-anchor="middle" class="fig-21-text">LM Head</text>
  <text x="150" y="647" text-anchor="middle" class="fig-21-text-xs">8192 &#8594; 131072</text>

  <!-- Arrow: LM Head -> Output -->
  <line x1="150" y1="658" x2="150" y2="684" class="fig-21-line"/>
  <polygon points="145,680 150,690 155,680" class="fig-21-arrow-head"/>

  <!-- Output Tokens -->
  <rect x="60" y="690" width="180" height="46" rx="0" ry="0" class="fig-21-box"/>
  <text x="150" y="710" text-anchor="middle" class="fig-21-text">Output Tokens</text>
  <text x="150" y="725" text-anchor="middle" class="fig-21-text-xs">[B, S, 131072] logits</text>

  <!-- ===== RIGHT COLUMN: Detail callouts ===== -->

  <line x1="300" y1="70" x2="300" y2="780" stroke="#888" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Mamba-2 Mixer Details -->
  <text x="320" y="95" class="fig-21-text-hl">Mamba-2 Mixer (48 layers)</text>
  <rect x="320" y="108" width="380" height="130" rx="0" ry="0" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.04"/>

  <text x="335" y="128" class="fig-21-text-sm">num_heads          = 256</text>
  <text x="335" y="146" class="fig-21-text-sm">head_dim           = 64</text>
  <text x="335" y="164" class="fig-21-text-sm">ssm_state_size     = 128</text>
  <text x="335" y="182" class="fig-21-text-sm">n_groups           = 8</text>
  <text x="335" y="200" class="fig-21-text-sm">chunk_size         = 128</text>
  <text x="335" y="218" class="fig-21-text-sm">conv_kernel        = 4</text>
  <text x="335" y="236" class="fig-21-text-sm">expand             = 2</text>

  <!-- Attention Mixer Details -->
  <text x="320" y="270" class="fig-21-text-accent">Attention Mixer (12 layers)</text>
  <rect x="320" y="283" width="380" height="85" rx="0" ry="0" stroke="#b8721a" stroke-width="1" fill="#b8721a" fill-opacity="0.04"/>

  <text x="335" y="303" class="fig-21-text-sm">num_attention_heads = 64</text>
  <text x="335" y="321" class="fig-21-text-sm">num_kv_heads        = 2  (GQA 32:1)</text>
  <text x="335" y="339" class="fig-21-text-sm">head_dim            = 128</text>
  <text x="335" y="357" class="fig-21-text-sm">rope_theta          = -- (no RoPE)</text>

  <!-- LatentMoE Details -->
  <text x="320" y="400" class="fig-21-text-hl">LatentMoE FFN (48 layers)</text>
  <rect x="320" y="413" width="380" height="130" rx="0" ry="0" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.04"/>

  <text x="335" y="433" class="fig-21-text-sm">n_routed_experts   = 512</text>
  <text x="335" y="451" class="fig-21-text-sm">num_experts_per_tok= 22 (active/token)</text>
  <text x="335" y="469" class="fig-21-text-sm">moe_latent_size    = 2048</text>
  <text x="335" y="487" class="fig-21-text-sm">n_shared_experts   = 1</text>
  <text x="335" y="505" class="fig-21-text-sm">shared_intermediate= 10240</text>
  <text x="335" y="523" class="fig-21-text-sm">routed_scaling     = 5.0</text>
  <text x="335" y="541" class="fig-21-text-sm">norm_topk_prob     = true</text>

  <!-- Key Features -->
  <text x="320" y="585" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#000">Key Innovations</text>
  <rect x="320" y="600" width="380" height="120" rx="0" ry="0" stroke="#888" stroke-width="1" fill="#888" fill-opacity="0.04"/>

  <text x="335" y="620" class="fig-21-text-sm">1. Mamba-2 SSD: O(N) complexity, no KV cache</text>
  <text x="335" y="640" class="fig-21-text-sm">2. Hybrid mixer: Mamba implicit pos.</text>
  <text x="348" y="656" class="fig-21-text-xs">&#8594; Attention layers skip RoPE</text>
  <text x="335" y="674" class="fig-21-text-sm">3. LatentMoE: low-rank routing in R^2048</text>
  <text x="335" y="694" class="fig-21-text-sm">4. MTP: native speculative decoding (97%)</text>
  <text x="335" y="714" class="fig-21-text-sm">5. NVFP4: first FP4 large-scale training</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="800" width="280" height="105" class="fig-21-legend-box"/>
  <text x="45" y="820" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#000">Legend</text>

  <rect x="45" y="832" width="20" height="12" stroke="#1a3a6e" stroke-width="1.5" fill="#1a3a6e" fill-opacity="0.08"/>
  <text x="75" y="843" class="fig-21-text-xs">Mamba-2 / MoE component</text>

  <rect x="45" y="852" width="20" height="12" stroke="#b8721a" stroke-width="1.5" fill="#b8721a" fill-opacity="0.08"/>
  <text x="75" y="863" class="fig-21-text-xs">Attention component</text>

  <line x1="45" y1="885" x2="65" y2="885" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="75" y="890" class="fig-21-text-xs">Section divider / auxiliary</text>
</svg>
