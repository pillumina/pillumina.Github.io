      .fig-23-line-gray { stroke: #888; stroke-width: 1; fill: none; stroke-dasharray: 3,3; }
      .fig-23-head-q { fill: #1a3a6e; fill-opacity: 0.12; stroke: #1a3a6e; stroke-width: 1; }
      .fig-23-head-k { fill: #4a7ab0; fill-opacity: 0.12; stroke: #4a7ab0; stroke-width: 1.2; }
      .fig-23-head-v { fill: #b8721a; fill-opacity: 0.12; stroke: #b8721a; stroke-width: 1.2; }
