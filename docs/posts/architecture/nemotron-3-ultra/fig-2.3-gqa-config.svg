  <rect x="80" y="90" width="36" height="36" class="fig-23-head-k"/>
  <text x="98" y="113" text-anchor="middle" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#4a7ab0">K</text>
  <text x="98" y="145" text-anchor="middle" class="fig-23-text-xs">0</text>

  <rect x="80" y="160" width="36" height="36" class="fig-23-head-k"/>
  <text x="98" y="183" text-anchor="middle" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#4a7ab0">K</text>
  <text x="98" y="215" text-anchor="middle" class="fig-23-text-xs">1</text>

  <!-- V heads (right side, vertical) -->
  <text x="740" y="80" class="fig-23-text-accent">Value Heads (2)</text>
  <rect x="745" y="90" width="36" height="36" class="fig-23-head-v"/>
  <text x="763" y="113" text-anchor="middle" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#b8721a">V</text>
  <text x="763" y="145" text-anchor="middle" class="fig-23-text-xs">0</text>

  <rect x="745" y="160" width="36" height="36" class="fig-23-head-v"/>
  <text x="763" y="183" text-anchor="middle" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#b8721a">V</text>
  <text x="763" y="215" text-anchor="middle" class="fig-23-text-xs">1</text>

  <!-- Q heads (center block, 64 heads in 2 main groups) -->
  <text x="430" y="70" class="fig-23-text-hl">Query Heads (64) — head_dim = 128</text>

  <!-- Group 0 (32 Q heads connected to KV 0) -->
  <text x="298" y="95" class="fig-23-text-sm">Group 0</text>
  <line x1="280" y1="98" x2="280" y2="235" stroke="#4a7ab0" stroke-width="0.5" stroke-dasharray="2,3"/>

