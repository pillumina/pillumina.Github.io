  <!-- Title -->
  <text x="30" y="28" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#000">Fig 2.3 — GQA Configuration: 64 Query Heads vs 2 Key/Value Heads (32:1 Grouping)</text>
  <line x1="30" y1="36" x2="800" y2="36" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- ===== LEFT SIDE: Head visualization ===== -->

  <!-- K heads (left side, vertical) -->
