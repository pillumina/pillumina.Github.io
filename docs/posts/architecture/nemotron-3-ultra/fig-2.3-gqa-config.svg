  <line x1="745" y1="108" x2="330" y2="121" class="fig-23-arrow-qv"/>
  <line x1="745" y1="108" x2="200" y2="157" class="fig-23-arrow-qv"/>

  <!-- ===== Computation Detail ===== -->
  <line x1="30" y1="260" x2="860" y2="260" stroke="#1a3a6e" stroke-width="0.5"/>

  <text x="30" y="290" class="fig-23-text-hl">Attention Computation per Hybrid Block</text>

  <rect x="30" y="305" width="830" height="185" rx="0" ry="0" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.03"/>

  <!-- Hidden state -->
  <rect x="50" y="320" width="140" height="30" stroke="#1a3a6e" stroke-width="1.5" fill="#1a3a6e" fill-opacity="0.08"/>
  <text x="120" y="339" text-anchor="middle" class="fig-23-text-sm">Hidden [B,S,8192]</text>

  <!-- Arrow -->
  <line x1="190" y1="335" x2="220" y2="335" stroke="#1a3a6e" stroke-width="1"/>
  <polygon points="215,331 220,335 215,339" fill="#1a3a6e"/>

  <!-- Q projection -->
  <rect x="220" y="315" width="150" height="40" stroke="#1a3a6e" stroke-width="1.5" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="295" y="331" text-anchor="middle" class="fig-23-text-sm">Q Proj</text>
  <text x="295" y="347" text-anchor="middle" class="fig-23-text-xs">8192&#8594;64&#215;128=8192</text>

  <!-- Arrow -->
  <line x1="370" y1="335" x2="400" y2="335" stroke="#1a3a6e" stroke-width="1"/>
  <polygon points="395,331 400,335 395,339" fill="#1a3a6e"/>

  <!-- Q reshape -->
  <rect x="400" y="318" width="130" height="34" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.04"/>
  <text x="465" y="334" text-anchor="middle" class="fig-23-text-sm">Q reshape</text>
  <text x="465" y="347" text-anchor="middle" class="fig-23-text-xs">[B,S,64,128]</text>

  <!-- K projection -->
  <rect x="220" y="365" width="150" height="40" stroke="#4a7ab0" stroke-width="1.5" fill="#4a7ab0" fill-opacity="0.06"/>
  <text x="295" y="381" text-anchor="middle" class="fig-23-text-sm">K Proj</text>
  <text x="295" y="397" text-anchor="middle" class="fig-23-text-xs">8192&#8594;2&#215;128=256</text>

  <!-- Arrow -->
  <line x1="370" y1="385" x2="400" y2="385" stroke="#4a7ab0" stroke-width="1"/>
  <polygon points="395,381 400,385 395,389" fill="#4a7ab0"/>

  <!-- K reshape -->
  <rect x="400" y="368" width="130" height="34" stroke="#4a7ab0" stroke-width="1" fill="#4a7ab0" fill-opacity="0.04"/>
  <text x="465" y="384" text-anchor="middle" class="fig-23-text-sm">K reshape</text>
  <text x="465" y="397" text-anchor="middle" class="fig-23-text-xs">[B,S,2,128]&#8594;expand</text>

  <!-- V projection -->
  <rect x="220" y="415" width="150" height="40" stroke="#b8721a" stroke-width="1.5" fill="#b8721a" fill-opacity="0.06"/>
  <text x="295" y="431" text-anchor="middle" class="fig-23-text-sm">V Proj</text>
  <text x="295" y="447" text-anchor="middle" class="fig-23-text-xs">8192&#8594;2&#215;128=256</text>

