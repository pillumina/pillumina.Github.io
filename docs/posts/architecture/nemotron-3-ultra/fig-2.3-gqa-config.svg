  <rect x="654" y="162" width="18" height="14" class="fig-23-head-q"/>

  <text x="590" y="195" text-anchor="middle" class="fig-23-text-xs">&#215; 32 Query heads share 1 KV pair</text>

  <!-- Connection arrows from K0 to Q group 0 -->
  <line x1="116" y1="108" x2="160" y2="121" class="fig-23-arrow-qk"/>
  <line x1="116" y1="108" x2="300" y2="120" class="fig-23-arrow-qk"/>
  <line x1="116" y1="160" x2="200" y2="157" class="fig-23-arrow-qk"/>

  <!-- Connection arrows from K1 to Q group 1 -->
  <line x1="116" y1="178" x2="500" y2="121" class="fig-23-arrow-qk"/>
  <line x1="116" y1="178" x2="600" y2="120" class="fig-23-arrow-qk"/>
  <line x1="116" y1="178" x2="680" y2="157" class="fig-23-arrow-qk"/>

