  <polygon points="395,431 400,435 395,439" fill="#b8721a"/>

  <!-- V reshape -->
  <rect x="400" y="418" width="130" height="34" stroke="#b8721a" stroke-width="1" fill="#b8721a" fill-opacity="0.04"/>
  <text x="465" y="434" text-anchor="middle" class="fig-23-text-sm">V reshape</text>
  <text x="465" y="447" text-anchor="middle" class="fig-23-text-xs">[B,S,2,128]&#8594;expand</text>

  <!-- Combine / SDPA -->
  <rect x="560" y="340" width="160" height="60" stroke="#1a3a6e" stroke-width="1.5" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="640" y="362" text-anchor="middle" class="fig-23-text-sm">SDPA</text>
  <text x="640" y="378" text-anchor="middle" class="fig-23-text-xs">Q,K,V + Scale</text>
  <text x="640" y="393" text-anchor="middle" class="fig-23-text-xs">No RoPE</text>

  <!-- Arrows into SDPA -->
  <line x1="530" y1="332" x2="560" y2="350" stroke="#1a3a6e" stroke-width="1"/>
  <line x1="530" y1="385" x2="560" y2="365" stroke="#4a7ab0" stroke-width="1"/>
  <line x1="530" y1="435" x2="560" y2="380" stroke="#b8721a" stroke-width="1"/>

  <!-- Output -->
  <line x1="720" y1="370" x2="750" y2="370" stroke="#1a3a6e" stroke-width="1"/>
  <polygon points="745,366 750,370 745,374" fill="#1a3a6e"/>

  <rect x="750" y="355" width="95" height="30" stroke="#1a3a6e" stroke-width="1.5" fill="#1a3a6e" fill-opacity="0.08"/>
  <text x="797" y="374" text-anchor="middle" class="fig-23-text-sm">[B,S,8192]</text>

  <!-- ===== Why No RoPE ===== -->
  <text x="30" y="530" class="fig-23-text-accent">Why No RoPE?</text>
  <text x="30" y="550" class="fig-23-text-sm">Mamba-2 layers provide implicit positional information through</text>
  <text x="30" y="568" class="fig-23-text-sm">their sequential state-space structure. Attention layers embedded</text>
  <text x="30" y="586" class="fig-23-text-sm">among Mamba layers inherit this implicit position awareness,</text>
  <text x="30" y="604" class="fig-23-text-sm">eliminating the need for explicit RoPE positional encoding.</text>

  <!-- ===== LEGEND ===== -->
  <rect x="500" y="530" width="280" height="80" class="fig-23-legend-box"/>
  <text x="515" y="550" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#000">Legend</text>

  <rect x="515" y="562" width="20" height="12" class="fig-23-head-q"/>
  <text x="545" y="573" class="fig-23-text-xs">Query head</text>

  <rect x="625" y="562" width="20" height="12" class="fig-23-head-k"/>
  <text x="655" y="573" class="fig-23-text-xs">Key head</text>

  <rect x="740" y="562" width="20" height="12" class="fig-23-head-v"/>
  <text x="770" y="573" class="fig-23-text-xs">Value head</text>

  <text x="515" y="600" class="fig-23-text-xs">Ratio: 64 Q-heads / 2 KV-heads = 32:1 GQA</text>
</svg>
