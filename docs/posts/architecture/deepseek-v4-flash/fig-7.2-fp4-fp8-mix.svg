<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Courier New, monospace">
  <defs>
    <linearGradient id="fp4grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c84a3a"/>
      <stop offset="1" stop-color="#7a1f15"/>
    </linearGradient>
    <linearGradient id="fp8grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a7fb8"/>
      <stop offset="1" stop-color="#2a4d7a"/>
    </linearGradient>
    <linearGradient id="bf16grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aaaaaa"/>
      <stop offset="1" stop-color="#666666"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="#fafaf7"/>

  <!-- title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">V4-Flash 精度分配（FP4 路由专家 + FP8 主干 + BF16 计算）</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#666">训练侧 QAT 模拟 FP4 精度；推理侧按 block 粒度反量化到 BF16 计算</text>

  <!-- ===== Legend ===== -->
  <g transform="translate(70, 90)">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="22" height="22" fill="url(#fp4grad)"/>
      <text x="30" y="16" font-size="12" font-weight="bold" fill="#7a1f15">FP4 (E2M1, block=32)</text>
    </g>
    <g transform="translate(280,0)">
      <rect x="0" y="0" width="22" height="22" fill="url(#fp8grad)"/>
      <text x="30" y="16" font-size="12" font-weight="bold" fill="#2a4d7a">FP8 (E4M3, block=128)</text>
    </g>
    <g transform="translate(580,0)">
      <rect x="0" y="0" width="22" height="22" fill="url(#bf16grad)"/>
      <text x="30" y="16" font-size="12" font-weight="bold" fill="#444">BF16 (反量化后计算)</text>
    </g>
    <g transform="translate(880,0)">
      <rect x="0" y="0" width="22" height="22" fill="#fff" stroke="#888" stroke-dasharray="3,2"/>
      <text x="30" y="16" font-size="12" fill="#666">FP32 累加</text>
    </g>
  </g>

  <!-- ===== Layered block: V4-Flash model components ===== -->
  <g transform="translate(70, 145)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">V4-Flash 组件 → 精度映射（从上到下）</text>

    <!-- Layer 1: Embedding -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="1060" height="38" rx="3" fill="url(#fp8grad)" stroke="#2a4d7a" stroke-width="1"/>
      <text x="20" y="24" font-size="13" font-weight="bold" fill="#fff">ParallelEmbedding (vocab=129280, dim=2048)</text>
      <text x="1040" y="24" text-anchor="end" font-size="11" fill="#fff">FP8 · block=128 · E4M3</text>
    </g>

    <!-- Layer 2: 60 Blocks (Attention + MoE) -->
    <g transform="translate(0, 65)">
      <rect x="0" y="0" width="1060" height="100" rx="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <text x="20" y="20" font-size="13" font-weight="bold" fill="#333">60 × Transformer Block</text>

      <!-- 60 blocks visualization: 60 small rects, alternating colors -->
      <g transform="translate(180, 30)">
        <!-- Attention (FP8) -->
        <rect x="0" y="0" width="700" height="22" rx="2" fill="url(#fp8grad)" stroke="#2a4d7a" stroke-width="0.5"/>
        <text x="10" y="16" font-size="10" font-weight="bold" fill="#fff">Attention (CSA + HCA) + Norm</text>
        <text x="690" y="16" text-anchor="end" font-size="10" fill="#fff">FP8 · block=128</text>

        <!-- Shared expert (FP8) -->
        <rect x="0" y="28" width="700" height="18" rx="2" fill="url(#fp8grad)" stroke="#2a4d7a" stroke-width="0.5" opacity="0.85"/>
        <text x="10" y="42" font-size="10" font-weight="bold" fill="#fff">Shared Expert (1)</text>
        <text x="690" y="42" text-anchor="end" font-size="10" fill="#fff">FP8 · block=128</text>

        <!-- Routed experts (FP4) -->
        <rect x="0" y="52" width="700" height="22" rx="2" fill="url(#fp4grad)" stroke="#7a1f15" stroke-width="0.5"/>
        <text x="10" y="68" font-size="10" font-weight="bold" fill="#fff">Routed Experts (256, top-8)</text>
        <text x="690" y="68" text-anchor="end" font-size="10" fill="#fff">FP4 · block=32 · E2M1 · 4x 内存节省</text>
      </g>
    </g>

    <!-- Layer 3: MTP Blocks -->
    <g transform="translate(0, 172)">
      <rect x="0" y="0" width="1060" height="28" rx="3" fill="url(#fp8grad)" stroke="#2a4d7a" stroke-width="1" opacity="0.7"/>
      <text x="20" y="19" font-size="12" font-weight="bold" fill="#fff">1 × MTPBlock (num_nextn_predict_layers=1)</text>
      <text x="1040" y="19" text-anchor="end" font-size="10" fill="#fff">FP8 (沿用主干精度)</text>
    </g>

    <!-- Layer 4: Norm + LM Head -->
    <g transform="translate(0, 207)">
      <rect x="0" y="0" width="1060" height="28" rx="3" fill="url(#fp8grad)" stroke="#2a4d7a" stroke-width="1" opacity="0.85"/>
      <text x="20" y="19" font-size="12" font-weight="bold" fill="#fff">Final RMSNorm + ParallelHead (lm_head)</text>
      <text x="1040" y="19" text-anchor="end" font-size="10" fill="#fff">FP8 · vocab=129280 输出</text>
    </g>
  </g>

  <!-- ===== Right panel: Memory comparison ===== -->
  <g transform="translate(70, 400)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">存储对比：MoE 路由专家 (256 × 2048 × 1408)</text>
    <text x="0" y="18" font-size="11" fill="#666">单卡 (1/256 expert) 视角：dim=2048 in, 1408 out</text>

    <!-- 3 bars: BF16 / FP8 / FP4 -->
    <g transform="translate(0, 35)">
      <text x="0" y="14" font-size="11" fill="#444">BF16</text>
      <rect x="100" y="0" width="800" height="22" fill="url(#bf16grad)" stroke="#666" stroke-width="0.5"/>
      <text x="910" y="14" font-size="11" font-weight="bold" fill="#444">~11.3 MB / expert</text>
      <text x="100" y="36" font-size="9" fill="#888">2 bytes/param × (2048×1408) = 5.77M params</text>
    </g>

    <g transform="translate(0, 80)">
      <text x="0" y="14" font-size="11" fill="#2a4d7a">FP8</text>
      <rect x="100" y="0" width="400" height="22" fill="url(#fp8grad)" stroke="#2a4d7a" stroke-width="0.5"/>
      <text x="510" y="14" font-size="11" font-weight="bold" fill="#2a4d7a">~5.7 MB / expert (2x↓)</text>
      <text x="100" y="36" font-size="9" fill="#2a4d7a">1 byte/param + scale (block=128)</text>
    </g>

    <g transform="translate(0, 125)">
      <text x="0" y="14" font-size="11" fill="#7a1f15">FP4</text>
      <rect x="100" y="0" width="200" height="22" fill="url(#fp4grad)" stroke="#7a1f15" stroke-width="0.5"/>
      <text x="310" y="14" font-size="11" font-weight="bold" fill="#7a1f15">~2.9 MB / expert (4x↓)</text>
      <text x="100" y="36" font-size="9" fill="#7a1f15">0.5 byte/param + E8M0 scale (block=32)</text>
    </g>
  </g>

  <!-- ===== Right panel: QAT training flow ===== -->
  <g transform="translate(70, 580)">
    <rect x="0" y="0" width="1060" height="100" rx="6" fill="#f4f6fb" stroke="#5a7fb8" stroke-width="1"/>
    <text x="20" y="25" font-size="13" font-weight="bold" fill="#2a4d7a">量化感知训练 (QAT) 流程：模拟 FP4 数值精度</text>

    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="160" height="45" rx="4" fill="#fff" stroke="#888"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">前向：W → FP4 量化</text>
      <text x="80" y="36" text-anchor="middle" font-size="9" fill="#888">round-to-nearest + block scale</text>
    </g>

    <g transform="translate(200, 40)">
      <line x1="0" y1="22" x2="20" y2="22" stroke="#333" stroke-width="2" marker-end="url(#arr7)"/>
    </g>

    <g transform="translate(230, 40)">
      <rect x="0" y="0" width="180" height="45" rx="4" fill="url(#bf16grad)" stroke="#666"/>
      <text x="90" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">反量化到 BF16 计算</text>
      <text x="90" y="36" text-anchor="middle" font-size="9" fill="#fff">dW · dequant(W_fp4) · x</text>
    </g>

    <g transform="translate(430, 40)">
      <line x1="0" y1="22" x2="20" y2="22" stroke="#333" stroke-width="2" marker-end="url(#arr7)"/>
    </g>

    <g transform="translate(460, 40)">
      <rect x="0" y="0" width="170" height="45" rx="4" fill="#fff" stroke="#888"/>
      <text x="85" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">反向：FP32 梯度累加</text>
      <text x="85" y="36" text-anchor="middle" font-size="9" fill="#888">无 quantize 误差</text>
    </g>

    <g transform="translate(650, 40)">
      <line x1="0" y1="22" x2="20" y2="22" stroke="#333" stroke-width="2" marker-end="url(#arr7)"/>
    </g>

    <g transform="translate(680, 40)">
      <rect x="0" y="0" width="180" height="45" rx="4" fill="url(#fp4grad)" stroke="#7a1f15"/>
      <text x="90" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">更新 W → 重新 quant</text>
      <text x="90" y="36" text-anchor="middle" font-size="9" fill="#fff">straight-through estimator</text>
    </g>

    <g transform="translate(880, 40)">
      <rect x="0" y="0" width="160" height="45" rx="4" fill="url(#fp4grad)" stroke="#7a1f15" opacity="0.7"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">推理：直接用 FP4</text>
      <text x="80" y="36" text-anchor="middle" font-size="9" fill="#fff">省 4x 显存</text>
    </g>
  </g>

  <!-- arrowhead marker (define locally for this svg) -->
  <defs>
    <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="600" y="705" text-anchor="middle" font-size="10" fill="#888">来源：config.json（L37-L40）+ inference/kernel.py act_quant_kernel (FP8) + fp4_quant_kernel (FP4)</text>
</svg>
