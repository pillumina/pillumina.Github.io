<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Courier New, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a3a6e"/>
    </marker>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4fa"/>
      <stop offset="50%" stop-color="#7fa6d6"/>
      <stop offset="100%" stop-color="#1a3a6e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="640" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">
    Sinkhorn-Knopp Projection: From Arbitrary Matrix to Doubly-Stochastic Matrix
  </text>
  <text x="600" y="55" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    hc_sinkhorn_iters = 20, hc_eps = 1e-6, hc_mult = 4 (V4-Flash config)
  </text>

  <!-- ============== LEFT: Initial M (raw) ============== -->
  <text x="200" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">
    1. Initial M = α_comb_raw
  </text>
  <text x="200" y="118" text-anchor="middle" font-size="11" fill="#666">
    (learned from mixes, arbitrary non-negative)
  </text>

  <!-- 4x4 grid: M with varying values (shown as grayscale) -->
  <g transform="translate(110,140)">
    <rect x="0" y="0" width="180" height="180" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <!-- rows of cells with different shading -->
    <!-- Row 1 -->
    <rect x="0"   y="0"   width="45" height="45" fill="#e8e8e8"/>
    <rect x="45"  y="0"   width="45" height="45" fill="#bfbfbf"/>
    <rect x="90"  y="0"   width="45" height="45" fill="#dcdcdc"/>
    <rect x="135" y="0"   width="45" height="45" fill="#f5f5f5"/>
    <!-- Row 2 -->
    <rect x="0"   y="45"  width="45" height="45" fill="#b8b8b8"/>
    <rect x="45"  y="45"  width="45" height="45" fill="#9c9c9c"/>
    <rect x="90"  y="45"  width="45" height="45" fill="#d0d0d0"/>
    <rect x="135" y="45"  width="45" height="45" fill="#e8e8e8"/>
    <!-- Row 3 -->
    <rect x="0"   y="90"  width="45" height="45" fill="#cccccc"/>
    <rect x="45"  y="90"  width="45" height="45" fill="#e0e0e0"/>
    <rect x="90"  y="90"  width="45" height="45" fill="#a8a8a8"/>
    <rect x="135" y="90"  width="45" height="45" fill="#bcbcbc"/>
    <!-- Row 4 -->
    <rect x="0"   y="135" width="45" height="45" fill="#d4d4d4"/>
    <rect x="45"  y="135" width="45" height="45" fill="#b0b0b0"/>
    <rect x="90"  y="135" width="45" height="45" fill="#cacaca"/>
    <rect x="135" y="135" width="45" height="45" fill="#a0a0a0"/>
    <!-- Grid lines -->
    <line x1="0"   y1="45"  x2="180" y2="45"  stroke="#222" stroke-width="0.8"/>
    <line x1="0"   y1="90"  x2="180" y2="90"  stroke="#222" stroke-width="0.8"/>
    <line x1="0"   y1="135" x2="180" y2="135" stroke="#222" stroke-width="0.8"/>
    <line x1="45"  y1="0"   x2="45"  y2="180" stroke="#222" stroke-width="0.8"/>
    <line x1="90"  y1="0"   x2="90"  y2="180" stroke="#222" stroke-width="0.8"/>
    <line x1="135" y1="0"   x2="135" y2="180" stroke="#222" stroke-width="0.8"/>
    <!-- Cell values (varying) -->
    <g font-size="10" font-family="Cambria, serif" fill="#222">
      <text x="22"  y="28"  text-anchor="middle">0.31</text>
      <text x="67"  y="28"  text-anchor="middle">1.42</text>
      <text x="112" y="28"  text-anchor="middle">0.85</text>
      <text x="157" y="28"  text-anchor="middle">0.18</text>
      <text x="22"  y="73"  text-anchor="middle">1.85</text>
      <text x="67"  y="73"  text-anchor="middle">2.21</text>
      <text x="112" y="73"  text-anchor="middle">0.94</text>
      <text x="157" y="73"  text-anchor="middle">0.62</text>
      <text x="22"  y="118" text-anchor="middle">0.55</text>
      <text x="67"  y="118" text-anchor="middle">0.41</text>
      <text x="112" y="118" text-anchor="middle">2.08</text>
      <text x="157" y="118" text-anchor="middle">1.15</text>
      <text x="22"  y="163" text-anchor="middle">0.78</text>
      <text x="67"  y="163" text-anchor="middle">1.65</text>
      <text x="112" y="163" text-anchor="middle">0.49</text>
      <text x="157" y="163" text-anchor="middle">2.34</text>
    </g>
  </g>

  <text x="200" y="345" text-anchor="middle" font-size="10" fill="#666">
    Row sums: vary (e.g. 2.76, 5.62, 4.19, 5.26)
  </text>
  <text x="200" y="360" text-anchor="middle" font-size="10" fill="#666">
    Col sums: vary (e.g. 3.49, 5.69, 4.36, 4.29)
  </text>
  <text x="200" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#c25a1a">
    NOT doubly-stochastic
  </text>

  <!-- ============== MIDDLE: Iteration ============== -->
  <line x1="310" y1="220" x2="430" y2="220" stroke="#1a3a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <text x="600" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a3a6e">
    2. Sinkhorn Iteration (20 steps)
  </text>
  <text x="600" y="118" text-anchor="middle" font-size="11" fill="#666">
    alternating row/col normalization
  </text>

  <!-- pseudocode box -->
  <rect x="450" y="140" width="320" height="200" fill="#f4f8fc" stroke="#1a3a6e" stroke-width="1.5" rx="4"/>
  <text x="610" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a6e">Algorithm</text>
  <g font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#222">
    <text x="470" y="195">M = softmax(mixes) + eps</text>
    <text x="470" y="218">for iter in range(20):</text>
    <text x="490" y="238">  r = M.sum(dim=1)   # row</text>
    <text x="490" y="256">  M = M / (r + eps)  # row norm</text>
    <text x="490" y="276">  c = M.sum(dim=0)   # col</text>
    <text x="490" y="294">  M = M / (c + eps)  # col norm</text>
    <text x="470" y="318">return M</text>
  </g>
  <text x="610" y="332" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    eps = 1e-6 (numerical stability)
  </text>

  <!-- Convergence diagram below -->
  <text x="610" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">Convergence:</text>
  <text x="610" y="382" text-anchor="middle" font-size="10" fill="#555">‖row_sum - 1‖ → 0, ‖col_sum - 1‖ → 0</text>
  <text x="610" y="400" text-anchor="middle" font-size="10" fill="#555">Rate: O(log(1/δ)) iterations to reach δ error</text>

  <!-- small step boxes -->
  <g font-size="9" fill="#1a3a6e">
    <rect x="470" y="430" width="60"  height="22" fill="#e8f4ff" stroke="#1a3a6e" stroke-width="1" rx="2"/>
    <text x="500" y="445" text-anchor="middle">softmax</text>

    <line x1="530" y1="441" x2="555" y2="441" stroke="#1a3a6e" stroke-width="1.5" marker-end="url(#arrB)"/>

    <rect x="555" y="430" width="60"  height="22" fill="#e8f4ff" stroke="#1a3a6e" stroke-width="1" rx="2"/>
    <text x="585" y="445" text-anchor="middle">row norm</text>

    <line x1="615" y1="441" x2="640" y2="441" stroke="#1a3a6e" stroke-width="1.5" marker-end="url(#arrB)"/>

    <rect x="640" y="430" width="60"  height="22" fill="#e8f4ff" stroke="#1a3a6e" stroke-width="1" rx="2"/>
    <text x="670" y="445" text-anchor="middle">col norm</text>

    <line x1="700" y1="441" x2="725" y2="441" stroke="#1a3a6e" stroke-width="1.5" marker-end="url(#arrB)"/>

    <rect x="725" y="430" width="45"  height="22" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="1" rx="2"/>
    <text x="747" y="445" text-anchor="middle" fill="#fff">×19</text>
  </g>

  <!-- Property highlights below -->
  <rect x="450" y="475" width="320" height="50" fill="#fff8e1" stroke="#b8860b" stroke-width="1" rx="4"/>
  <text x="610" y="495" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">Why doubly-stochastic?</text>
  <text x="610" y="513" text-anchor="middle" font-size="10" fill="#555">max eigenvalue = 1 → signal Lipschitz bounded</text>

  <!-- ============== RIGHT: Converged M ============== -->
  <line x1="790" y1="220" x2="910" y2="220" stroke="#1a3a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <text x="1050" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a3a6e">
    3. Converged M = α_comb
  </text>
  <text x="1050" y="118" text-anchor="middle" font-size="11" fill="#666">
    (doubly-stochastic: row &amp; col sums = 1)
  </text>

  <g transform="translate(960,140)">
    <rect x="0" y="0" width="180" height="180" fill="#fff" stroke="#1a3a6e" stroke-width="2"/>
    <!-- Row 1: sum = 1, e.g. 0.25, 0.30, 0.20, 0.25 -->
    <rect x="0"   y="0"   width="45" height="45" fill="#a4bcd9"/>
    <rect x="45"  y="0"   width="45" height="45" fill="#7fa6d6"/>
    <rect x="90"  y="0"   width="45" height="45" fill="#b8c9e0"/>
    <rect x="135" y="0"   width="45" height="45" fill="#a4bcd9"/>
    <!-- Row 2: 0.30, 0.20, 0.25, 0.25 -->
    <rect x="0"   y="45"  width="45" height="45" fill="#7fa6d6"/>
    <rect x="45"  y="45"  width="45" height="45" fill="#b8c9e0"/>
    <rect x="90"  y="45"  width="45" height="45" fill="#a4bcd9"/>
    <rect x="135" y="45"  width="45" height="45" fill="#a4bcd9"/>
    <!-- Row 3: 0.25, 0.25, 0.30, 0.20 -->
    <rect x="0"   y="90"  width="45" height="45" fill="#a4bcd9"/>
    <rect x="45"  y="90"  width="45" height="45" fill="#a4bcd9"/>
    <rect x="90"  y="90"  width="45" height="45" fill="#7fa6d6"/>
    <rect x="135" y="90"  width="45" height="45" fill="#c8d4e6"/>
    <!-- Row 4: 0.20, 0.25, 0.25, 0.30 -->
    <rect x="0"   y="135" width="45" height="45" fill="#c8d4e6"/>
    <rect x="45"  y="135" width="45" height="45" fill="#a4bcd9"/>
    <rect x="90"  y="135" width="45" height="45" fill="#a4bcd9"/>
    <rect x="135" y="135" width="45" height="45" fill="#7fa6d6"/>
    <!-- Grid lines -->
    <line x1="0"   y1="45"  x2="180" y2="45"  stroke="#1a3a6e" stroke-width="0.8"/>
    <line x1="0"   y1="90"  x2="180" y2="90"  stroke="#1a3a6e" stroke-width="0.8"/>
    <line x1="0"   y1="135" x2="180" y2="135" stroke="#1a3a6e" stroke-width="0.8"/>
    <line x1="45"  y1="0"   x2="45"  y2="180" stroke="#1a3a6e" stroke-width="0.8"/>
    <line x1="90"  y1="0"   x2="90"  y2="180" stroke="#1a3a6e" stroke-width="0.8"/>
    <line x1="135" y1="0"   x2="135" y2="180" stroke="#1a3a6e" stroke-width="0.8"/>
    <g font-size="10" font-family="Cambria, serif" fill="#1a3a6e" font-weight="bold">
      <text x="22"  y="28"  text-anchor="middle">.25</text>
      <text x="67"  y="28"  text-anchor="middle">.30</text>
      <text x="112" y="28"  text-anchor="middle">.20</text>
      <text x="157" y="28"  text-anchor="middle">.25</text>
      <text x="22"  y="73"  text-anchor="middle">.30</text>
      <text x="67"  y="73"  text-anchor="middle">.20</text>
      <text x="112" y="73"  text-anchor="middle">.25</text>
      <text x="157" y="73"  text-anchor="middle">.25</text>
      <text x="22"  y="118" text-anchor="middle">.25</text>
      <text x="67"  y="118" text-anchor="middle">.25</text>
      <text x="112" y="118" text-anchor="middle">.30</text>
      <text x="157" y="118" text-anchor="middle">.20</text>
      <text x="22"  y="163" text-anchor="middle">.20</text>
      <text x="67"  y="163" text-anchor="middle">.25</text>
      <text x="112" y="163" text-anchor="middle">.25</text>
      <text x="157" y="163" text-anchor="middle">.30</text>
    </g>
  </g>

  <text x="1050" y="345" text-anchor="middle" font-size="10" fill="#1a3a6e" font-weight="bold">
    Row sums: 1.00, 1.00, 1.00, 1.00
  </text>
  <text x="1050" y="360" text-anchor="middle" font-size="10" fill="#1a3a6e" font-weight="bold">
    Col sums: 1.00, 1.00, 1.00, 1.00
  </text>
  <text x="1050" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">
    DOUBLY-STOCHASTIC ✓
  </text>

  <!-- Bottom legend / footer -->
  <rect x="60" y="540" width="1080" height="80" fill="#f0f0f0" stroke="#888" stroke-width="1" rx="4"/>
  <text x="80" y="563" font-size="12" font-weight="bold" fill="#222">Key facts (V4-Flash config):</text>
  <text x="80" y="582" font-size="10" fill="#555">• hc_sinkhorn_iters = 20 (V4-Flash config.json)</text>
  <text x="80" y="598" font-size="10" fill="#555">• hc_eps = 1e-6 (numerical stability: divide by zero protection)</text>
  <text x="80" y="614" font-size="10" fill="#555">• Convergence rate: O(log(1/δ)) iterations to reach δ error (Sinkhorn 1964 / Cuturi 2013)</text>
  <text x="600" y="563" font-size="12" font-weight="bold" fill="#222">Why this guarantees stability:</text>
  <text x="600" y="582" font-size="10" fill="#555">• Doubly-stochastic matrix has all eigenvalues ≤ 1</text>
  <text x="600" y="598" font-size="10" fill="#555">• Signal ‖M·x‖ ≤ ‖x‖ (Lipschitz constant = 1)</text>
  <text x="600" y="614" font-size="10" fill="#555">• Deep stack of 86 mHC blocks: signal variance is BLOW-UP free</text>
</svg>
