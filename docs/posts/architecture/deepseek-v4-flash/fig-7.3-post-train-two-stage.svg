<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Courier New, monospace">
  <defs>
    <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
    <marker id="arrOPD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c84a3a"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#fafaf7"/>

  <!-- title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">V4 后训练两阶段：Specialist Training + On-Policy Distillation</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#666">V4 关键创新：先按领域培养专家，再 on-policy 蒸馏回主模型（V3 只有 SFT + GRPO）</text>

  <!-- ===== Stage 1: Specialist Training ===== -->
  <g transform="translate(50, 110)">
    <rect x="0" y="0" width="320" height="500" rx="8" fill="#fff" stroke="#5a7fb8" stroke-width="1.5"/>
    <text x="160" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a4d7a">阶段 1: Specialist Training</text>
    <text x="160" y="50" text-anchor="middle" font-size="11" fill="#666">论文 §5.1.1 (L1847-L2054)</text>
    <text x="160" y="68" text-anchor="middle" font-size="10" fill="#888">独立训练 4 个领域专家</text>

    <!-- 4 expert boxes -->
    <g transform="translate(20, 90)">
      <!-- Code expert -->
      <g>
        <rect x="0" y="0" width="280" height="75" rx="5" fill="#f4f6fb" stroke="#5a7fb8" stroke-width="1"/>
        <text x="140" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a4d7a">Code Specialist</text>
        <text x="20" y="40" font-size="10" fill="#444">数据：GitHub + LeetCode + LiveCodeBench</text>
        <text x="20" y="56" font-size="10" fill="#444">训练：SFT (代码指令) → GRPO (test cases)</text>
        <text x="20" y="70" font-size="9" fill="#888">奖励：unit test pass rate</text>
      </g>

      <!-- Math expert -->
      <g transform="translate(0, 90)">
        <rect x="0" y="0" width="280" height="75" rx="5" fill="#f4f6fb" stroke="#5a7fb8" stroke-width="1"/>
        <text x="140" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a4d7a">Math Specialist</text>
        <text x="20" y="40" font-size="10" fill="#444">数据：AoPS + GSM8K + MATH + 合成证明</text>
        <text x="20" y="56" font-size="10" fill="#444">训练：SFT (解题步骤) → GRPO (verifier)</text>
        <text x="20" y="70" font-size="9" fill="#888">奖励：答案匹配 + 步骤完整</text>
      </g>

      <!-- Reasoning expert -->
      <g transform="translate(0, 180)">
        <rect x="0" y="0" width="280" height="75" rx="5" fill="#f4f6fb" stroke="#5a7fb8" stroke-width="1"/>
        <text x="140" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a4d7a">Reasoning Specialist</text>
        <text x="20" y="40" font-size="10" fill="#444">数据：MMLU-Pro + ARC + BBH + 谜题</text>
        <text x="20" y="56" font-size="10" fill="#444">训练：SFT (CoT) → GRPO (consistency)</text>
        <text x="20" y="70" font-size="9" fill="#888">奖励：多模型投票 + 自洽性</text>
      </g>

      <!-- Agent expert -->
      <g transform="translate(0, 270)">
        <rect x="0" y="0" width="280" height="75" rx="5" fill="#f4f6fb" stroke="#5a7fb8" stroke-width="1"/>
        <text x="140" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a4d7a">Agent Specialist</text>
        <text x="20" y="40" font-size="10" fill="#444">数据：tool-use + web agent + SWE-Bench</text>
        <text x="20" y="56" font-size="10" fill="#444">训练：SFT (trajectory) → GRPO (task success)</text>
        <text x="20" y="70" font-size="9" fill="#888">奖励：环境反馈 + 任务完成</text>
      </g>
    </g>

    <text x="160" y="485" text-anchor="middle" font-size="10" font-style="italic" fill="#666">每个专家独立从 V4 基础模型微调</text>
  </g>

  <!-- ===== Middle: OPD arrow ===== -->
  <g>
    <line x1="385" y1="360" x2="495" y2="360" stroke="#c84a3a" stroke-width="3.5" marker-end="url(#arrOPD)"/>
    <text x="440" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#c84a3a">On-Policy Distillation</text>
    <text x="440" y="385" text-anchor="middle" font-size="10" fill="#c84a3a">论文 §5.1.2 (L2055-L2099)</text>
    <text x="440" y="402" text-anchor="middle" font-size="9" fill="#666">用主模型自己生成样本</text>
    <text x="440" y="418" text-anchor="middle" font-size="9" fill="#666">专家提供 token-level logit</text>
  </g>

  <!-- ===== Stage 2: Unified V4-Flash ===== -->
  <g transform="translate(510, 110)">
    <rect x="0" y="0" width="320" height="500" rx="8" fill="#fff" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="160" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a1f15">阶段 2: Unified V4-Flash</text>
    <text x="160" y="50" text-anchor="middle" font-size="11" fill="#666">on-policy 蒸馏回主模型</text>

    <g transform="translate(20, 90)">
      <rect x="0" y="0" width="280" height="240" rx="5" fill="#faf3f0" stroke="#c84a3a" stroke-width="1"/>
      <text x="140" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a1f15">V4-Flash 主模型 (284B/13B 激活)</text>

      <!-- OPD training flow -->
      <text x="140" y="48" text-anchor="middle" font-size="10" fill="#444">1. 主模型采样 (on-policy)</text>
      <text x="20" y="65" font-size="9" fill="#888">   x ~ π_V4(·|prompt), 生成完整轨迹</text>

      <text x="140" y="90" text-anchor="middle" font-size="10" fill="#444">2. 4 专家提供 logit p_expert(y|x)</text>
      <text x="20" y="107" font-size="9" fill="#888">   KL(π_V4 || π_expert) per token</text>

      <text x="140" y="132" text-anchor="middle" font-size="10" fill="#444">3. 不同 CoT 长度 → 3 推理模式</text>
      <text x="20" y="149" font-size="9" fill="#888">   short: Non-think / medium: High / long: Max</text>

      <text x="140" y="174" text-anchor="middle" font-size="10" fill="#444">4. 蒸馏损失 + SFT 损失</text>
      <text x="20" y="191" font-size="9" fill="#888">   L = α·L_KD + (1-α)·L_SFT</text>

      <text x="140" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a1f15">最终: 单一统一模型，三种行为</text>
    </g>

    <text x="160" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a1f15">3 个推理模式分支：</text>

    <!-- 3 mode boxes -->
    <g transform="translate(20, 400)">
      <rect x="0" y="0" width="85" height="55" rx="4" fill="#fff" stroke="#7a1f15" stroke-width="1"/>
      <text x="42" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a1f15">Non-think</text>
      <text x="42" y="35" text-anchor="middle" font-size="9" fill="#7a1f15">短 CoT</text>
      <text x="42" y="48" text-anchor="middle" font-size="8" fill="#888">≤256 token</text>
    </g>
    <g transform="translate(110, 400)">
      <rect x="0" y="0" width="80" height="55" rx="4" fill="#fff" stroke="#7a1f15" stroke-width="1"/>
      <text x="40" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a1f15">Think High</text>
      <text x="40" y="35" text-anchor="middle" font-size="9" fill="#7a1f15">中 CoT</text>
      <text x="40" y="48" text-anchor="middle" font-size="8" fill="#888">~2k token</text>
    </g>
    <g transform="translate(195, 400)">
      <rect x="0" y="0" width="85" height="55" rx="4" fill="#fff" stroke="#7a1f15" stroke-width="1"/>
      <text x="42" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a1f15">Think Max</text>
      <text x="42" y="35" text-anchor="middle" font-size="9" fill="#7a1f15">长 CoT</text>
      <text x="42" y="48" text-anchor="middle" font-size="8" fill="#888">~8k+ token</text>
    </g>

    <text x="160" y="480" text-anchor="middle" font-size="9" font-style="italic" fill="#666">V3 后训练：仅 SFT + GRPO（无 OPD）</text>
  </g>

  <!-- ===== Bottom: V3 vs V4 comparison ===== -->
  <g transform="translate(50, 640)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#333">V3 vs V4 后训练范式对比</text>

    <g transform="translate(0, 15)">
      <text x="0" y="14" font-size="11" fill="#666">V3 路径</text>
      <rect x="80" y="0" width="200" height="20" fill="#e8eef8" stroke="#5a7fb8"/>
      <text x="180" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a4d7a">SFT + GRPO</text>

      <line x1="290" y1="10" x2="340" y2="10" stroke="#333" stroke-width="2" marker-end="url(#arr7)"/>

      <text x="350" y="14" font-size="11" fill="#666">V4 路径</text>
      <rect x="430" y="0" width="160" height="20" fill="#faf3f0" stroke="#c84a3a"/>
      <text x="510" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a1f15">4 × Specialist</text>
      <line x1="600" y1="10" x2="650" y2="10" stroke="#c84a3a" stroke-width="2" marker-end="url(#arrOPD)"/>
      <rect x="660" y="0" width="180" height="20" fill="#faf3f0" stroke="#c84a3a"/>
      <text x="750" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a1f15">On-Policy Distill</text>

      <text x="870" y="14" font-size="11" font-weight="bold" fill="#7a1f15">+3 推理模式</text>
    </g>
  </g>

  <text x="600" y="700" text-anchor="middle" font-size="10" fill="#888">来源：V4 技术报告 §5.1.1-L1847 (Specialist) + §5.1.2-L2055 (OPD)</text>
</svg>
