<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="Courier New, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c84a3a"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a3a6e"/>
    </marker>
    <linearGradient id="lossA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fde2dd"/>
      <stop offset="100%" stop-color="#f5a896"/>
    </linearGradient>
    <linearGradient id="lossB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dde6f4"/>
      <stop offset="100%" stop-color="#7a9bce"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">
    AdamW vs Muon: Element-wise vs Orthogonal Update Direction
  </text>
  <text x="600" y="55" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    W ∈ R^{n×m} — AdamW 逐元素加扰动 vs Muon 把整个更新方向正交化（O' ≈ UV^⊤）
  </text>

  <!-- ============== LEFT: AdamW ============== -->
  <g transform="translate(40, 90)">
    <text x="250" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#c84a3a">
      AdamW: Element-wise Update
    </text>
    <text x="250" y="20" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
      每个 w_ij 独立计算 v_t (element-wise 2nd moment)
    </text>

    <!-- Matrix W grid 5x5 (AdamW) -->
    <g transform="translate(60, 50)">
      <rect x="0" y="0" width="380" height="200" fill="white" stroke="#888" stroke-width="1.5"/>
      <!-- Grid lines -->
      <g stroke="#bbb" stroke-width="0.5">
        <line x1="76" y1="0" x2="76" y2="200"/>
        <line x1="152" y1="0" x2="152" y2="200"/>
        <line x1="228" y1="0" x2="228" y2="200"/>
        <line x1="304" y1="0" x2="304" y2="200"/>
        <line x1="0" y1="40" x2="380" y2="40"/>
        <line x1="0" y1="80" x2="380" y2="80"/>
        <line x1="0" y1="120" x2="380" y2="120"/>
        <line x1="0" y1="160" x2="380" y2="160"/>
      </g>
      <!-- Cell values (random-looking) -->
      <g font-size="9" fill="#444" text-anchor="middle" font-family="monospace">
        <text x="38" y="24">+0.12</text>
        <text x="114" y="24">-0.34</text>
        <text x="190" y="24">+0.08</text>
        <text x="266" y="24">+0.51</text>
        <text x="342" y="24">-0.19</text>
        <text x="38" y="64">-0.27</text>
        <text x="114" y="64">+0.43</text>
        <text x="190" y="64">-0.11</text>
        <text x="266" y="64">+0.06</text>
        <text x="342" y="64">-0.38</text>
        <text x="38" y="104">+0.35</text>
        <text x="114" y="104">-0.21</text>
        <text x="190" y="104">+0.47</text>
        <text x="266" y="104">-0.13</text>
        <text x="342" y="104">+0.29</text>
        <text x="38" y="144">-0.16</text>
        <text x="114" y="144">+0.52</text>
        <text x="190" y="144">-0.09</text>
        <text x="266" y="144">+0.41</text>
        <text x="342" y="144">-0.24</text>
        <text x="38" y="184">+0.22</text>
        <text x="114" y="184">-0.38</text>
        <text x="190" y="184">+0.14</text>
        <text x="266" y="184">-0.07</text>
        <text x="342" y="184">+0.33</text>
      </g>
      <!-- Per-element small arrows (irregular directions) -->
      <g stroke="#c84a3a" stroke-width="1.2" fill="none" marker-end="url(#arrA)">
        <line x1="20" y1="20" x2="32" y2="12"/>
        <line x1="96" y1="20" x2="84" y2="30"/>
        <line x1="172" y1="20" x2="180" y2="10"/>
        <line x1="248" y1="20" x2="260" y2="14"/>
        <line x1="324" y1="20" x2="316" y2="28"/>
        <line x1="20" y1="60" x2="14" y2="68"/>
        <line x1="96" y1="60" x2="106" y2="52"/>
        <line x1="172" y1="60" x2="180" y2="66"/>
        <line x1="248" y1="60" x2="240" y2="68"/>
        <line x1="324" y1="60" x2="316" y2="50"/>
        <line x1="20" y1="100" x2="28" y2="94"/>
        <line x1="96" y1="100" x2="86" y2="108"/>
        <line x1="172" y1="100" x2="180" y2="92"/>
        <line x1="248" y1="100" x2="256" y2="108"/>
        <line x1="324" y1="100" x2="316" y2="92"/>
        <line x1="20" y1="140" x2="28" y2="148"/>
        <line x1="96" y1="140" x2="86" y2="132"/>
        <line x1="172" y1="140" x2="180" y2="146"/>
        <line x1="248" y1="140" x2="256" y2="134"/>
        <line x1="324" y1="140" x2="316" y2="148"/>
        <line x1="20" y1="180" x2="14" y2="172"/>
        <line x1="96" y1="180" x2="106" y2="186"/>
        <line x1="172" y1="180" x2="180" y2="174"/>
        <line x1="248" y1="180" x2="256" y2="186"/>
        <line x1="324" y1="180" x2="316" y2="174"/>
      </g>
      <!-- Matrix label -->
      <text x="-10" y="100" text-anchor="end" font-size="13" font-weight="bold" fill="#333">W</text>
      <text x="190" y="-8" text-anchor="middle" font-size="10" fill="#666">5 × 5 (示意)</text>
    </g>

    <!-- Issue callout -->
    <g transform="translate(60, 280)">
      <rect x="0" y="0" width="380" height="48" fill="#fdebe8" stroke="#c84a3a" stroke-width="1" rx="4"/>
      <text x="190" y="20" text-anchor="middle" font-size="11" fill="#a13828" font-weight="bold">
        问题：奇异值分布不均，训练后期 W 易谱偏
      </text>
      <text x="190" y="36" text-anchor="middle" font-size="10" fill="#a13828">
        (几个大 σ + 大量小 σ → 模型有效秩下降)
      </text>
    </g>
  </g>

  <!-- ============== RIGHT: Muon ============== -->
  <g transform="translate(620, 90)">
    <text x="250" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3a6e">
      Muon: Orthogonal Matrix Update
    </text>
    <text x="250" y="20" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
      Newton-Schulz 把更新方向正交化 (O' · O'^⊤ = I)
    </text>

    <!-- Matrix W grid 5x5 (Muon) -->
    <g transform="translate(60, 50)">
      <rect x="0" y="0" width="380" height="200" fill="white" stroke="#888" stroke-width="1.5"/>
      <g stroke="#bbb" stroke-width="0.5">
        <line x1="76" y1="0" x2="76" y2="200"/>
        <line x1="152" y1="0" x2="152" y2="200"/>
        <line x1="228" y1="0" x2="228" y2="200"/>
        <line x1="304" y1="0" x2="304" y2="200"/>
        <line x1="0" y1="40" x2="380" y2="40"/>
        <line x1="0" y1="80" x2="380" y2="80"/>
        <line x1="0" y1="120" x2="380" y2="120"/>
        <line x1="0" y1="160" x2="380" y2="160"/>
      </g>
      <!-- Uniform singular values -->
      <g font-size="9" fill="#1a3a6e" text-anchor="middle" font-family="monospace">
        <text x="190" y="-3" fill="#1a3a6e" font-weight="bold">σ₁ = σ₂ = ... = σ₅ ≈ 1.0</text>
        <text x="38" y="24">+0.45</text>
        <text x="114" y="24">-0.12</text>
        <text x="190" y="24">+0.38</text>
        <text x="266" y="24">-0.21</text>
        <text x="342" y="24">+0.30</text>
        <text x="38" y="64">+0.20</text>
        <text x="114" y="64">+0.41</text>
        <text x="190" y="64">-0.18</text>
        <text x="266" y="64">+0.35</text>
        <text x="342" y="64">-0.15</text>
        <text x="38" y="104">+0.28</text>
        <text x="114" y="104">-0.22</text>
        <text x="190" y="104">+0.42</text>
        <text x="266" y="104">-0.19</text>
        <text x="342" y="104">+0.31</text>
        <text x="38" y="144">+0.18</text>
        <text x="114" y="144">+0.36</text>
        <text x="190" y="144">-0.25</text>
        <text x="266" y="144">+0.40</text>
        <text x="342" y="144">-0.13</text>
        <text x="38" y="184">+0.33</text>
        <text x="114" y="184">-0.16</text>
        <text x="190" y="184">+0.39</text>
        <text x="266" y="184">-0.20</text>
        <text x="342" y="184">+0.27</text>
      </g>
      <!-- One big coherent arrow showing the orthogonal direction -->
      <g stroke="#1a3a6e" stroke-width="2" fill="none" marker-end="url(#arrB)">
        <line x1="30" y1="190" x2="360" y2="30"/>
      </g>
      <text x="370" y="22" font-size="12" font-weight="bold" fill="#1a3a6e">UV^⊤</text>
      <text x="190" y="-8" text-anchor="middle" font-size="10" fill="#666">5 × 5 (示意)</text>
      <text x="-10" y="100" text-anchor="end" font-size="13" font-weight="bold" fill="#333">W</text>
    </g>

    <!-- Benefit callout -->
    <g transform="translate(60, 280)">
      <rect x="0" y="0" width="380" height="48" fill="#e7eef9" stroke="#1a3a6e" stroke-width="1" rx="4"/>
      <text x="190" y="20" text-anchor="middle" font-size="11" fill="#1a3a6e" font-weight="bold">
        优势：所有奇异值 ≈ 1，谱平衡，模型有效秩最大化
      </text>
      <text x="190" y="36" text-anchor="middle" font-size="10" fill="#1a3a6e">
        (RMS rescale: O_t = O'_t · √max(n,m) · γ 复用 AdamW 超参)
      </text>
    </g>
  </g>

  <!-- ============== Bottom: Loss landscape ============== -->
  <g transform="translate(60, 460)">
    <text x="540" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">
      Loss Landscape 视角：为什么正交化方向能更快收敛
    </text>

    <!-- Left: AdamW trajectory (gets stuck at saddle) -->
    <g transform="translate(0, 20)">
      <text x="240" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#c84a3a">AdamW 路径</text>
      <rect x="0" y="10" width="480" height="200" fill="url(#lossA)" stroke="#aaa" stroke-width="0.5"/>
      <!-- Contour ellipses -->
      <ellipse cx="240" cy="110" rx="180" ry="60" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2 2"/>
      <ellipse cx="240" cy="110" rx="120" ry="40" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2 2"/>
      <ellipse cx="240" cy="110" rx="60" ry="20" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2 2"/>
      <!-- Saddle point -->
      <circle cx="240" cy="110" r="3" fill="#333"/>
      <text x="245" y="108" font-size="9" fill="#333">saddle</text>
      <!-- AdamW trajectory: zigzag, gets stuck -->
      <g stroke="#c84a3a" stroke-width="1.5" fill="none" marker-end="url(#arrA)">
        <path d="M 60,180 L 130,140 L 90,90 L 180,130 L 150,75 L 230,110"/>
      </g>
      <text x="60" y="195" font-size="9" fill="#c84a3a">start</text>
      <text x="235" y="125" font-size="9" fill="#c84a3a" font-weight="bold">卡在鞍点附近</text>
    </g>

    <!-- Right: Muon trajectory (direct descent along principal axis) -->
    <g transform="translate(540, 20)">
      <text x="240" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a6e">Muon 路径</text>
      <rect x="0" y="10" width="480" height="200" fill="url(#lossB)" stroke="#aaa" stroke-width="0.5"/>
      <ellipse cx="240" cy="110" rx="180" ry="60" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2 2"/>
      <ellipse cx="240" cy="110" rx="120" ry="40" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2 2"/>
      <ellipse cx="240" cy="110" rx="60" ry="20" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2 2"/>
      <circle cx="240" cy="110" r="3" fill="#333"/>
      <text x="245" y="108" font-size="9" fill="#333">min</text>
      <!-- Muon trajectory: direct -->
      <g stroke="#1a3a6e" stroke-width="2" fill="none" marker-end="url(#arrB)">
        <path d="M 60,180 L 240,110"/>
      </g>
      <text x="60" y="195" font-size="9" fill="#1a3a6e">start</text>
      <text x="160" y="145" font-size="9" fill="#1a3a6e" font-weight="bold">沿主轴直达最小值</text>
    </g>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(60, 700)">
    <rect x="0" y="0" width="1080" height="40" fill="#f0f0f0" stroke="#aaa" stroke-width="0.5" rx="3"/>
    <text x="540" y="17" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">
      AdamW: element-wise update (v_t 逐元素)         |         Muon: orthogonal matrix update (Newton-Schulz O' ≈ UV^⊤)
    </text>
    <text x="540" y="32" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
      关键 insight：把 W 当矩阵更新 → 强制谱平衡 → 有效秩最大化 → 大模型更快收敛
    </text>
  </g>
</svg>
