<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="Courier New, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a3a6e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="450" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">MuonClip 优化器 — Newton-Schulz 迭代 + QK-Clip 防止 Logit 爆炸</text>

  <!-- AdamW path -->
  <text x="180" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#888">AdamW（标准方案）</text>
  <rect x="30" y="68" width="300" height="110" rx="2" fill="#fff5f5" stroke="#888" stroke-width="1"/>
  <text x="45" y="88" font-size="10" fill="#000">Gradient g_t → m_t = β₁m_{t-1} + (1-β₁)g_t</text>
  <text x="45" y="106" font-size="10" fill="#000">v_t = β₂v_{t-1} + (1-β₂)g_t²</text>
  <text x="45" y="124" font-size="10" fill="#000">W = W - η × m̂_t / (√v̂_t + ε) - ηλW</text>
  <text x="45" y="148" font-size="10" fill="#c0392b">✗ element-wise 自适应，忽略矩阵结构</text>
  <text x="45" y="166" font-size="10" fill="#c0392b">✗ 1T 参数下 token 效率低</text>

  <!-- Arrow -->
  <text x="375" y="128" text-anchor="middle" font-size="18" fill="#1a3a6e">→</text>

  <!-- MuonClip path -->
  <text x="630" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">MuonClip（K2.5 方案）</text>
  <rect x="420" y="68" width="420" height="110" rx="2" fill="#f0f4ff" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="435" y="88" font-size="10" fill="#1a3a6e" font-weight="bold">Step 1: Newton-Schulz 迭代 (5 steps)</text>
  <text x="450" y="104" font-size="9" fill="#000">G₀ = G / ‖G‖_F</text>
  <text x="450" y="120" font-size="9" fill="#000">G_{k+1} = (3G_k - G_k·G_k^T·G_k) / 2</text>
  <text x="435" y="142" font-size="10" fill="#1a3a6e" font-weight="bold">Step 2: QK-Clip（关键创新）</text>
  <text x="450" y="158" font-size="9" fill="#000">if ‖Q_new‖₂ × ‖K_new‖₂ × √d > τ: scale and clip</text>
  <text x="450" y="174" font-size="9" fill="#000">✓ 仅 clip Q/K 投影，V 和 FFN 不 clip</text>

  <!-- QK-Clip detail -->
  <text x="450" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">QK-Clip 机制</text>

  <rect x="120" y="228" width="660" height="110" rx="2" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
  <text x="140" y="250" font-size="10" fill="#000">问题：Muon 正交化后 Q/K 投影矩阵的 Frobenius 范数不受控</text>
  <text x="140" y="270" font-size="10" fill="#c0392b">→ QK^T 点积范数随训练累积增长 → softmax 输入爆炸 → logit NaN</text>
  <text x="140" y="295" font-size="10" fill="#1a3a6e">解决：每次 optimizer step 后计算 qk_bound = ‖Q‖₂ ‖K‖₂ √head_dim</text>
  <text x="140" y="315" font-size="10" fill="#1a3a6e">if qk_bound > τ × √(head_dim × n_heads): Q, K 等比缩放至阈值</text>
  <text x="140" y="335" font-size="10" fill="#888">overhead: &lt;1% 训练吞吐 | 仅作用于 Q/K 投影 | τ ∈ [0.5, 1.0] 推测</text>

  <!-- Efficiency comparison -->
  <text x="450" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">训练效率对比</text>

  <rect x="60" y="385" width="220" height="50" rx="2" fill="none" stroke="#888" stroke-width="1"/>
  <text x="170" y="408" text-anchor="middle" font-size="10" fill="#888">AdamW: token efficiency 1×</text>
  <text x="170" y="426" text-anchor="middle" font-size="9" fill="#888">万亿参数训练稳定</text>

  <rect x="310" y="385" width="220" height="50" rx="2" fill="#f0f4ff" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="420" y="408" text-anchor="middle" font-size="10" fill="#1a3a6e">MuonClip: token efficiency ~2×</text>
  <text x="420" y="426" text-anchor="middle" font-size="9" fill="#1a3a6e">万亿参数稳定 + QK-Clip</text>

  <rect x="560" y="385" width="220" height="50" rx="2" fill="none" stroke="#c0392b" stroke-width="1"/>
  <text x="670" y="408" text-anchor="middle" font-size="10" fill="#c0392b">Muon (无 Clip): ~2× but</text>
  <text x="670" y="426" text-anchor="middle" font-size="9" fill="#c0392b">万亿参数 logit 爆炸 ✗</text>

  <text x="20" y="470" font-size="9" fill="#888">GTC 2026: 杨植麟 "How We Scaled Kimi K2.5" | MuonClip 开源 | 2× token efficiency vs AdamW</text>
</svg>