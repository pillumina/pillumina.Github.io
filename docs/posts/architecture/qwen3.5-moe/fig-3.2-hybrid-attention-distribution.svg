  <!-- Right side stats -->
  <rect x="320" y="72" width="550" height="130" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="595" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Layer Type Statistics</text>

  <!-- Bar chart -->
  <g transform="translate(370, 112)">
    <text x="0" y="10" font-size="10" fill="#475569">GDN (Linear Attention)</text>
    <rect x="200" y="0" width="300" height="16" rx="3" fill="url(#gdn)" opacity="0.85"/>
    <text x="520" y="12" font-size="10" font-weight="600" fill="#1e40af">30 layers (75%)</text>

    <text x="0" y="38" font-size="10" fill="#475569">Full Attention (GQA)</text>
    <rect x="200" y="28" width="100" height="16" rx="3" fill="url(#fa)" opacity="0.85"/>
    <text x="520" y="40" font-size="10" font-weight="600" fill="#166534">10 layers (25%)</text>

    <text x="0" y="66" font-size="10" fill="#475569">MLP-only Layers</text>
    <rect x="200" y="56" width="0" height="16" rx="3" fill="#94a3b8"/>
    <text x="520" y="68" font-size="10" font-weight="600" fill="#64748b">0 layers (0%)</text>
  </g>

  <!-- Comparative table -->
  <rect x="320" y="220" width="550" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="595" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Token Mixing Comparison</text>

  <g transform="translate(340, 260)">
    <text x="180" y="0" font-size="10" font-weight="600" fill="#1e40af">Gated DeltaNet</text>
    <text x="420" y="0" font-size="10" font-weight="600" fill="#166534">Full Attention (GQA)</text>

    <line x1="0" y1="5" x2="530" y2="5" stroke="#e2e8f0" stroke-width="1"/>

    <text x="5" y="22" font-size="9" fill="#64748b">Complexity</text>
    <text x="180" y="22" font-size="9" fill="#1e40af">O(n) — linear in seq len</text>
    <text x="420" y="22" font-size="9" fill="#166534">O(n^2) — quadratic</text>

    <text x="5" y="38" font-size="9" fill="#64748b">Heads</text>
    <text x="180" y="38" font-size="9" fill="#1e40af">16K + 32V (key-value head split)</text>
    <text x="420" y="38" font-size="9" fill="#166534">16Q, 2KV (GQA ratio 8:1)</text>

    <text x="5" y="54" font-size="9" fill="#64748b">State</text>
    <text x="180" y="54" font-size="9" fill="#1e40af">Recurrent: (32, 128, 128) matrix</text>
    <text x="420" y="54" font-size="9" fill="#166534">KV cache: (2, seqlen, 256)</text>

    <text x="5" y="70" font-size="9" fill="#64748b">Position</text>
    <text x="180" y="70" font-size="9" fill="#1e40af">Implicit (conv kernel + decay)</text>
    <text x="420" y="70" font-size="9" fill="#166534">Explicit (Partial RoPE 25%)</text>

    <text x="5" y="86" font-size="9" fill="#64748b">Normalization</text>
    <text x="180" y="86" font-size="9" fill="#1e40af">QK L2 norm + Output gate</text>
    <text x="420" y="86" font-size="9" fill="#166534">QK RMSNorm + Output gate</text>

    <text x="5" y="102" font-size="9" fill="#64748b">Memory (seq=8192)</text>
    <text x="180" y="102" font-size="9" fill="#1e40af">~2 MB (state)</text>
    <text x="420" y="102" font-size="9" fill="#166534">~33 MB (KV cache)</text>
  </g>

  <!-- Pattern explanation -->
  <rect x="320" y="385" width="550" height="100" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="595" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Why 3:1 Ratio?</text>
  <text x="595" y="428" text-anchor="middle" font-size="10" fill="#22c55e">Every 4th layer uses Full Attention to "anchor" long-range dependencies</text>
  <text x="595" y="448" text-anchor="middle" font-size="10" fill="#22c55e">Linear attention (GDN) captures local patterns efficiently with O(n) complexity</text>
  <text x="595" y="468" text-anchor="middle" font-size="10" fill="#22c55e">Full_attention_interval=4 is the default; derived from Qwen3-Next research</text>
  <text x="595" y="483" text-anchor="middle" font-size="9" fill="#86efac" font-style="italic">Configurable via config.layer_types; default generates 3:1 pattern from full_attention_interval</text>
</svg>
