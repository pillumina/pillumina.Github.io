    <rect x="0" y="200" width="60" height="38" rx="4" fill="url(#gdn)" opacity="0.85"/>
    <text x="30" y="224" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">GDN</text>
    <rect x="62" y="200" width="60" height="38" rx="4" fill="url(#gdn)" opacity="0.85"/>
