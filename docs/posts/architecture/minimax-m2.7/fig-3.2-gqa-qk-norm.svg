<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="Courier New, monospace" font-size="11">
  <style>
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .box-hl { fill: #fff; stroke: #1a3a6e; stroke-width: 2.2; }
    .box-grp { fill: #f4f4f4; stroke: #000; stroke-width: 1.2; stroke-dasharray: 4 2; }
    .cell { fill: #fff; stroke: #000; stroke-width: 1.2; }
    .cell-hl { fill: #f0f4ff; stroke: #1a3a6e; stroke-width: 1.5; }
    .label { fill: #000; }
    .label-hl { fill: #1a3a6e; font-weight: bold; }
    .annot { fill: #444; font-size: 9px; }
    .annot-hl { fill: #1a3a6e; font-size: 9px; font-weight: bold; }
    .header-text { fill: #fff; font-weight: bold; font-size: 11px; }
    .arrow { stroke: #000; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    .arrow-hl { stroke: #1a3a6e; stroke-width: 2; fill: none; marker-end: url(#a-hl); }
    .q-head { fill: #d4e4ff; stroke: #1a3a6e; stroke-width: 1.2; }
    .kv-head { fill: #ffe8cc; stroke: #b8721a; stroke-width: 1.2; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <polygon points="0 0,10 5,0 10" fill="#000"/>
    </marker>
    <marker id="a-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <polygon points="0 0,10 5,0 10" fill="#1a3a6e"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="440" y="24" text-anchor="middle" font-weight="bold" font-size="14">GQA + QK Norm：M2.7 注意力机制详解</text>
  <text class="annot" x="440" y="40" text-anchor="middle">Grouped Query Attention (48/8) + per_layer QK Normalization</text>

  <!-- ====== LEFT: GQA Diagram ====== -->
  <rect class="box-hl" x="25" y="55" width="400" height="270"/>
  <text class="label-hl" x="225" y="75" text-anchor="middle" font-size="12">GQA: Grouped Query Attention</text>

  <!-- Q heads column (48) -->
  <text class="annot" x="90" y="100" text-anchor="middle" font-weight="bold">48 Query Heads</text>
  <rect class="q-head" x="50" y="107" width="80" height="14"/>
  <text class="annot" x="90" y="118" text-anchor="middle" font-size="8">Q_head_1</text>

  <rect class="q-head" x="50" y="123" width="80" height="14"/>
  <text class="annot" x="90" y="134" text-anchor="middle" font-size="8">Q_head_2</text>

  <rect class="q-head" x="50" y="139" width="80" height="14"/>
  <text class="annot" x="90" y="150" text-anchor="middle" font-size="8">Q_head_3</text>

  <rect class="q-head" x="50" y="155" width="80" height="14"/>
  <text class="annot" x="90" y="166" text-anchor="middle" font-size="8">Q_head_4</text>

  <rect class="q-head" x="50" y="171" width="80" height="14"/>
  <text class="annot" x="90" y="182" text-anchor="middle" font-size="8">Q_head_5</text>

  <rect class="q-head" x="50" y="187" width="80" height="14"/>
  <text class="annot" x="90" y="198" text-anchor="middle" font-size="8">Q_head_6</text>

  <text class="annot" x="90" y="218" text-anchor="middle" font-size="8">...</text>

  <rect class="q-head" x="50" y="223" width="80" height="14"/>
  <text class="annot" x="90" y="234" text-anchor="middle" font-size="8">Q_head_48</text>

  <!-- repeat_kv brackets -->
  <text class="annot-hl" x="155" y="150" font-size="9">repeat</text>
  <text class="annot-hl" x="155" y="162" font-size="9">_kv = 6</text>
  <line x1="132" y1="112" x2="140" y2="112" stroke="#1a3a6e" stroke-width="1"/>
  <line x1="132" y1="187" x2="140" y2="187" stroke="#1a3a6e" stroke-width="1"/>
  <line x1="140" y1="112" x2="140" y2="187" stroke="#1a3a6e" stroke-width="1"/>
  <rect class="box" x="132" y="140" width="38" height="20" fill="#f0f4ff"/>

  <!-- KV heads column (8) -->
  <text class="annot" x="270" y="100" text-anchor="middle" font-weight="bold" fill="#b8721a">8 KV Heads</text>

  <rect class="kv-head" x="230" y="107" width="80" height="14"/>
  <text class="annot" x="270" y="118" text-anchor="middle" font-size="8">KV_head_1</text>

  <rect class="kv-head" x="230" y="155" width="80" height="14"/>
  <text class="annot" x="270" y="166" text-anchor="middle" font-size="8">KV_head_2</text>

  <rect class="kv-head" x="230" y="203" width="80" height="14"/>
  <text class="annot" x="270" y="214" text-anchor="middle" font-size="8">KV_head_3</text>

  <text class="annot" x="270" y="235" text-anchor="middle" font-size="8">...</text>

  <rect class="kv-head" x="230" y="243" width="80" height="14"/>
  <text class="annot" x="270" y="254" text-anchor="middle" font-size="8">KV_head_8</text>

  <!-- Mapping lines Q → KV -->
  <line x1="130" y1="114" x2="228" y2="114" stroke="#1a3a6e" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="130" y1="130" x2="228" y2="114" stroke="#1a3a6e" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="130" y1="146" x2="228" y2="114" stroke="#1a3a6e" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="130" y1="162" x2="228" y2="114" stroke="#1a3a6e" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="130" y1="178" x2="228" y2="114" stroke="#1a3a6e" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="130" y1="194" x2="228" y2="114" stroke="#1a3a6e" stroke-width="0.8" stroke-dasharray="2 2"/>

  <line x1="130" y1="230" x2="228" y2="250" stroke="#1a3a6e" stroke-width="0.8" stroke-dasharray="2 2"/>

  <!-- GQA explanation -->
  <text class="annot" x="225" y="288" text-anchor="middle">48 Q heads → 8 KV heads, 每组 6 个 Q head 共享 1 个 KV head</text>
  <text class="annot" x="225" y="304" text-anchor="middle">KV 缓存量降低至 MHA 的 1/6</text>
  <text class="annot-hl" x="225" y="320" text-anchor="middle">n_query_heads=48, n_kv_heads=8, repeat_kv=6</text>

  <!-- ====== RIGHT: QK Norm Flow ====== -->
  <rect class="box-hl" x="445" y="55" width="415" height="270"/>
  <text class="label-hl" x="652" y="75" text-anchor="middle" font-size="12">QK Norm 流程 (per_layer)</text>

  <!-- Input -->
  <rect class="box" x="505" y="90" width="120" height="28"/>
  <text class="label" x="565" y="108" text-anchor="middle">Input x ∈ R^{B,S,3072}</text>

  <!-- Split arrows -->
  <line class="arrow" x1="535" y1="118" x2="510" y2="148"/>
  <line class="arrow" x1="595" y1="118" x2="620" y2="148"/>

  <!-- Q path -->
  <rect class="box" x="463" y="150" width="130" height="28"/>
  <text class="label" x="528" y="168" text-anchor="middle">W_q: 3072→48×128</text>
  <line class="arrow" x1="528" y1="178" x2="528" y2="200"/>

  <rect class="box-hl" x="463" y="202" width="130" height="28"/>
  <text class="label-hl" x="528" y="220" text-anchor="middle">RMSNorm(q)</text>
  <line class="arrow" x1="528" y1="230" x2="528" y2="252"/>

  <rect class="box" x="463" y="254" width="130" height="28"/>
  <text class="label" x="528" y="272" text-anchor="middle">RoPE(rotary_dim=64)</text>

  <!-- K path -->
  <rect class="box" x="627" y="150" width="130" height="28"/>
  <text class="label" x="692" y="168" text-anchor="middle">W_k: 3072→8×128</text>
  <line class="arrow" x1="692" y1="178" x2="692" y2="200"/>

  <rect class="box-hl" x="627" y="202" width="130" height="28"/>
  <text class="label-hl" x="692" y="220" text-anchor="middle">RMSNorm(k)</text>
  <line class="arrow" x1="692" y1="230" x2="692" y2="252"/>

  <rect class="box" x="627" y="254" width="130" height="28"/>
  <text class="label" x="692" y="272" text-anchor="middle">RoPE(rotary_dim=64)</text>

  <!-- QK combo arrow -->
  <line class="arrow" x1="528" y1="282" x2="565" y2="295"/>
  <line class="arrow" x1="692" y1="282" x2="652" y2="295"/>

  <!-- Attention -->
  <rect class="box-hl" x="545" y="295" width="120" height="24"/>
  <text class="label-hl" x="605" y="311" text-anchor="middle" font-size="10">Attention(Q,K,V)</text>

  <!-- Benefit note -->
  <text class="annot" x="652" y="290" text-anchor="middle"/>

  <!-- QK Norm why -->
  <text class="annot-hl" x="652" y="70" text-anchor="end"/>

  <!-- V path note -->
  <text class="annot" x="565" y="340" text-anchor="middle">V: W_v 无需 Norm (仅 Q,K 做 RMSNorm)</text>
  <text class="annot" x="565" y="356" text-anchor="middle">RoPE 应用在 Norm 之后, partial dim=64/128</text>

  <!-- Divider -->
  <line x1="20" y1="340" x2="860" y2="340" stroke="#888" stroke-width="0.8"/>

  <!-- ====== BOTTOM: Key Parameters Table ====== -->
  <text class="label" x="440" y="358" text-anchor="middle" font-weight="bold" font-size="12">Attention 关键参数汇总</text>

  <!-- Parameter table -->
  <!-- Row 1 -->
  <rect class="cell" x="40" y="368" width="180" height="26" fill="#1a3a6e"/>
  <text class="header-text" x="130" y="385" text-anchor="middle">参数</text>
  <rect class="cell" x="220" y="368" width="200" height="26" fill="#1a3a6e"/>
  <text class="header-text" x="320" y="385" text-anchor="middle">值</text>
  <rect class="cell" x="420" y="368" width="180" height="26" fill="#1a3a6e"/>
  <text class="header-text" x="510" y="385" text-anchor="middle">参数</text>
  <rect class="cell" x="600" y="368" width="220" height="26" fill="#1a3a6e"/>
  <text class="header-text" x="710" y="385" text-anchor="middle">值</text>

  <!-- Row 2 -->
  <rect class="cell" x="40" y="394" width="180" height="24"/>
  <text class="annot" x="130" y="410" text-anchor="middle">head_dim</text>
  <rect class="cell" x="220" y="394" width="200" height="24"/>
  <text class="annot-hl" x="320" y="410" text-anchor="middle">128</text>

  <rect class="cell" x="420" y="394" width="180" height="24"/>
  <text class="annot" x="510" y="410" text-anchor="middle">n_query_heads</text>
  <rect class="cell" x="600" y="394" width="220" height="24"/>
  <text class="annot-hl" x="710" y="410" text-anchor="middle">48</text>

  <!-- Row 3 -->
  <rect class="cell" x="40" y="418" width="180" height="24"/>
  <text class="annot" x="130" y="434" text-anchor="middle">n_kv_heads</text>
  <rect class="cell" x="220" y="418" width="200" height="24"/>
  <text class="annot-hl" x="320" y="434" text-anchor="middle">8</text>

  <rect class="cell" x="420" y="418" width="180" height="24"/>
  <text class="annot" x="510" y="434" text-anchor="middle">rotary_dim (partial RoPE)</text>
  <rect class="cell" x="600" y="418" width="220" height="24"/>
  <text class="annot-hl" x="710" y="434" text-anchor="middle">64</text>

  <!-- Row 4 -->
  <rect class="cell" x="40" y="442" width="180" height="24"/>
  <text class="annot" x="130" y="458" text-anchor="middle">rope_theta</text>
  <rect class="cell" x="220" y="442" width="200" height="24"/>
  <text class="annot-hl" x="320" y="458" text-anchor="middle">5,000,000</text>

  <rect class="cell" x="420" y="442" width="180" height="24"/>
  <text class="annot" x="510" y="458" text-anchor="middle">attention_scaling</text>
  <rect class="cell" x="600" y="442" width="220" height="24"/>
  <text class="annot-hl" x="710" y="458" text-anchor="middle">1 / √128</text>

  <!-- Row 5 -->
  <rect class="cell" x="40" y="466" width="180" height="24"/>
  <text class="annot" x="130" y="482" text-anchor="middle">qk_norm</text>
  <rect class="cell" x="220" y="466" width="200" height="24"/>
  <text class="annot-hl" x="320" y="482" text-anchor="middle">RMSNorm (per_layer)</text>

  <rect class="cell" x="420" y="466" width="180" height="24"/>
  <text class="annot" x="510" y="482" text-anchor="middle">attention_type</text>
  <rect class="cell" x="600" y="466" width="220" height="24"/>
  <text class="annot-hl" x="710" y="482" text-anchor="middle">Full Attention only</text>

  <!-- Row 6 -->
  <rect class="cell" x="40" y="490" width="180" height="24"/>
  <text class="annot" x="130" y="506" text-anchor="middle">qk_norm type</text>
  <rect class="cell" x="220" y="490" width="200" height="24"/>
  <text class="annot-hl" x="320" y="506" text-anchor="middle">RMSNorm (not LayerNorm)</text>

  <rect class="cell" x="420" y="490" width="180" height="24"/>
  <text class="annot" x="510" y="506" text-anchor="middle">repeat_kv</text>
  <rect class="cell" x="600" y="490" width="220" height="24"/>
  <text class="annot-hl" x="710" y="506" text-anchor="middle">48 / 8 = 6</text>

  <!-- 图例 -->
  <g transform="translate(20, 518)">
    <text class="annot" font-weight="bold">Legend:</text>
    <rect class="box-hl" x="70" y="6" width="14" height="14"/>
    <text class="annot" x="88" y="17">核心创新 (QK Norm, per_layer)</text>
    <text class="annot" x="280" y="17">| GQA ratio: 48/8 | Full Attention | Partial RoPE (64/128)</text>
  </g>
</svg>