outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

params:
  TocSide: 'left'
  assets:
    disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    # safari_pinned_tab: "/safari-pinned-tab.svg"

  label:
    text:
    icon: /apple-touch-icon.png
    iconHeight: 

  # math: true  # 移到 per-page frontmatter（减少非数学页面的 KaTeX 加载）
  # enableLatexModal: true
  profileMode:
    enabled: false # needs to be explicitly set

  homeInfoParams:
    Title: CctoctoFX
    Content: |
      ## CctoctoFX

      Yuxiao Huang

      Software engineer working at the intersection of AI infrastructure and ML systems.

      ---

      <div class="topics">
      <span>System architecture</span>
      <span>Large language models</span>
      <span>AI infrastructure</span>
      <span>Technology & geopolitics</span>
      </div>

      Grounded in systems thinking — no fluff, just signal.

    imageUrl: "imgs/icon_head.png"
    imageTitle: profile
    imageWidth: 150
    imageHeight: 150


  env: production
  author: Me
  defaultTheme: light
  images: ["imgs/icon_head.png"]
  displayFullLangName: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowShareButtons: true
  ShowReadingTime: true
  ShowToc: true
  TocOpen: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  UseHugoToc: true
  disableScrollToTop: true
  

  socialIcons: # optional
    - name: "email"
      url: "derios1230@gmail.com"
    - name: "github"
      url: "https://github.com/pillumina"
    - name: "gitea"
      url: "https://gitee.com/pillumina"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

markup:
  defaultMarkdownHandler: goldmark
  tableOfContents:
    startLevel: 1
    endLevel: 6
    ordered: false
  goldmark:
    renderer:
      unsafe: true
      hardWraps: true
    parser:
      attribute:
        block: true
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
    extensions:
      passthrough:
        enable: true
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
  highlight:
    codeFences: true
    lineNos: true
    noClasses: false


