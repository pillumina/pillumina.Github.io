{{- /* 阅读进度条 - 仅文章页 */}}
{{- if .IsPage }}
<div class="reading-progress-bar"></div>
{{- end }}

<!-- 图片灯箱依赖 -->
<script defer src="https://cdn.jsdelivr.net/npm/medium-zoom@1.0.6/dist/medium-zoom.min.js"></script>

<script>
// 阅读进度条（transform 版本，避免每帧 layout）
document.addEventListener('DOMContentLoaded', function() {
    const progressBar = document.querySelector('.reading-progress-bar');
    if (!progressBar) return;

    const article = document.querySelector('.post-single');
    if (!article) return;

    function updateProgress() {
        const rect = article.getBoundingClientRect();
        const contentHeight = rect.height;
        const windowHeight = window.innerHeight;
        const scrollTop = window.scrollY || window.pageYOffset;
        const scrolled = Math.min(100, Math.max(0, (scrollTop / (contentHeight - windowHeight)) * 100));
        // 用 transform: scaleX 代替 width（GPU 合成，不触发 layout）
        progressBar.style.transform = `scaleX(${scrolled / 100})`;
    }

    // 注册到统一 scroll 调度器
    (window.__scrollFrameFns = window.__scrollFrameFns || []).push(updateProgress);
    updateProgress();
});

// 图片灯箱
document.addEventListener('DOMContentLoaded', function() {
    mediumZoom('article img:not(.nozoom)', {
        margin: 24,
        background: 'var(--theme)',
        scrollOffset: 0,
    });
});
</script>
