<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<script>
(function() {
  function getArticleRoot() {
    return document.querySelector('.post-content') || document.querySelector('.post-single') || document.body;
  }
  function hasUnrenderedMath(html) {
    // 粗略检测仍存在的数学定界符（已排除 code/pre 由 ignoredTags 控制）
    return /\$\$[\s\S]+?\$\$|\\\(|\\\)|\\\[|\\\]/.test(html);
  }
  function loadMathJaxOnce(root) {
    if (window.__mathjaxLoaded) return;
    window.__mathjaxLoaded = true;
    window.MathJax = {
      tex: {
        inlineMath: [["$","$"],["\\(","\\)"]],
        displayMath: [["$$","$$"],["\\[","\\]"]],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ["script","noscript","style","textarea","pre","code","tt"],
        ignoreHtmlClass: 'no-math'
      }
    };
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js';
    s.defer = true;
    s.onload = function() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([root]).catch(function(e){console.warn('MathJax typeset error', e)});
      }
    };
    document.head.appendChild(s);
  }
  function renderAll() {
    try {
      if (typeof renderMathInElement === 'function') {
        const root = getArticleRoot();
        renderMathInElement(root, {
          delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "$", right: "$", display: false},
            {left: "\\[", right: "\\]", display: true},
            {left: "\\(", right: "\\)", display: false}
          ],
          throwOnError: false,
          strict: false,
          trust: true,
          ignoredTags: ["script","noscript","style","textarea","pre","code","tt"],
          ignoredClasses: ["no-math"],
          macros: {
            "\\boldsymbol": "\\mathbf{#1}",
            "\\bm": "\\mathbf{#1}"
          },
        });
        // 若仍检测到未渲染的数学表达式，则回退到 MathJax
        setTimeout(function(){
          if (hasUnrenderedMath(root.innerHTML)) {
            loadMathJaxOnce(root);
          }
        }, 200);
      }
    } catch (e) {
      console.warn("KaTeX render error:", e);
    }
  }
  document.addEventListener('DOMContentLoaded', function() {
    renderAll();
    setTimeout(renderAll, 200);
  });
  window.addEventListener('load', function() {
    setTimeout(renderAll, 0);
  });
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
// 检测当前主题并配置 mermaid
(function() {
    function getTheme() {
        // 检测 dark 类或 theme=dark
        const isDark = document.documentElement.classList.contains('dark') ||
                       document.documentElement.getAttribute('data-theme') === 'dark' ||
                       window.matchMedia('(prefers-color-scheme: dark)').matches;
        return isDark ? 'dark' : 'light';
    }

    function initMermaid() {
        const theme = getTheme();
        const isDark = theme === 'dark';

        const config = {
            startOnLoad: true,
            theme: isDark ? 'dark' : 'neutral',
            themeVariables: {
                lineColor: isDark ? '#818CF8' : '#1D4ED8',     // 更深的蓝色
                textColor: isDark ? '#E2E8F0' : '#111827',
                primaryColor: isDark ? '#4F46E5' : '#1E40AF',  // 深蓝
                primaryTextColor: isDark ? '#E2E8F0' : '#FFFFFF',
                primaryBorderColor: isDark ? '#6366F1' : '#1E3A8A',
                nodeBorder: isDark ? '#6366F1' : '#1E40AF',
                nodeTextColor: isDark ? '#E2E8F0' : '#111827',
                clusterBkg: isDark ? 'rgba(99, 102, 241, 0.2)' : 'rgba(30, 64, 175, 0.15)',
                edgeLabelBackground: isDark ? '#1E1B4B' : '#DBEAFE',  // 浅蓝背景
                clusterBorder: isDark ? '#6366F1' : '#1E40AF',
                // 加粗线条
                border1: 2,
                border2: 2,
                border3: 2,
                border4: 2,
                fontSize: '14px',
            },
            flowchart: {
                useMaxWidth: false,
                htmlLabels: true,
                curve: 'basis'
            }
        };
        mermaid.initialize(config);
    }

    // 初始化
    initMermaid();

    // 监听主题变化
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'class' ||
                mutation.attributeName === 'data-theme') {
                initMermaid();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });
})();
</script>

<!-- ECharts 初始化 -->
<script>
(function() {
  // ECharts 默认配置
  const echartsDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    backgroundColor: 'transparent',
    textStyle: {
      fontFamily: '-apple-system, BlinkMacSystemFont, "Inter", "Noto Sans SC", sans-serif'
    }
  };

  function initECharts() {
    var containers = document.querySelectorAll('.echarts-container');
    if (containers.length === 0) return;

    // 动态加载 ECharts
    if (typeof echarts === 'undefined') {
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js';
      script.onload = createCharts;
      document.head.appendChild(script);
    } else {
      createCharts();
    }
  }

  function createCharts() {
    var containers = document.querySelectorAll('.echarts-container');
    containers.forEach(function(container) {
      var id = container.id;
      var dataEl = document.getElementById('echarts-data-' + id);
      if (!dataEl || !container) return;

      try {
        var chartConfig = JSON.parse(dataEl.textContent);
        var options = Object.assign({}, echartsDefaults, chartConfig);

        var chart = echarts.init(container, null, { renderer: 'canvas' });
        chart.setOption(options);

        window.addEventListener('resize', function() {
          chart.resize();
        });

        var loadingEl = container.querySelector('.echarts-loading'); if (loadingEl) loadingEl.style.display = 'none';
      } catch (e) {
        console.warn('ECharts init error:', e);
      }
    });
  }

  // 页面加载完成后初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      initECharts();
    });
  } else {
    initECharts();
  }
})();
</script>

<!-- 增强: 回到顶部按钮 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.createElement('button');
    btn.className = 'back-to-top';
    btn.setAttribute('aria-label', 'Back to top');
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>';

    btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.body.appendChild(btn);

    // 显示/隐藏逻辑
    function updateVisibility() {
        if (window.scrollY > 300) {
            btn.classList.add('visible');
        } else {
            btn.classList.remove('visible');
        }
    }

    window.addEventListener('scroll', updateVisibility, { passive: true });
    updateVisibility();
});
</script>

<!-- TOC阅读进度跟踪 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 获取所有标题元素
    const headers = document.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]');
    // 获取所有TOC链接
    const tocLinks = document.querySelectorAll('.toc a');
    
    if (headers.length === 0 || tocLinks.length === 0) return;

    // 创建标题位置映射
    const headerPositions = {};
    headers.forEach(header => {
        headerPositions[header.id] = header.offsetTop;
    });

    // 获取当前激活的标题
    function getActiveHeader() {
        const scrollPosition = window.scrollY + 100; // 添加偏移量以提前触发
        
        let activeId = '';
        for (const [id, position] of Object.entries(headerPositions)) {
            if (scrollPosition >= position) {
                activeId = id;
            } else {
                break;
            }
        }
        return activeId;
    }

    // 更新TOC高亮
    function updateTocHighlight() {
        const activeId = getActiveHeader();
        
        // 移除所有active类
        tocLinks.forEach(link => {
            link.classList.remove('active');
        });
        
        // 添加active类到当前标题的链接
        if (activeId) {
            const activeLink = document.querySelector(`.toc a[href="#${activeId}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
            }
        }
    }

    // 监听滚动事件
    let ticking = false;
    window.addEventListener('scroll', function() {
        if (!ticking) {
            window.requestAnimationFrame(function() {
                updateTocHighlight();
                ticking = false;
            });
            ticking = true;
        }
    });

    // 初始化高亮
    updateTocHighlight();
});
</script>

<!-- 导航下拉菜单 - 移动端点击切换 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const dropdowns = document.querySelectorAll('.menu-dropdown');

    dropdowns.forEach(function(dropdown) {
        const toggle = dropdown.querySelector('.menu-dropdown-toggle');
        if (!toggle) return;

        // 移动端点击切换（桌面端用 :hover）
        toggle.addEventListener('click', function(e) {
            // 仅在 hover 不生效时（移动端）触发
            if (window.matchMedia('(hover: none)').matches) {
                e.preventDefault();
                const isOpen = dropdown.classList.contains('is-open');
                // 关闭所有其他
                dropdowns.forEach(function(d) { d.classList.remove('is-open'); });
                // 切换当前
                if (!isOpen) {
                    dropdown.classList.add('is-open');
                    toggle.setAttribute('aria-expanded', 'true');
                } else {
                    dropdown.classList.remove('is-open');
                    toggle.setAttribute('aria-expanded', 'false');
                }
            }
        });
    });

    // 点击外部关闭
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.menu-dropdown')) {
            dropdowns.forEach(function(d) {
                d.classList.remove('is-open');
                const t = d.querySelector('.menu-dropdown-toggle');
                if (t) t.setAttribute('aria-expanded', 'false');
            });
        }
    });

    // ESC 关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            dropdowns.forEach(function(d) { d.classList.remove('is-open'); });
        }
    });
});
</script>
