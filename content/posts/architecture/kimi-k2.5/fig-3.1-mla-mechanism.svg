<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" font-family="Courier New, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a3a6e"/>
    </marker>
  </defs>

  <text x="500" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">MLA (Multi-head Latent Attention) — K2.5 64Q/64KV 全 MHA 配置</text>

  <!-- Input -->
  <rect x="400" y="45" width="200" height="32" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="500" y="66" text-anchor="middle" font-size="11" fill="#000">Input: X [B, S, 7168]</text>

  <!-- Q compression -->
  <line x1="500" y1="77" x2="500" y2="95" stroke="#1a3a6e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="140" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Q 路径（高秩压缩）</text>
  <rect x="20" y="120" width="240" height="28" rx="2" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="140" y="139" text-anchor="middle" font-size="10" fill="#000">Linear: 7168 → q_lora=1536</text>
  <line x1="140" y1="148" x2="140" y2="165" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="20" y="168" width="240" height="28" rx="2" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="140" y="187" text-anchor="middle" font-size="10" fill="#000">Split + Reshape → [64, 192]</text>
  <line x1="140" y1="196" x2="140" y2="213" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="20" y="216" width="240" height="28" rx="2" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="140" y="235" text-anchor="middle" font-size="10" fill="#000">Q = [Q_rope(64) | Q_nope(128)]</text>

  <!-- KV compression -->
  <text x="500" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">KV 路径（低秩压缩）</text>
  <rect x="380" y="120" width="240" height="28" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="500" y="139" text-anchor="middle" font-size="10" fill="#000">Linear: 7168 → kv_lora=512</text>

  <!-- KV splits -->
  <line x1="430" y1="148" x2="350" y2="170" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="570" y1="148" x2="650" y2="170" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- K up-proj -->
  <rect x="230" y="173" width="240" height="28" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="350" y="192" text-anchor="middle" font-size="10" fill="#000">K up-proj: 512 → [64, 128(nope)]</text>
  <line x1="350" y1="201" x2="350" y2="218" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="230" y="221" width="240" height="28" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="350" y="240" text-anchor="middle" font-size="10" fill="#000">K = [K_rope(64) | K_nope(128)]</text>

  <!-- V up-proj -->
  <rect x="530" y="173" width="240" height="28" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="650" y="192" text-anchor="middle" font-size="10" fill="#000">V up-proj: 512 → [64, 128]</text>
  <line x1="650" y1="201" x2="650" y2="218" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="530" y="221" width="240" height="28" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="650" y="240" text-anchor="middle" font-size="10" fill="#000">V = [64, 128] (all nope)</text>

  <!-- RoPE application -->
  <text x="500" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">RoPE 解耦：仅 K_rope(64 维) 独立存储并施加 RoPE</text>
  <rect x="300" y="285" width="400" height="28" rx="2" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="500" y="304" text-anchor="middle" font-size="10" fill="#000">K_final = concat[RoPE(K_rope), K_nope] → [64, 192]</text>

  <!-- Attention computation -->
  <line x1="500" y1="313" x2="500" y2="335" stroke="#1a3a6e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="340" width="500" height="40" rx="2" fill="#f0f4ff" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="500" y="358" text-anchor="middle" font-size="11" fill="#000">Attention: softmax(QK^T/√192) × V  [64 heads, full MHA]</text>
  <text x="500" y="374" text-anchor="middle" font-size="10" fill="#888">GQA ratio=1 (64Q=64KV) — no KV head sharing</text>

  <!-- Output -->
  <line x1="500" y1="380" x2="500" y2="400" stroke="#1a3a6e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="330" y="403" width="340" height="28" rx="2" fill="none" stroke="#000" stroke-width="1"/>
  <text x="500" y="422" text-anchor="middle" font-size="10" fill="#000">O_proj: concat[64, 128] × 64 heads → [7168]</text>

  <!-- KV Cache note -->
  <text x="500" y="460" text-anchor="middle" font-size="10" fill="#888">推理时仅缓存 kv_lora=512 维 (K_c + V_c)，不缓存完整 K(8192)+V(8192)=16384 维</text>
  <text x="500" y="478" text-anchor="middle" font-size="9" fill="#888">KV cache: 512×2(K+V)×256K×2bytes×61layers ≈ 61GB | 全 MHA 无 GQA: 64 独立 KV 头, 每头潜维 512/64=8</text>

  <!-- Legend -->
  <rect x="20" y="460" width="300" height="18" rx="2" fill="none" stroke="#888" stroke-width="0.5"/>
  <text x="30" y="474" font-size="9" fill="#888">K2.5 vs V3: 同 MLA 机制, K2.5 64头×8潜维, V3 128头×4潜维</text>
</svg>