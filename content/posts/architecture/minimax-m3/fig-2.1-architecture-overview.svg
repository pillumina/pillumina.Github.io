<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="Courier New, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a3a6e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b8721a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="30" font-size="14" font-weight="bold" fill="#1a3a6e">MiniMax M3 — Architecture Overview</text>
  <line x1="30" y1="38" x2="430" y2="38" stroke="#1a3a6e" stroke-width="1"/>

  <!-- ===== VISION TOWER (left) ===== -->
  <rect x="30" y="60" width="180" height="240" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="120" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Vision Encoder</text>
  <line x1="50" y1="88" x2="190" y2="88" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- ViT layers -->
  <rect x="45" y="98" width="150" height="22" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="120" y="113" text-anchor="middle" font-size="9" fill="#000">ViT 32L / h=1280</text>

  <rect x="45" y="125" width="150" height="22" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="120" y="140" text-anchor="middle" font-size="9" fill="#000">16 heads / d=80</text>

  <rect x="45" y="152" width="150" height="22" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="120" y="167" text-anchor="middle" font-size="9" fill="#000">3D RoPE (T,H,W)</text>

  <rect x="45" y="179" width="150" height="22" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="120" y="194" text-anchor="middle" font-size="9" fill="#000">Patch=14 / merge=2x2</text>

  <rect x="45" y="206" width="150" height="22" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="120" y="221" text-anchor="middle" font-size="9" fill="#000">Pre-LayerNorm</text>

  <rect x="45" y="233" width="150" height="22" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="120" y="248" text-anchor="middle" font-size="9" fill="#000">GELU activation</text>

  <rect x="45" y="260" width="150" height="22" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="120" y="275" text-anchor="middle" font-size="9" fill="#000">img/video tokens</text>

  <!-- Arrow: Vision -> Projector -->
  <line x1="210" y1="140" x2="270" y2="140" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Projector -->
  <rect x="270" y="120" width="110" height="40" rx="0" fill="#1a3a6e" fill-opacity="0.08" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="325" y="137" text-anchor="middle" font-size="10" fill="#000">Projector</text>
  <text x="325" y="152" text-anchor="middle" font-size="9" fill="#888">1280 -> 6144</text>

  <!-- Arrow: Projector -> LLM -->
  <line x1="380" y1="140" x2="440" y2="140" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== LLM BACKBONE (center) ===== -->
  <rect x="440" y="50" width="330" height="320" rx="0" fill="none" stroke="#1a3a6e" stroke-width="2"/>
  <text x="605" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a6e">LLM Backbone (60 Layers)</text>
  <line x1="460" y1="80" x2="750" y2="80" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- Embedding -->
  <rect x="555" y="90" width="100" height="24" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="605" y="106" text-anchor="middle" font-size="9" fill="#000">Embed (200K)</text>

  <!-- Layers 1-3: Dense + Full Attn -->
  <rect x="460" y="125" width="290" height="42" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="605" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">Layers 1-3: Dense + Full Attn</text>
  <text x="605" y="158" text-anchor="middle" font-size="9" fill="#888">64Q/4KV GQA, RoPE(theta=5M), QK-Norm</text>

  <!-- Layers 4-60: MoE + MSA -->
  <rect x="460" y="178" width="290" height="55" rx="0" fill="#b8721a" fill-opacity="0.06" stroke="#b8721a" stroke-width="1.5"/>
  <text x="605" y="195" text-anchor="middle" font-size="10" font-weight="bold" fill="#b8721a">Layers 4-60: MoE + MSA (57 layers)</text>
  <text x="605" y="212" text-anchor="middle" font-size="9" fill="#000">MSA: block=128, 4 idx-heads, top-16</text>
  <text x="605" y="226" text-anchor="middle" font-size="9" fill="#000">MoE: 128 experts, top-4, sigmoid</text>

  <!-- Dense MLP detail -->
  <rect x="460" y="245" width="130" height="45" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="525" y="260" text-anchor="middle" font-size="9" fill="#000">Dense MLP</text>
  <text x="525" y="275" text-anchor="middle" font-size="8" fill="#888">intermediate=12288</text>
  <text x="525" y="288" text-anchor="middle" font-size="8" fill="#888">SwiGLU-OAI</text>

  <!-- MoE detail -->
  <rect x="610" y="245" width="140" height="45" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="680" y="260" text-anchor="middle" font-size="9" fill="#000">MoE FFN</text>
  <text x="680" y="275" text-anchor="middle" font-size="8" fill="#888">128 experts / 4 active</text>
  <text x="680" y="288" text-anchor="middle" font-size="8" fill="#888">intermediate=3072</text>

  <!-- Gemma Norm -->
  <rect x="460" y="300" width="140" height="28" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="530" y="318" text-anchor="middle" font-size="9" fill="#000">Gemma Norm + RMS</text>

  <!-- Shared Expert -->
  <rect x="610" y="300" width="140" height="28" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="680" y="318" text-anchor="middle" font-size="9" fill="#000">1 Shared Expert</text>

  <!-- Router -->
  <rect x="460" y="337" width="290" height="22" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="605" y="352" text-anchor="middle" font-size="9" fill="#000">Router: Sigmoid scoring + routing bias</text>

  <!-- Arrow: LLM -> MTP -->
  <line x1="770" y1="210" x2="830" y2="210" stroke="#b8721a" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- ===== MTP MODULES (right) ===== -->
  <rect x="830" y="175" width="170" height="120" rx="0" fill="#b8721a" fill-opacity="0.06" stroke="#b8721a" stroke-width="1.5"/>
  <text x="915" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#b8721a">MTP (x7 modules)</text>
  <line x1="845" y1="203" x2="985" y2="203" stroke="#b8721a" stroke-width="0.5"/>

  <rect x="845" y="212" width="140" height="22" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="915" y="227" text-anchor="middle" font-size="9" fill="#000">MTP-1: 1-layer pred</text>

  <rect x="845" y="240" width="140" height="22" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="915" y="255" text-anchor="middle" font-size="9" fill="#000">MTP-2..MTP-7</text>

  <rect x="845" y="268" width="140" height="22" rx="0" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="915" y="283" text-anchor="middle" font-size="9" fill="#888">Source: closed-source</text>

  <!-- ===== BOTTOM SECTION: Key Parameters ===== -->
  <rect x="30" y="340" width="1040" height="140" rx="0" fill="none" stroke="#888" stroke-width="0.5"/>
  <text x="550" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Key Parameters</text>

  <!-- Row 1 -->
  <text x="50" y="385" font-size="9" fill="#000">Total params:</text>
  <text x="160" y="385" font-size="9" font-weight="bold" fill="#1a3a6e">~428B</text>
  <text x="280" y="385" font-size="9" fill="#000">Active params:</text>
  <text x="390" y="385" font-size="9" font-weight="bold" fill="#1a3a6e">~23B</text>
  <text x="520" y="385" font-size="9" fill="#000">hidden_size:</text>
  <text x="630" y="385" font-size="9" font-weight="bold" fill="#1a3a6e">6144</text>
  <text x="740" y="385" font-size="9" fill="#000">Layers:</text>
  <text x="810" y="385" font-size="9" font-weight="bold" fill="#1a3a6e">60</text>

  <!-- Row 2 -->
  <text x="50" y="408" font-size="9" fill="#000">Q heads:</text>
  <text x="160" y="408" font-size="9" font-weight="bold" fill="#1a3a6e">64</text>
  <text x="280" y="408" font-size="9" fill="#000">KV heads:</text>
  <text x="390" y="408" font-size="9" font-weight="bold" fill="#1a3a6e">4 (GQA 16:1)</text>
  <text x="520" y="408" font-size="9" fill="#000">head_dim:</text>
  <text x="630" y="408" font-size="9" font-weight="bold" fill="#1a3a6e">128</text>
  <text x="740" y="408" font-size="9" fill="#000">RoPE theta:</text>
  <text x="810" y="408" font-size="9" font-weight="bold" fill="#1a3a6e">5M</text>

  <!-- Row 3 -->
  <text x="50" y="431" font-size="9" fill="#000">Experts:</text>
  <text x="160" y="431" font-size="9" font-weight="bold" fill="#b8721a">128</text>
  <text x="280" y="431" font-size="9" fill="#000">Active/tok:</text>
  <text x="390" y="431" font-size="9" font-weight="bold" fill="#b8721a">4</text>
  <text x="520" y="431" font-size="9" fill="#000">MSA block:</text>
  <text x="630" y="431" font-size="9" font-weight="bold" fill="#b8721a">128</text>
  <text x="740" y="431" font-size="9" fill="#000">MSA top-k:</text>
  <text x="810" y="431" font-size="9" font-weight="bold" fill="#b8721a">16</text>

  <!-- Row 4 -->
  <text x="50" y="454" font-size="9" fill="#000">MTP modules:</text>
  <text x="160" y="454" font-size="9" font-weight="bold" fill="#b8721a">7</text>
  <text x="280" y="454" font-size="9" fill="#000">MTP layers:</text>
  <text x="390" y="454" font-size="9" font-weight="bold" fill="#b8721a">1</text>
  <text x="520" y="454" font-size="9" fill="#000">Norm:</text>
  <text x="630" y="454" font-size="9" font-weight="bold" fill="#1a3a6e">Gemma+QK</text>
  <text x="740" y="454" font-size="9" fill="#000">Routing:</text>
  <text x="810" y="454" font-size="9" font-weight="bold" fill="#b8721a">Sigmoid</text>

  <!-- ===== TOKEN FLOW (bottom) ===== -->
  <rect x="30" y="500" width="1040" height="110" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="550" y="520" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">Token Flow</text>

  <rect x="50" y="535" width="100" height="30" rx="0" fill="#4a7ab0" fill-opacity="0.1" stroke="#4a7ab0" stroke-width="1"/>
  <text x="100" y="554" text-anchor="middle" font-size="9" fill="#000">Text Input</text>

  <line x1="150" y1="550" x2="185" y2="550" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="190" y="535" width="110" height="30" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="245" y="554" text-anchor="middle" font-size="9" fill="#000">Token Embed</text>

  <line x1="300" y1="550" x2="335" y2="550" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="340" y="535" width="140" height="30" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="410" y="554" text-anchor="middle" font-size="9" fill="#000">60-layer LLM</text>

  <line x1="480" y1="550" x2="515" y2="550" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="520" y="535" width="100" height="30" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="570" y="554" text-anchor="middle" font-size="9" fill="#000">MTP (x7)</text>

  <line x1="620" y1="550" x2="655" y2="550" stroke="#b8721a" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <rect x="660" y="535" width="100" height="30" rx="0" fill="none" stroke="#4a7ab0" stroke-width="1"/>
  <text x="710" y="554" text-anchor="middle" font-size="9" fill="#000">LM Head</text>

  <line x1="760" y1="550" x2="795" y2="550" stroke="#1a3a6e" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="800" y="535" width="100" height="30" rx="0" fill="#4a7ab0" fill-opacity="0.1" stroke="#4a7ab0" stroke-width="1"/>
  <text x="850" y="554" text-anchor="middle" font-size="9" fill="#000">Output</text>

  <!-- Visual branch -->
  <rect x="50" y="575" width="120" height="25" rx="0" fill="#b8721a" fill-opacity="0.06" stroke="#b8721a" stroke-width="1"/>
  <text x="110" y="592" text-anchor="middle" font-size="8" fill="#000">Image/Video</text>

  <line x1="170" y1="587" x2="200" y2="587" stroke="#b8721a" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <rect x="205" y="575" width="110" height="25" rx="0" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="260" y="592" text-anchor="middle" font-size="8" fill="#000">ViT + Proj</text>

  <line x1="315" y1="587" x2="338" y2="565" stroke="#b8721a" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <text x="345" y="580" font-size="7" fill="#888">merge via placeholder tokens</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="630" width="300" height="80" rx="0" fill="none" stroke="#888" stroke-width="0.5"/>
  <text x="45" y="648" font-size="10" font-weight="bold" fill="#1a3a6e">Legend</text>
  <rect x="45" y="658" width="30" height="12" rx="0" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="82" y="668" font-size="9" fill="#000">LLM / Standard component</text>
  <rect x="45" y="675" width="30" height="12" rx="0" fill="none" stroke="#b8721a" stroke-width="1.5"/>
  <text x="82" y="685" font-size="9" fill="#000">MSA / MoE / MTP (core innovation)</text>
  <rect x="45" y="692" width="30" height="12" rx="0" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="82" y="702" font-size="9" fill="#888">Closed-source / unverified</text>
</svg>