  <text x="90" y="338" font-family="Courier New, monospace" font-size="9.5" fill="#000">num_layers = 78</text>
  <text x="90" y="355" font-family="Courier New, monospace" font-size="9.5" fill="#000">first_k_dense_replace = 3</text>
  <text x="90" y="372" font-family="Courier New, monospace" font-size="9.5" fill="#000">moe_layer_freq = 1 (every layer after first 3)</text>

