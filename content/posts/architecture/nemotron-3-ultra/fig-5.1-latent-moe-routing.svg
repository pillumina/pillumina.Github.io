<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" width="1100" height="850">
  <defs>
    <style>
      .fig-51-text { font-family: "Courier New", monospace; font-size: 13px; fill: #000; }
      .fig-51-text-sm { font-family: "Courier New", monospace; font-size: 11px; fill: #000; }
      .fig-51-text-xs { font-family: "Courier New", monospace; font-size: 9px; fill: #888; }
      .fig-51-text-hl { font-family: "Courier New", monospace; font-size: 13px; fill: #1a3a6e; font-weight: bold; }
      .fig-51-text-accent { font-family: "Courier New", monospace; font-size: 12px; fill: #b8721a; }
      .fig-51-box { fill: #1a3a6e; fill-opacity: 0.08; stroke: #1a3a6e; stroke-width: 1.8; }
      .fig-51-box-expert { fill: #4a7ab0; fill-opacity: 0.08; stroke: #4a7ab0; stroke-width: 1; }
      .fig-51-box-shared { fill: #b8721a; fill-opacity: 0.08; stroke: #b8721a; stroke-width: 1.5; stroke-dasharray: 4,3; }
      .fig-51-box-light { fill: none; stroke: #1a3a6e; stroke-width: 1.2; }
      .fig-51-legend-box { fill: none; stroke: #888; stroke-width: 1; }
      .fig-51-arrow { stroke: #1a3a6e; stroke-width: 1.5; fill: none; }
      .fig-51-arrow-expert { stroke: #4a7ab0; stroke-width: 0.8; fill: none; }
      .fig-51-arrow-shared { stroke: #b8721a; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
      .fig-51-arrow-head { fill: #1a3a6e; }
      .fig-51-line-gray { stroke: #888; stroke-width: 0.8; fill: none; stroke-dasharray: 3,4; }
    </style>
  </defs>

  <!-- Title -->
  <text x="30" y="28" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#000">Fig 5.1 — LatentMoE Routing Topology: Low-Rank Gating with 512 Experts</text>
  <line x1="30" y1="36" x2="750" y2="36" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- ===== LEFT SIDE: Gate/Routing Pipeline ===== -->

  <!-- Hidden state input -->
  <rect x="40" y="65" width="160" height="36" class="fig-51-box"/>
  <text x="120" y="81" text-anchor="middle" class="fig-51-text-sm">Hidden State</text>
  <text x="120" y="94" text-anchor="middle" class="fig-51-text-xs">[B, S, 8192]</text>

  <!-- Arrow -->
  <line x1="200" y1="83" x2="240" y2="83" class="fig-51-arrow"/>
  <polygon points="235,79 240,83 235,87" class="fig-51-arrow-head"/>

  <!-- Latent Proj: 8192 -> 2048 -->
  <rect x="240" y="53" width="170" height="60" class="fig-51-box"/>
  <text x="325" y="73" text-anchor="middle" class="fig-51-text-sm">Latent Projection</text>
  <text x="325" y="89" text-anchor="middle" class="fig-51-text-xs">Linear: 8192 &#8594; 2048</text>
  <text x="325" y="105" text-anchor="middle" class="fig-51-text-xs">Compression ratio: 4&#215;</text>

  <!-- Arrow -->
  <line x1="410" y1="83" x2="450" y2="83" class="fig-51-arrow"/>
  <polygon points="445,79 450,83 445,87" class="fig-51-arrow-head"/>

  <!-- Latent space [B, S, 2048] -->
  <rect x="450" y="57" width="150" height="52" class="fig-51-box"/>
  <text x="525" y="78" text-anchor="middle" class="fig-51-text-sm">Latent Space</text>
  <text x="525" y="93" text-anchor="middle" class="fig-51-text-xs">[B, S, 2048]</text>
  <text x="525" y="105" text-anchor="middle" class="fig-51-text-xs">Low-rank bottleneck</text>

  <!-- Arrow -->
  <line x1="600" y1="83" x2="640" y2="83" class="fig-51-arrow"/>
  <polygon points="635,79 640,83 635,87" class="fig-51-arrow-head"/>

  <!-- Sigmoid Gate -->
  <rect x="640" y="57" width="150" height="52" class="fig-51-box"/>
  <text x="715" y="78" text-anchor="middle" class="fig-51-text-sm">Sigmoid Gate</text>
  <text x="715" y="93" text-anchor="middle" class="fig-51-text-xs">&#963;(latent @ w)</text>
  <text x="715" y="105" text-anchor="middle" class="fig-51-text-xs">[B, S, 512] weights</text>

  <!-- Arrow -->
  <line x1="790" y1="83" x2="830" y2="83" class="fig-51-arrow"/>
  <polygon points="825,79 830,83 825,87" class="fig-51-arrow-head"/>

  <!-- Top-22 Selection -->
  <rect x="830" y="53" width="155" height="60" class="fig-51-box"/>
  <text x="907" y="73" text-anchor="middle" class="fig-51-text-sm">Top-22 Selection</text>
  <text x="907" y="89" text-anchor="middle" class="fig-51-text-xs">Sort 512 gates</text>
  <text x="907" y="105" text-anchor="middle" class="fig-51-text-xs">Pick top-22 + normalize</text>

  <!-- ===== RIGHT SIDE: Expert computation ===== -->

  <line x1="30" y1="160" x2="1070" y2="160" stroke="#1a3a6e" stroke-width="0.5"/>

  <text x="40" y="195" class="fig-51-text-hl">Expert Computation (512 Routed + 1 Shared)</text>

  <!-- Shared Expert (always active) -->
  <rect x="40" y="210" width="200" height="28" class="fig-51-box-shared"/>
  <text x="140" y="228" text-anchor="middle" class="fig-51-text-sm">Shared Expert (1&#215;)</text>

  <!-- Expert grid: 8 rows x 4 cols = 32 visible, representing 512 -->
  <text x="40" y="260" class="fig-51-text-xs">Expert Grid (512 total, 22 active/token)</text>

  <!-- Row 1 -->
  <rect x="40" y="268" width="86" height="18" class="fig-51-box-expert"/>
  <text x="83" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E0</text>
  <rect x="130" y="268" width="86" height="18" class="fig-51-box-expert"/>
  <text x="173" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E1</text>
  <rect x="220" y="268" width="86" height="18" class="fig-51-box-expert"/>
  <text x="263" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E2</text>
  <rect x="310" y="268" width="86" height="18" class="fig-51-box-expert"/>
  <text x="353" y="281" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E3</text>
  <!-- Row 2 -->
  <rect x="40" y="290" width="86" height="18" class="fig-51-box-expert"/>
  <text x="83" y="303" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E4</text>
  <rect x="130" y="290" width="86" height="18" class="fig-51-box-expert"/>
  <text x="173" y="303" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E5</text>
  <rect x="220" y="290" width="86" height="18" class="fig-51-box-expert"/>
  <text x="263" y="303" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E6</text>
  <rect x="310" y="290" width="86" height="18" class="fig-51-box-expert"/>
  <text x="353" y="303" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E7</text>
  <!-- Row 3 -->
  <rect x="40" y="312" width="86" height="18" class="fig-51-box-expert"/>
  <text x="83" y="325" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E8</text>
  <rect x="130" y="312" width="86" height="18" class="fig-51-box-expert"/>
  <text x="173" y="325" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">E9</text>
  <rect x="220" y="312" width="86" height="18" class="fig-51-box-expert"/>
  <text x="263" y="325" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="310" y="312" width="86" height="18" class="fig-51-box-expert"/>
  <text x="353" y="325" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <!-- Row 4 -->
  <rect x="40" y="334" width="86" height="18" class="fig-51-box-expert"/>
  <text x="83" y="347" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="130" y="334" width="86" height="18" class="fig-51-box-expert"/>
  <text x="173" y="347" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="220" y="334" width="86" height="18" class="fig-51-box-expert"/>
  <text x="263" y="347" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="310" y="334" width="86" height="18" class="fig-51-box-expert"/>
  <text x="353" y="347" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <!-- Row 5 -->
  <rect x="40" y="356" width="86" height="18" class="fig-51-box-expert"/>
  <text x="83" y="369" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="130" y="356" width="86" height="18" class="fig-51-box-expert"/>
  <text x="173" y="369" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="220" y="356" width="86" height="18" class="fig-51-box-expert"/>
  <text x="263" y="369" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="310" y="356" width="86" height="18" class="fig-51-box-expert"/>
  <text x="353" y="369" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <!-- Row 6 -->
  <rect x="40" y="378" width="86" height="18" class="fig-51-box-expert"/>
  <text x="83" y="391" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="130" y="378" width="86" height="18" class="fig-51-box-expert"/>
  <text x="173" y="391" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="220" y="378" width="86" height="18" class="fig-51-box-expert"/>
  <text x="263" y="391" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>
  <rect x="310" y="378" width="86" height="18" class="fig-51-box-expert"/>
  <text x="353" y="391" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#4a7ab0">...</text>

  <text x="210" y="415" text-anchor="middle" class="fig-51-text-xs">&#215; 512 total experts, each expert = FFN(8192 &#8594; 5120 &#8594; 8192)</text>

  <!-- ===== RIGHT SIDE DETAILS ===== -->

  <!-- Expert Internals -->
  <rect x="460" y="210" width="300" height="195" rx="0" ry="0" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.03"/>
  <text x="610" y="235" text-anchor="middle" class="fig-51-text-hl">Per-Expert FFN</text>

  <rect x="480" y="248" width="120" height="28" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.05"/>
  <text x="540" y="266" text-anchor="middle" class="fig-51-text-xs">w1: 8192&#8594;5120</text>

  <line x1="600" y1="262" x2="620" y2="262" class="fig-51-arrow"/>

  <rect x="620" y="248" width="120" height="28" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.05"/>
  <text x="680" y="266" text-anchor="middle" class="fig-51-text-xs">ReLU&#178; act</text>

  <line x1="680" y1="276" x2="680" y2="298" class="fig-51-arrow"/>

  <rect x="620" y="298" width="120" height="28" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.05"/>
  <text x="680" y="316" text-anchor="middle" class="fig-51-text-xs">w2: 5120&#8594;8192</text>

  <line x1="600" y1="312" x2="580" y2="312" class="fig-51-arrow"/>

  <rect x="480" y="298" width="120" height="28" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.05"/>
  <text x="540" y="316" text-anchor="middle" class="fig-51-text-xs">w3: 8192&#8594;5120</text>

  <!-- Gate -->
  <text x="610" y="358" text-anchor="middle" class="fig-51-text-sm">output = (w1&#8594;ReLU&#178;) &#8857; w3 &#8594; w2</text>
  <text x="610" y="378" text-anchor="middle" class="fig-51-text-xs">Swiglu-style with ReLU&#178; activation</text>

  <!-- ===== Merge section ===== -->
  <line x1="30" y1="450" x2="1070" y2="450" stroke="#1a3a6e" stroke-width="0.5"/>

  <text x="40" y="480" class="fig-51-text-hl">Output Merge: Weighted Sum + Shared Expert</text>

  <!-- Expert outputs -->
  <rect x="40" y="495" width="180" height="40" class="fig-51-box"/>
  <text x="130" y="511" text-anchor="middle" class="fig-51-text-sm">Expert Outputs</text>
  <text x="130" y="526" text-anchor="middle" class="fig-51-text-xs">22 active &#215; [B,S,8192]</text>

  <!-- Arrow to weighted sum -->
  <line x1="220" y1="515" x2="280" y2="515" class="fig-51-arrow"/>
  <polygon points="275,511 280,515 275,519" class="fig-51-arrow-head"/>

  <!-- Weighted Sum -->
  <rect x="280" y="490" width="170" height="50" class="fig-51-box"/>
  <text x="365" y="506" text-anchor="middle" class="fig-51-text-sm">Weighted Sum</text>
  <text x="365" y="521" text-anchor="middle" class="fig-51-text-xs">&#931; w_i &#215; E_i(input)</text>
  <text x="365" y="535" text-anchor="middle" class="fig-51-text-xs">norm_topk_prob + scale=5.0</text>

  <!-- Arrow to add -->
  <line x1="450" y1="515" x2="510" y2="515" class="fig-51-arrow"/>
  <polygon points="505,511 510,515 505,519" class="fig-51-arrow-head"/>

  <!-- Shared expert -->
  <rect x="280" y="555" width="170" height="28" class="fig-51-box-shared"/>
  <text x="365" y="573" text-anchor="middle" class="fig-51-text-sm">+ Shared Expert Output</text>

  <line x1="365" y1="540" x2="365" y2="555" class="fig-51-arrow-shared"/>

  <!-- Arrow to add -->
  <line x1="365" y1="583" x2="365" y2="610" class="fig-51-arrow"/>
  <polygon points="360,605 365,615 370,605" class="fig-51-arrow-head"/>

  <!-- Add -->
  <rect x="510" y="495" width="120" height="36" class="fig-51-box"/>
  <text x="570" y="513" text-anchor="middle" class="fig-51-text-sm">&#8853; Add</text>
  <text x="570" y="525" text-anchor="middle" class="fig-51-text-xs">merge</text>

  <!-- Arrow to output -->
  <line x1="630" y1="513" x2="680" y2="513" class="fig-51-arrow"/>
  <polygon points="675,509 680,513 675,517" class="fig-51-arrow-head"/>

  <!-- Output -->
  <rect x="680" y="495" width="150" height="36" class="fig-51-box"/>
  <text x="755" y="513" text-anchor="middle" class="fig-51-text-sm">Output</text>
  <text x="755" y="525" text-anchor="middle" class="fig-51-text-xs">[B, S, 8192]</text>

  <!-- ===== Key Parameters ===== -->
  <line x1="30" y1="650" x2="1070" y2="650" stroke="#1a3a6e" stroke-width="0.5"/>

  <text x="40" y="680" class="fig-51-text-hl">Key LatentMoE Parameters</text>

  <rect x="40" y="695" width="700" height="50" rx="0" ry="0" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.03"/>
  <text x="60" y="715" class="fig-51-text-sm">Experts: 512 routed + 1 shared | Active: 22/token | Latent dim: 2048 | FFN dim: 5120 | Route scale: 5.0</text>
  <text x="60" y="735" class="fig-51-text-xs">Routing: Linear(8192&#8594;2048) &#8594; Sigmoid &#8594; TopK(22) &#8594; norm_topk_prob &#8594; Weighted sum of expert outputs</text>

  <!-- ===== LEGEND ===== -->
  <rect x="40" y="765" width="400" height="75" class="fig-51-legend-box"/>
  <text x="55" y="786" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#000">Legend</text>

  <rect x="55" y="798" width="20" height="12" class="fig-51-box"/>
  <text x="85" y="809" class="fig-51-text-xs">Primary computation / routing stage</text>

  <rect x="260" y="798" width="20" height="12" class="fig-51-box-expert"/>
  <text x="290" y="809" class="fig-51-text-xs">Routed expert (1 of 512)</text>

  <rect x="55" y="822" width="20" height="12" class="fig-51-box-shared"/>
  <text x="85" y="833" class="fig-51-text-xs">Shared expert (always active)</text>
</svg>
