<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" width="1100" height="850">
  <defs>
    <style>
      .fig-52-text { font-family: "Courier New", monospace; font-size: 13px; fill: #000; }
      .fig-52-text-sm { font-family: "Courier New", monospace; font-size: 11px; fill: #000; }
      .fig-52-text-xs { font-family: "Courier New", monospace; font-size: 9px; fill: #888; }
      .fig-52-text-hl { font-family: "Courier New", monospace; font-size: 13px; fill: #1a3a6e; font-weight: bold; }
      .fig-52-text-accent { font-family: "Courier New", monospace; font-size: 12px; fill: #b8721a; }
      .fig-52-step-num { font-family: "Courier New", monospace; font-size: 16px; font-weight: bold; fill: #1a3a6e; }
      .fig-52-step-box { fill: #1a3a6e; fill-opacity: 0.08; stroke: #1a3a6e; stroke-width: 1.8; }
      .fig-52-step-box-light { fill: none; stroke: #1a3a6e; stroke-width: 1.2; }
      .fig-52-legend-box { fill: none; stroke: #888; stroke-width: 1; }
      .fig-52-arrow { stroke: #1a3a6e; stroke-width: 1.5; fill: none; }
      .fig-52-arrow-head { fill: #1a3a6e; }
      .fig-52-line-gray { stroke: #888; stroke-width: 0.8; fill: none; stroke-dasharray: 3,4; }
      .fig-52-line-accent { stroke: #b8721a; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
      .fig-52-highlight { fill: none; stroke: #b8721a; stroke-width: 2; stroke-dasharray: 4,3; }
      .fig-52-tag { fill: #b8721a; stroke: #b8721a; stroke-width: 1; }
    </style>
  </defs>

  <!-- Title -->
  <text x="30" y="28" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#000">Fig 5.2 — LatentMoE Operator-Level Internal Data Flow (7 Steps)</text>
  <line x1="30" y1="36" x2="700" y2="36" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- ===== 7 STEPS ===== -->

  <!-- Step 1 -->
  <circle cx="55" cy="80" r="14" fill="#1a3a6e" fill-opacity="0.12" stroke="#1a3a6e" stroke-width="2"/>
  <text x="55" y="85" text-anchor="middle" class="fig-52-step-num">1</text>
  <rect x="80" y="65" width="250" height="30" class="fig-52-step-box"/>
  <text x="205" y="84" text-anchor="middle" class="fig-52-text-sm">Receive Hidden State [B, S, 8192]</text>
  <text x="340" y="84" class="fig-52-text-xs">From previous mixer block</text>

  <!-- Step 2 -->
  <circle cx="55" cy="130" r="14" fill="#1a3a6e" fill-opacity="0.12" stroke="#1a3a6e" stroke-width="2"/>
  <text x="55" y="135" text-anchor="middle" class="fig-52-step-num">2</text>
  <rect x="80" y="115" width="310" height="30" class="fig-52-step-box"/>
  <text x="235" y="134" text-anchor="middle" class="fig-52-text-sm">Latent Projection: W_latent @ h_t [8192 &#8594; 2048]</text>
  <text x="400" y="134" class="fig-52-text-xs">Compression 4&#215;, param: 8192&#215;2048</text>

  <!-- Step 3 -->
  <circle cx="55" cy="180" r="14" fill="#1a3a6e" fill-opacity="0.12" stroke="#1a3a6e" stroke-width="2"/>
  <text x="55" y="185" text-anchor="middle" class="fig-52-step-num">3</text>
  <rect x="80" y="165" width="310" height="30" class="fig-52-step-box"/>
  <text x="235" y="184" text-anchor="middle" class="fig-52-text-sm">Sigmoid Gate: gate_weights = &#963;(latent @ W_g)</text>
  <text x="400" y="184" class="fig-52-text-xs">[B, S, 2048] &#8594; [B, S, 512]</text>

  <!-- Step 4 -->
  <circle cx="55" cy="230" r="14" fill="#1a3a6e" fill-opacity="0.12" stroke="#1a3a6e" stroke-width="2"/>
  <text x="55" y="235" text-anchor="middle" class="fig-52-step-num">4</text>
  <rect x="80" y="215" width="370" height="30" class="fig-52-step-box"/>
  <text x="265" y="234" text-anchor="middle" class="fig-52-text-sm">Top-22 Mask + Normalize: sort -> mask top 22 -> softmax</text>
  <text x="460" y="234" class="fig-52-text-xs">norm_topk_prob=True, 490/512 masked out</text>

  <!-- Step 5 -->
  <circle cx="55" cy="280" r="14" fill="#1a3a6e" fill-opacity="0.12" stroke="#1a3a6e" stroke-width="2"/>
  <text x="55" y="285" text-anchor="middle" class="fig-52-step-num">5</text>
  <rect x="80" y="265" width="350" height="30" class="fig-52-step-box"/>
  <text x="255" y="284" text-anchor="middle" class="fig-52-text-sm">Latent Up-Project + Expert Dispatch: token &#8594; 22 experts</text>
  <text x="440" y="284" class="fig-52-text-xs">Per-expert input restored from latent</text>

  <!-- Step 6 -->
  <circle cx="55" cy="330" r="14" fill="#1a3a6e" fill-opacity="0.12" stroke="#1a3a6e" stroke-width="2"/>
  <text x="55" y="335" text-anchor="middle" class="fig-52-step-num">6</text>
  <rect x="80" y="315" width="390" height="30" class="fig-52-step-box"/>
  <text x="275" y="334" text-anchor="middle" class="fig-52-text-sm">Expert FFN Compute: 22 experts process in parallel, ReLU&#178; act</text>
  <text x="480" y="334" class="fig-52-text-xs">Each: 8192&#8594;5120&#8594;8192</text>

  <!-- Step 7 -->
  <circle cx="55" cy="380" r="14" fill="#1a3a6e" fill-opacity="0.12" stroke="#1a3a6e" stroke-width="2"/>
  <text x="55" y="385" text-anchor="middle" class="fig-52-step-num">7</text>
  <rect x="80" y="365" width="380" height="30" class="fig-52-step-box"/>
  <text x="270" y="384" text-anchor="middle" class="fig-52-text-sm">Weighted Sum + Shared Expert Merge: output [B, S, 8192]</text>
  <text x="470" y="384" class="fig-52-text-xs">&#931; gate_i&#215;expert_i + shared_out &#215; 5.0</text>

  <!-- ===== DETAILED TENSOR FLOW ===== -->
  <line x1="30" y1="435" x2="1070" y2="435" stroke="#1a3a6e" stroke-width="0.5"/>

  <text x="30" y="465" class="fig-52-text-hl">Detailed Tensor Flow with Operator Shapes</text>

  <rect x="30" y="480" width="1040" height="270" rx="0" ry="0" stroke="#1a3a6e" stroke-width="1" fill="#1a3a6e" fill-opacity="0.03"/>

  <!-- Row 1: Input -> Latent -->
  <rect x="50" y="498" width="180" height="28" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="140" y="516" text-anchor="middle" class="fig-52-text-xs">h_t = [B, S, 8192]</text>

  <line x1="230" y1="512" x2="260" y2="512" class="fig-52-arrow"/>
  <polygon points="255,508 260,512 255,516" class="fig-52-arrow-head"/>

  <rect x="260" y="498" width="180" height="28" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="350" y="516" text-anchor="middle" class="fig-52-text-xs">latent = [B, S, 2048]</text>

  <line x1="440" y1="512" x2="470" y2="512" class="fig-52-arrow"/>
  <polygon points="465,508 470,512 465,516" class="fig-52-arrow-head"/>

  <rect x="470" y="498" width="200" height="28" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="570" y="516" text-anchor="middle" class="fig-52-text-xs">gate_logits = [B, S, 512]</text>

  <line x1="670" y1="512" x2="700" y2="512" class="fig-52-arrow"/>
  <polygon points="695,508 700,512 695,516" class="fig-52-arrow-head"/>

  <rect x="700" y="498" width="200" height="28" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="800" y="516" text-anchor="middle" class="fig-52-text-xs">gates = sigmoid(logits)</text>

  <text x="50" y="542" class="fig-52-text-xs">Linear(W_latent: 8192&#215;2048) -> W_g: 2048&#215;512 -> sigmoid</text>

  <!-- Row 2: Top-K selection -->
  <line x1="800" y1="526" x2="800" y2="550" class="fig-52-arrow"/>
  <polygon points="795,545 800,555 805,545" class="fig-52-arrow-head"/>

  <rect x="700" y="555" width="200" height="28" stroke="#b8721a" stroke-width="1.5" fill="#b8721a" fill-opacity="0.06"/>
  <text x="800" y="573" text-anchor="middle" class="fig-52-text-accent">topk_mask = top22(gates)</text>

  <line x1="700" y1="569" x2="500" y2="569" class="fig-52-arrow"/>
  <polygon points="505,565 495,569 505,573" class="fig-52-arrow-head"/>

  <rect x="300" y="555" width="200" height="28" stroke="#b8721a" stroke-width="1.5" fill="#b8721a" fill-opacity="0.06"/>
  <text x="400" y="573" text-anchor="middle" class="fig-52-text-accent">norm = softmax(masked)</text>

  <text x="50" y="599" class="fig-52-text-xs">Top-22 mask: set 490/512 gates to 0. norm_topk_prob: re-normalize top-22 gates to sum=1</text>

  <!-- Row 3: Expert dispatch + compute -->
  <line x1="400" y1="583" x2="400" y2="608" class="fig-52-arrow"/>
  <polygon points="395,603 400,613 405,603" class="fig-52-arrow-head"/>

  <rect x="300" y="613" width="200" height="28" stroke="#4a7ab0" stroke-width="1.5" fill="#4a7ab0" fill-opacity="0.06"/>
  <text x="400" y="631" text-anchor="middle" class="fig-52-text-xs">dispatch 22 experts</text>

  <line x1="500" y1="627" x2="540" y2="627" class="fig-52-arrow"/>
  <polygon points="535,623 540,627 535,631" class="fig-52-arrow-head"/>

  <rect x="540" y="610" width="280" height="34" stroke="#4a7ab0" stroke-width="1.5" fill="#4a7ab0" fill-opacity="0.06"/>
  <text x="680" y="625" text-anchor="middle" class="fig-52-text-xs">Expert FFN: 8192&#8594;5120&#8594;8192 (ReLU&#178;)</text>
  <text x="680" y="639" text-anchor="middle" class="fig-52-text-xs">22 active, others idle</text>

  <text x="50" y="647" class="fig-52-text-xs">Each expert computes: (w1(h) &#8594; ReLU&#178;) * w3(h) &#8594; w2. w1,w2,w3 each 8192&#215;5120.</text>

  <!-- Row 4: Merge -->
  <line x1="820" y1="627" x2="860" y2="627" class="fig-52-arrow"/>
  <polygon points="855,623 860,627 855,631" class="fig-52-arrow-head"/>

  <rect x="860" y="610" width="190" height="34" stroke="#1a3a6e" stroke-width="1.5" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="955" y="625" text-anchor="middle" class="fig-52-text-xs">weighted sum &#215; 5.0</text>
  <text x="955" y="639" text-anchor="middle" class="fig-52-text-xs">&#931; w_i * expert_i(h)</text>

  <line x1="955" y1="644" x2="955" y2="668" class="fig-52-arrow"/>
  <polygon points="950,663 955,673 960,663" class="fig-52-arrow-head"/>

  <rect x="860" y="673" width="190" height="28" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="4,3" fill="#b8721a" fill-opacity="0.04"/>
  <text x="955" y="691" text-anchor="middle" class="fig-52-text-xs">+ shared_expert(h)</text>

  <line x1="955" y1="701" x2="955" y2="720" class="fig-52-arrow"/>
  <polygon points="950,715 955,725 960,715" class="fig-52-arrow-head"/>

  <rect x="860" y="725" width="190" height="28" class="fig-52-step-box"/>
  <text x="955" y="743" text-anchor="middle" class="fig-52-text-sm">output [B, S, 8192]</text>

  <!-- ===== LOAD BALANCE ===== -->
  <text x="30" y="810" class="fig-52-text-hl">Load Balancing</text>
  <text x="30" y="830" class="fig-52-text-sm">Auxiliary loss encourages uniform expert utilization. 512 experts with 22 active/token &#8776; 4.3% per token.</text>
  <text x="30" y="848" class="fig-52-text-xs">Shared expert (1&#215;) ensures minimum quality even when routing distribution is skewed.</text>

  <!-- ===== LEGEND ===== -->
  <rect x="720" y="795" width="350" height="50" class="fig-52-legend-box"/>
  <text x="735" y="811" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#000">Legend</text>

  <rect x="735" y="822" width="20" height="10" stroke="#1a3a6e" stroke-width="1.2" fill="#1a3a6e" fill-opacity="0.06"/>
  <text x="765" y="831" class="fig-52-text-xs">Main data path</text>

  <rect x="855" y="822" width="20" height="10" stroke="#b8721a" stroke-width="1.2" fill="#b8721a" fill-opacity="0.06"/>
  <text x="885" y="831" class="fig-52-text-xs">Gating/bias path</text>
</svg>
