<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Courier New, monospace">
  <rect width="1100" height="640" fill="#ffffff"/>

  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3a6e">LongCat-2.0 — MoE Routing Topology</text>
  <text x="550" y="48" text-anchor="middle" font-size="10" fill="#888">768 routed experts + 128 identity zero experts | top-12 | routed_scaling_factor = 9 | sparsity ~97%</text>

  <!-- Legend -->
  <g>
    <rect x="20" y="570" width="320" height="56" fill="none" stroke="#888" stroke-width="1"/>
    <text x="28" y="586" font-size="10" font-weight="bold" fill="#1a3a6e">LEGEND</text>
    <rect x="28" y="594" width="14" height="10" fill="none" stroke="#1a3a6e"/>
    <text x="48" y="603" font-size="9" fill="#000">linear / norm</text>
    <rect x="28" y="610" width="14" height="10" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="48" y="619" font-size="9" fill="#000">activated expert</text>
    <text x="200" y="603" font-size="9" fill="#888">---&gt; token dispatch</text>
    <text x="200" y="619" font-size="9" fill="#888">- - -&gt; padding route</text>
  </g>

  <!-- Formula panel -->
  <rect x="700" y="570" width="380" height="56" fill="none" stroke="#888" stroke-width="1"/>
  <text x="710" y="586" font-size="10" font-weight="bold" fill="#1a3a6e">ROUTING FORMULA</text>
  <text x="710" y="602" font-size="9" fill="#000">softmax(Linear(h)) + bias -&gt; top-12</text>
  <text x="710" y="616" font-size="9" fill="#000">weight = softmax_score * routed_scaling_factor (9.0)</text>

  <!-- INPUT -->
  <rect x="60" y="90" width="160" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle" font-size="10" fill="#000">token hidden h</text>
  <text x="140" y="122" text-anchor="middle" font-size="9" fill="#888">[B,S,8192]</text>

  <line x1="220" y1="110" x2="270" y2="110" stroke="#000" stroke-width="1.2" marker-end="url(#arrE)"/>

  <!-- ROUTER -->
  <rect x="270" y="80" width="220" height="60" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="380" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">Softmax Router</text>
  <text x="380" y="114" text-anchor="middle" font-size="9" fill="#000">classifier: Linear 8192 -&gt; 896</text>
  <text x="380" y="128" text-anchor="middle" font-size="8" fill="#888">(768 routed + 128 zero slots)</text>

  <line x1="490" y1="110" x2="540" y2="110" stroke="#000" stroke-width="1.2" marker-end="url(#arrE)"/>

  <!-- bias + topk -->
  <rect x="540" y="80" width="220" height="60" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="650" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">e_score_correction_bias</text>
  <text x="650" y="114" text-anchor="middle" font-size="9" fill="#000">+ bias -&gt; top-12 selection</text>
  <text x="650" y="128" text-anchor="middle" font-size="8" fill="#888">no n_group / topk_group (vs V3)</text>

  <line x1="760" y1="110" x2="800" y2="110" stroke="#000" stroke-width="1.2"/>
  <line x1="800" y1="110" x2="800" y2="180" stroke="#000" stroke-width="1.2"/>

  <!-- branching arrows -->
  <line x1="800" y1="180" x2="200" y2="180" stroke="#000" stroke-width="1.2"/>
  <line x1="200" y1="180" x2="200" y2="200" stroke="#000" stroke-width="1.2" marker-end="url(#arrE)"/>

  <line x1="800" y1="180" x2="800" y2="200" stroke="#000" stroke-width="1.2" marker-end="url(#arrE)"/>

  <!-- dispatched scaling -->
  <rect x="820" y="90" width="200" height="40" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="920" y="108" text-anchor="middle" font-size="9" fill="#888">weight *= routed_scaling_factor</text>
  <text x="920" y="122" text-anchor="middle" font-size="9" font-weight="bold" fill="#b8721a">= 9.0</text>

  <!-- =========== ROUTED EXPERTS =========== -->
  <rect x="60" y="200" width="680" height="280" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="80" y="218" font-size="11" font-weight="bold" fill="#1a3a6e">768 ROUTED EXPERTS</text>
  <text x="80" y="232" font-size="9" fill="#888">each: SwiGLU MLP, expert_ffn_hidden_size = 2048</text>
  <text x="600" y="218" font-size="9" font-weight="bold" fill="#1a3a6e">top-12 active</text>
  <text x="600" y="232" font-size="8" fill="#888">/768 = 1.56% per token</text>

  <!-- Expert grid 12x... -->
  <g>
    <!-- row 1 -->
    <rect x="80" y="248" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="102" y="266" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">E0</text>
    <rect x="128" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="150" y="266" text-anchor="middle" font-size="9" fill="#000">E1</text>
    <rect x="176" y="248" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="198" y="266" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">E2</text>
    <rect x="224" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="246" y="266" text-anchor="middle" font-size="9" fill="#000">E3</text>
    <rect x="272" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="294" y="266" text-anchor="middle" font-size="9" fill="#000">E4</text>
    <rect x="320" y="248" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="342" y="266" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">E5</text>
    <rect x="368" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="390" y="266" text-anchor="middle" font-size="9" fill="#000">E6</text>
    <rect x="416" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="438" y="266" text-anchor="middle" font-size="9" fill="#000">E7</text>
    <rect x="464" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="486" y="266" text-anchor="middle" font-size="9" fill="#000">E8</text>
    <rect x="512" y="248" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="534" y="266" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">E9</text>
    <rect x="560" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="582" y="266" text-anchor="middle" font-size="9" fill="#000">E10</text>
    <rect x="608" y="248" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="630" y="266" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">E11</text>
    <rect x="656" y="248" width="44" height="28" fill="none" stroke="#1a3a6e"/>
    <text x="678" y="266" text-anchor="middle" font-size="9" fill="#000">E12</text>
    <!-- ... -->
    <rect x="704" y="248" width="28" height="28" fill="none" stroke="#888" stroke-dasharray="2,1"/>
    <text x="718" y="266" text-anchor="middle" font-size="9" fill="#888">..</text>

    <!-- row 2..6 omitted for brevity; represent as repeated pattern -->
    <g>
      <rect x="80" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="128" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="176" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="224" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="272" y="284" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
      <text x="294" y="302" text-anchor="middle" font-size="8" fill="#ffffff">E30</text>
      <rect x="320" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="368" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="416" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="464" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="512" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="560" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="608" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="656" y="284" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="704" y="284" width="28" height="28" fill="none" stroke="#888" stroke-dasharray="2,1"/>
      <text x="718" y="302" text-anchor="middle" font-size="9" fill="#888">..</text>
    </g>

    <!-- Dots indicating many rows -->
    <text x="400" y="340" text-anchor="middle" font-size="14" fill="#888">. . . . . . . . . . . . . . . . . .</text>
    <text x="400" y="360" text-anchor="middle" font-size="9" fill="#888">(768 experts total, shown 26)</text>

    <!-- Last row (representative) -->
    <g>
      <rect x="80" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <text x="102" y="396" text-anchor="middle" font-size="8" fill="#000">E757</text>
      <rect x="128" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="176" y="378" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
      <text x="198" y="396" text-anchor="middle" font-size="8" fill="#ffffff">E759</text>
      <rect x="224" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="272" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="320" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="368" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="416" y="378" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
      <text x="438" y="396" text-anchor="middle" font-size="8" fill="#ffffff">E763</text>
      <rect x="464" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="512" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="560" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="608" y="378" width="44" height="28" fill="none" stroke="#1a3a6e"/>
      <rect x="656" y="378" width="44" height="28" fill="#1a3a6e" stroke="#1a3a6e"/>
      <text x="678" y="396" text-anchor="middle" font-size="8" fill="#ffffff">E767</text>
      <rect x="704" y="378" width="28" height="28" fill="none" stroke="#888" stroke-dasharray="2,1"/>
    </g>
  </g>

  <!-- =========== IDENTITY ZERO EXPERTS =========== -->
  <rect x="760" y="200" width="280" height="280" fill="none" stroke="#b8721a" stroke-width="1.5"/>
  <text x="780" y="218" font-size="11" font-weight="bold" fill="#b8721a">128 IDENTITY ZERO EXPERTS</text>
  <text x="780" y="232" font-size="9" fill="#888">nn.Identity, no compute, padding-only</text>

  <!-- grid of identity experts -->
  <g>
    <rect x="780" y="248" width="30" height="22" fill="none" stroke="#b8721a"/>
    <text x="795" y="263" text-anchor="middle" font-size="8" fill="#888">Z0</text>
    <rect x="814" y="248" width="30" height="22" fill="none" stroke="#b8721a"/>
    <text x="829" y="263" text-anchor="middle" font-size="8" fill="#888">Z1</text>
    <rect x="848" y="248" width="30" height="22" fill="none" stroke="#b8721a"/>
    <text x="863" y="263" text-anchor="middle" font-size="8" fill="#888">Z2</text>
    <rect x="882" y="248" width="30" height="22" fill="none" stroke="#b8721a"/>
    <text x="897" y="263" text-anchor="middle" font-size="8" fill="#888">Z3</text>
    <rect x="916" y="248" width="30" height="22" fill="none" stroke="#b8721a"/>
    <text x="931" y="263" text-anchor="middle" font-size="8" fill="#888">Z4</text>
    <rect x="950" y="248" width="30" height="22" fill="none" stroke="#b8721a"/>
    <text x="965" y="263" text-anchor="middle" font-size="8" fill="#888">Z5</text>
    <rect x="984" y="248" width="30" height="22" fill="none" stroke="#b8721a"/>
    <text x="999" y="263" text-anchor="middle" font-size="8" fill="#888">Z6</text>

    <!-- row 2..n similar -->
    <g>
      <rect x="780" y="276" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="814" y="276" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="848" y="276" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="882" y="276" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="916" y="276" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="950" y="276" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="984" y="276" width="30" height="22" fill="none" stroke="#b8721a"/>
    </g>

    <text x="900" y="320" text-anchor="middle" font-size="12" fill="#888">. . . . . . .</text>

    <g>
      <rect x="780" y="340" width="30" height="22" fill="none" stroke="#b8721a"/>
      <text x="795" y="355" text-anchor="middle" font-size="8" fill="#888">Z120</text>
      <rect x="814" y="340" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="848" y="340" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="882" y="340" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="916" y="340" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="950" y="340" width="30" height="22" fill="none" stroke="#b8721a"/>
      <rect x="984" y="340" width="30" height="22" fill="none" stroke="#b8721a"/>
      <text x="999" y="355" text-anchor="middle" font-size="8" fill="#888">Z127</text>
    </g>
  </g>

  <text x="900" y="394" text-anchor="middle" font-size="9" fill="#000">used by padding tokens</text>
  <text x="900" y="408" text-anchor="middle" font-size="9" fill="#000">when batch &lt; moe_switch_token_num</text>
  <text x="900" y="422" text-anchor="middle" font-size="9" fill="#000">(= 1024)</text>
  <text x="900" y="442" text-anchor="middle" font-size="9" fill="#b8721a">[!] output = 0, no compute</text>
  <text x="900" y="458" text-anchor="middle" font-size="9" fill="#b8721a">saves expert dispatch cost</text>

  <!-- =========== Aggregation =========== -->
  <line x1="200" y1="480" x2="200" y2="500" stroke="#000" stroke-width="1.2"/>
  <line x1="200" y1="500" x2="500" y2="500" stroke="#000" stroke-width="1.2"/>
  <line x1="500" y1="500" x2="500" y2="510" stroke="#000" stroke-width="1.2" marker-end="url(#arrE)"/>

  <line x1="900" y1="480" x2="900" y2="500" stroke="#000" stroke-width="1.2" stroke-dasharray="4,2"/>
  <line x1="900" y1="500" x2="500" y2="500" stroke="#000" stroke-width="1.2" stroke-dasharray="4,2"/>

  <rect x="400" y="512" width="240" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="520" y="528" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">Weighted Sum</text>
  <text x="520" y="544" text-anchor="middle" font-size="9" fill="#000">sum(w_i * E_i(h)) for i in top-12</text>

  <!-- Sparsity callout -->
  <rect x="60" y="512" width="320" height="40" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="70" y="528" font-size="9" fill="#000">active params per token (MoE):</text>
  <text x="70" y="544" font-size="9" font-weight="bold" fill="#1a3a6e">12 experts * 2048 * 8192 * 2 ~= 48B / 1.6T = 3.0%</text>

  <defs>
    <marker id="arrE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
