<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Courier New, monospace">
  <rect width="1100" height="720" fill="#ffffff"/>

  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3a6e">LongCat-2.0 — Multi-head Latent Attention (MLA) Data Flow</text>
  <text x="550" y="48" text-anchor="middle" font-size="10" fill="#888">q_lora=1536, kv_lora=512 | h=8192 | KV cache = 576 dims (not full K/V)</text>

  <!-- Legend -->
  <g>
    <rect x="20" y="640" width="320" height="68" fill="none" stroke="#888" stroke-width="1"/>
    <text x="28" y="656" font-size="10" font-weight="bold" fill="#1a3a6e">LEGEND</text>
    <rect x="28" y="664" width="14" height="10" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
    <text x="48" y="673" font-size="9" fill="#000">Linear proj / norm</text>
    <rect x="28" y="678" width="14" height="10" fill="#1a3a6e" stroke="#1a3a6e"/>
    <text x="48" y="687" font-size="9" fill="#000">LoRA latent (compressed)</text>
    <text x="180" y="673" font-size="9" fill="#888">---&gt; forward</text>
    <text x="180" y="687" font-size="9" fill="#b8721a">[!] RoPE only on _rot</text>
  </g>

  <!-- Formula / KV cache panel -->
  <rect x="700" y="640" width="380" height="68" fill="none" stroke="#888" stroke-width="1"/>
  <text x="710" y="656" font-size="10" font-weight="bold" fill="#1a3a6e">FORMULAS</text>
  <text x="710" y="672" font-size="9" fill="#000">q = q_b_proj(q_a_norm(q_a_proj(h)))</text>
  <text x="710" y="684" font-size="9" fill="#000">mla_scale_q_lora  = (8192/1536)^0.5 = 2.31</text>
  <text x="710" y="696" font-size="9" fill="#000">mla_scale_kv_lora = (8192/512)^0.5  = 4.00</text>

  <!-- INPUT hidden -->
  <rect x="40" y="80" width="120" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="100" y="98" text-anchor="middle" font-size="10" fill="#000">hidden h</text>
  <text x="100" y="112" text-anchor="middle" font-size="9" fill="#888">[B,S,8192]</text>

  <!-- =========== Q branch =========== -->
  <text x="80" y="148" font-size="11" font-weight="bold" fill="#1a3a6e">QUERY BRANCH</text>
  <line x1="100" y1="120" x2="100" y2="160" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- q_a_proj -->
  <rect x="40" y="162" width="120" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="100" y="178" text-anchor="middle" font-size="9" fill="#000">q_a_proj</text>
  <text x="100" y="190" text-anchor="middle" font-size="8" fill="#888">8192 -&gt; 1536</text>
  <line x1="100" y1="194" x2="100" y2="210" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- q_a latent -->
  <rect x="40" y="212" width="120" height="24" fill="#1a3a6e" stroke="#1a3a6e"/>
  <text x="100" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">q_a (latent, 1536)</text>
  <line x1="100" y1="236" x2="100" y2="252" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- q_a_norm -->
  <rect x="40" y="254" width="120" height="28" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="100" y="272" text-anchor="middle" font-size="9" fill="#000">q_a_norm (RMS)</text>
  <line x1="100" y1="282" x2="100" y2="298" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- q_b_proj -->
  <rect x="40" y="300" width="120" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="100" y="316" text-anchor="middle" font-size="9" fill="#000">q_b_proj</text>
  <text x="100" y="328" text-anchor="middle" font-size="8" fill="#888">1536 -&gt; 64*(128+64)</text>
  <line x1="100" y1="332" x2="100" y2="350" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- split q_pass / q_rot -->
  <rect x="40" y="352" width="60" height="40" fill="#1a3a6e" stroke="#1a3a6e"/>
  <text x="70" y="370" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">q_pass</text>
  <text x="70" y="382" text-anchor="middle" font-size="8" fill="#ffffff">[128]</text>

  <rect x="100" y="352" width="60" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="130" y="370" text-anchor="middle" font-size="9" fill="#000">q_rot</text>
  <text x="130" y="382" text-anchor="middle" font-size="8" fill="#888">[64]</text>

  <!-- scale annotation -->
  <text x="170" y="370" font-size="8" fill="#b8721a">x 2.31</text>
  <text x="170" y="382" font-size="8" fill="#888">(no scale)</text>

  <!-- =========== KV branch =========== -->
  <text x="340" y="148" font-size="11" font-weight="bold" fill="#1a3a6e">KEY-VALUE BRANCH</text>
  <line x1="160" y1="100" x2="320" y2="100" stroke="#000" stroke-width="1.2"/>
  <line x1="320" y1="100" x2="320" y2="160" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- kv_a_proj_with_mqa -->
  <rect x="260" y="162" width="160" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="340" y="178" text-anchor="middle" font-size="9" fill="#000">kv_a_proj_with_mqa</text>
  <text x="340" y="190" text-anchor="middle" font-size="8" fill="#888">8192 -&gt; 512+64</text>
  <line x1="340" y1="194" x2="340" y2="210" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- split kv_lora / k_rot -->
  <rect x="260" y="212" width="80" height="40" fill="#1a3a6e" stroke="#1a3a6e"/>
  <text x="300" y="230" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">kv_lora</text>
  <text x="300" y="242" text-anchor="middle" font-size="8" fill="#ffffff">[512]</text>

  <rect x="340" y="212" width="80" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="380" y="230" text-anchor="middle" font-size="9" fill="#000">k_rot</text>
  <text x="380" y="242" text-anchor="middle" font-size="8" fill="#888">[64]</text>

  <!-- KV CACHE marker -->
  <rect x="220" y="260" width="240" height="22" fill="none" stroke="#b8721a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="340" y="275" text-anchor="middle" font-size="9" font-weight="bold" fill="#b8721a">KV CACHE stores 576 dims (512+64)</text>

  <line x1="300" y1="252" x2="300" y2="260" stroke="#b8721a" stroke-width="1.2"/>
  <line x1="380" y1="252" x2="380" y2="260" stroke="#b8721a" stroke-width="1.2"/>

  <!-- kv_a_norm -->
  <line x1="300" y1="282" x2="300" y2="298" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>
  <rect x="240" y="300" width="120" height="28" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="300" y="318" text-anchor="middle" font-size="9" fill="#000">kv_a_norm (RMS)</text>
  <line x1="300" y1="328" x2="300" y2="346" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- kv_b_proj -->
  <rect x="240" y="348" width="120" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="300" y="364" text-anchor="middle" font-size="9" fill="#000">kv_b_proj</text>
  <text x="300" y="376" text-anchor="middle" font-size="8" fill="#888">512 -&gt; 64*(128+128)</text>
  <line x1="300" y1="380" x2="300" y2="398" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- split k_pass / v -->
  <rect x="220" y="400" width="80" height="40" fill="#1a3a6e" stroke="#1a3a6e"/>
  <text x="260" y="418" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">k_pass</text>
  <text x="260" y="430" text-anchor="middle" font-size="8" fill="#ffffff">[128]</text>

  <rect x="300" y="400" width="80" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="340" y="418" text-anchor="middle" font-size="9" fill="#000">v</text>
  <text x="340" y="430" text-anchor="middle" font-size="8" fill="#888">[128]</text>

  <!-- scale annotation -->
  <text x="190" y="418" font-size="8" fill="#b8721a">x 4.00</text>

  <!-- =========== RoPE =========== -->
  <text x="510" y="148" font-size="11" font-weight="bold" fill="#1a3a6e">RoPE (decoupled)</text>

  <rect x="490" y="352" width="100" height="40" fill="none" stroke="#b8721a" stroke-width="1.5"/>
  <text x="540" y="370" text-anchor="middle" font-size="9" fill="#000">RoPE</text>
  <text x="540" y="382" text-anchor="middle" font-size="8" fill="#888">theta=1e6</text>

  <!-- q_rot arrow into RoPE -->
  <line x1="160" y1="372" x2="160" y2="396" stroke="#000" stroke-width="1.2"/>
  <line x1="160" y1="396" x2="490" y2="396" stroke="#000" stroke-width="1.2"/>
  <line x1="490" y1="396" x2="490" y2="372" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>
  <!-- k_rot arrow into RoPE -->
  <line x1="420" y1="232" x2="540" y2="232" stroke="#000" stroke-width="1.2"/>
  <line x1="540" y1="232" x2="540" y2="352" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <line x1="540" y1="392" x2="540" y2="430" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>
  <rect x="490" y="432" width="100" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="540" y="450" text-anchor="middle" font-size="9" fill="#000">q_rot', k_rot'</text>
  <text x="540" y="461" text-anchor="middle" font-size="8" fill="#888">rotated [64]</text>

  <!-- =========== Concat =========== -->
  <text x="660" y="148" font-size="11" font-weight="bold" fill="#1a3a6e">Concat (per head)</text>

  <rect x="640" y="352" width="120" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="700" y="370" text-anchor="middle" font-size="9" fill="#000">cat(q_pass, q_rot')</text>
  <text x="700" y="382" text-anchor="middle" font-size="8" fill="#888">[128+64=192]</text>

  <rect x="640" y="432" width="120" height="40" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="700" y="450" text-anchor="middle" font-size="9" fill="#000">cat(k_pass, k_rot')</text>
  <text x="700" y="462" text-anchor="middle" font-size="8" fill="#888">[128+64=192]</text>

  <!-- arrows: q_pass + q_rot' -> cat -->
  <line x1="100" y1="392" x2="100" y2="500" stroke="#000" stroke-width="1.2"/>
  <line x1="100" y1="500" x2="630" y2="500" stroke="#000" stroke-width="1.2"/>
  <line x1="630" y1="500" x2="630" y2="372" stroke="#000" stroke-width="1.2"/>
  <line x1="630" y1="372" x2="640" y2="372" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <line x1="590" y1="448" x2="630" y2="448" stroke="#000" stroke-width="1.2"/>
  <line x1="630" y1="448" x2="630" y2="372" stroke="#000" stroke-width="1.2"/>

  <line x1="590" y1="448" x2="640" y2="448" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- k_pass -> cat k -->
  <line x1="300" y1="440" x2="300" y2="478" stroke="#000" stroke-width="1.2"/>
  <line x1="300" y1="478" x2="640" y2="478" stroke="#000" stroke-width="1.2"/>
  <line x1="640" y1="478" x2="640" y2="452" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- =========== Attention =========== -->
  <rect x="820" y="280" width="220" height="180" fill="#1a3a6e" stroke="#1a3a6e" stroke-width="2"/>
  <text x="930" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Scaled Dot-Product</text>
  <text x="930" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Attention</text>
  <text x="930" y="345" text-anchor="middle" font-size="10" fill="#ffffff">heads = 64</text>
  <text x="930" y="360" text-anchor="middle" font-size="9" fill="#ffffff">q,k,v per-head: 192,192,128</text>
  <text x="930" y="378" text-anchor="middle" font-size="9" fill="#ffffff">+ LSA top-k mask</text>
  <text x="930" y="392" text-anchor="middle" font-size="9" fill="#ffffff">(see fig-4.2)</text>
  <text x="930" y="418" text-anchor="middle" font-size="9" fill="#ffffff">softmax(QK^T / sqrt(d))</text>
  <text x="930" y="432" text-anchor="middle" font-size="9" fill="#ffffff">x V -&gt; o [64*128]</text>

  <!-- arrows into attention -->
  <line x1="760" y1="372" x2="820" y2="350" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>
  <line x1="760" y1="452" x2="820" y2="395" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>
  <line x1="340" y1="440" x2="340" y2="478" stroke="#000" stroke-width="1.2"/>
  <line x1="340" y1="478" x2="800" y2="478" stroke="#000" stroke-width="1.2"/>
  <line x1="800" y1="478" x2="800" y2="410" stroke="#000" stroke-width="1.2"/>
  <line x1="800" y1="410" x2="820" y2="410" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- o_proj -->
  <line x1="930" y1="460" x2="930" y2="490" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>
  <rect x="860" y="492" width="140" height="32" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="930" y="508" text-anchor="middle" font-size="9" fill="#000">o_proj</text>
  <text x="930" y="520" text-anchor="middle" font-size="8" fill="#888">64*128 -&gt; 8192</text>

  <line x1="930" y1="524" x2="930" y2="548" stroke="#000" stroke-width="1.2" marker-end="url(#arrM)"/>

  <!-- output -->
  <rect x="860" y="550" width="140" height="32" fill="none" stroke="#1a3a6e" stroke-width="2"/>
  <text x="930" y="567" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">attn output</text>
  <text x="930" y="578" text-anchor="middle" font-size="8" fill="#888">[B,S,8192]</text>

  <!-- bottom: notes -->
  <rect x="40" y="556" width="660" height="76" fill="none" stroke="#1a3a6e" stroke-width="1"/>
  <text x="50" y="572" font-size="10" font-weight="bold" fill="#1a3a6e">KV Cache Compaction</text>
  <text x="50" y="588" font-size="9" fill="#000">- Per token per layer: store kv_lora (512) + k_rot (64) = 576 dims.</text>
  <text x="50" y="602" font-size="9" fill="#000">- vs naive Multi-Head: 2 * 64 * 128 = 16,384 dims.   ~28x reduction.</text>
  <text x="50" y="616" font-size="9" fill="#000">- q_pass / k_pass / v reconstructed at runtime from latent via LoRA scaling.</text>
  <text x="50" y="628" font-size="9" fill="#b8721a">- mla_scale_{q,kv}_lora = sqrt(hidden/lora_rank); applied before attention.</text>

  <defs>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
