  <text class="label" x="440" y="622" text-anchor="middle" font-weight="bold">y = shared(x) + route_scale &#183; &#931;<tspan baseline-shift="sub" font-size="smaller">i&#8712;top6</tspan> softmax(g)[i] &#183; expert<tspan baseline-shift="sub" font-size="smaller">i</tspan>(x)</text>
  <text class="annot" x="440" y="635" text-anchor="middle">route_scale = 1.5 (V4 独有)；g = sqrtsoftplus(W<tspan baseline-shift="sub" font-size="smaller">g</tspan> &#183; x) [不带 bias 的原始分]</text>

