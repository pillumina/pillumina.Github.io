<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 680" width="880" height="680" font-family="Courier New, monospace" font-size="11">
  <style>
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .box-hl { fill: #fff; stroke: #1a3a6e; stroke-width: 2.2; }
    .box-shared { fill: #f4f4f4; stroke: #1a3a6e; stroke-width: 2; }
    .expert-idle { fill: #fff; stroke: #bbb; stroke-width: 0.6; }
    .expert-active { fill: #1a3a6e; stroke: #000; stroke-width: 1.5; }
    .label { fill: #000; }
    .label-hl { fill: #1a3a6e; font-weight: bold; }
    .label-active { fill: #fff; font-weight: bold; font-size: 7px; }
    .annot { fill: #444; font-size: 9px; }
    .annot-hl { fill: #1a3a6e; font-size: 9px; font-weight: bold; }
    .arrow { stroke: #000; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    .arrow-hl { stroke: #1a3a6e; stroke-width: 2; fill: none; marker-end: url(#a-hl); }
    .arrow-shared { stroke: #1a3a6e; stroke-width: 1.5; fill: none; stroke-dasharray: 3 2; marker-end: url(#a-hl); }
    .arrow-active { stroke: #1a3a6e; stroke-width: 1.8; fill: none; marker-end: url(#a-hl); }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <polygon points="0 0,10 5,0 10" fill="#000"/>
    </marker>
    <marker id="a-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <polygon points="0 0,10 5,0 10" fill="#1a3a6e"/>
    </marker>
  </defs>

  <!-- ============ 标题 + 超参 ============ -->
  <text x="440" y="22" text-anchor="middle" font-weight="bold" font-size="14">V4-Flash MoE 拓扑：1 shared + 256 routed, top-6 selected</text>
  <text class="annot" x="860" y="22" text-anchor="end">E=256  k=6  shared=1  num_hash_layers=3  route_scale=1.5</text>

  <!-- ============ Input token x ============ -->
  <rect class="box" x="370" y="50" width="140" height="30"/>
  <text class="label" x="440" y="69" text-anchor="middle">token x &#8712; &#8477;<tspan baseline-shift="super" font-size="smaller">4096</tspan></text>
  <line class="arrow" x1="440" y1="80" x2="440" y2="108"/>

  <!-- ============ Gating 框 ============ -->
  <rect class="box-hl" x="120" y="108" width="640" height="172" rx="3"/>
  <text class="label-hl" x="440" y="128" text-anchor="middle" font-weight="bold">Gating (Gate.forward) — W<tspan baseline-shift="sub" font-size="smaller">g</tspan> &#183; x  &#10230;  sqrtsoftplus  &#10230;  +bias  &#10230;  top-6</text>

  <!-- Gating 子步骤（左侧 3 个） -->
  <rect class="box" x="160" y="145" width="280" height="28"/>
  <text class="label" x="300" y="163" text-anchor="middle">W<tspan baseline-shift="sub" font-size="smaller">g</tspan> &#183; x  &#10230;  [256 scores]</text>

  <rect class="box" x="160" y="180" width="280" height="28"/>
  <text class="label" x="300" y="198" text-anchor="middle">sqrtsoftplus( &#183; )   <tspan class="annot">[ &#8800; sigmoid! ]</tspan></text>

  <rect class="box" x="160" y="215" width="280" height="28"/>
  <text class="label" x="300" y="233" text-anchor="middle">+ aux-loss-free bias b<tspan baseline-shift="sub" font-size="smaller">e</tspan>  <tspan class="annot">[topk only]</tspan></text>

  <!-- Gating 内：top-6 select 框（右侧） -->
  <rect class="box-hl" x="470" y="170" width="250" height="65"/>
  <text class="label-hl" x="595" y="192" text-anchor="middle" font-weight="bold">top-6 select</text>
  <text class="annot" x="595" y="210" text-anchor="middle">indices [6]  (前 3 层：hash routing)</text>
  <text class="annot" x="595" y="225" text-anchor="middle">&#8593; 决定哪 6 个 expert 被激活</text>

  <!-- Gating 输出箭头 -->
  <line class="arrow-hl" x1="440" y1="280" x2="440" y2="300"/>

  <!-- ============ 路由专家区 子标题 ============ -->
  <text class="label-hl" x="220" y="320" text-anchor="middle" font-weight="bold">256 routed experts (FP4, block=32) — 12&#215;12 = 144 visible</text>
  <text class="annot" x="220" y="335" text-anchor="middle">top-6 selected highlighted in dark blue (#1a3a6e); 250 omitted</text>

