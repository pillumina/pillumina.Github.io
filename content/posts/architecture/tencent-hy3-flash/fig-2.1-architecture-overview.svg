<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 780" width="1080" height="780">
  <defs>
    <style>
      .fig21-line { fill: none; stroke: #1a3a6e; stroke-width: 1.5; }
      .fig21-line-thin { fill: none; stroke: #1a3a6e; stroke-width: 1; }
      .fig21-line-dash { fill: none; stroke: #888; stroke-width: 1; stroke-dasharray: 6,4; }
      .fig21-text-title { font-family: "Courier New", monospace; font-size: 15px; font-weight: bold; fill: #1a3a6e; }
      .fig21-text-h1 { font-family: "Courier New", monospace; font-size: 18px; font-weight: bold; fill: #1a3a6e; }
      .fig21-text-h2 { font-family: "Courier New", monospace; font-size: 13px; font-weight: bold; fill: #1a3a6e; }
      .fig21-text-norm { font-family: "Courier New", monospace; font-size: 11px; fill: #000; }
      .fig21-text-small { font-family: "Courier New", monospace; font-size: 9px; fill: #000; }
      .fig21-text-tiny { font-family: "Courier New", monospace; font-size: 8px; fill: #000; }
      .fig21-text-label { font-family: "Courier New", monospace; font-size: 10px; fill: #1a3a6e; font-weight: bold; }
      .fig21-text-accent { font-family: "Courier New", monospace; font-size: 10px; fill: #b8721a; font-weight: bold; }
      .fig21-text-variant { font-family: "Courier New", monospace; font-size: 10px; fill: #4a7ab0; }
      .fig21-text-secondary { font-family: "Courier New", monospace; font-size: 10px; fill: #888; }
      .fig21-text-legend-title { font-family: "Courier New", monospace; font-size: 10px; font-weight: bold; fill: #1a3a6e; }
      .fig21-text-legend { font-family: "Courier New", monospace; font-size: 9px; fill: #000; }
      .fig21-box-outline { fill: none; stroke: #1a3a6e; stroke-width: 1.5; }
      .fig21-box-fill { fill: #f4f7fc; stroke: #1a3a6e; stroke-width: 1.2; }
      .fig21-box-accent { fill: #fdf6ed; stroke: #b8721a; stroke-width: 1.5; }
      .fig21-box-dense { fill: #e8eef6; stroke: #1a3a6e; stroke-width: 1.2; }
      .fig21-box-moe { fill: #fdf6ed; stroke: #b8721a; stroke-width: 1.2; }
      .fig21-box-shared { fill: #eaf0f8; stroke: #4a7ab0; stroke-width: 1.2; }
      .fig21-marker-diamond { fill: #1a3a6e; }
      .fig21-marker-arrow { fill: #1a3a6e; }
    </style>
  </defs>

  <!-- Title -->
  <text x="30" y="28" class="fig21-text-h1">Fig 2.1 -- Hy3-295B Architecture Overview</text>
  <text x="30" y="48" class="fig21-text-secondary">Tencent Hy Team  |  MoE 295B (21B active + 3.8B MTP)  |  80 layers  |  256K ctx</text>

  <!-- === EMBEDDING === -->
  <rect x="370" y="65" width="200" height="36" rx="4" class="fig21-box-outline"/>
  <text x="470" y="88" text-anchor="middle" class="fig21-text-norm">Token Embedding</text>
  <text x="470" y="76" text-anchor="middle" class="fig21-text-tiny">vocab=120832  d=4096</text>

  <!-- Arrow: Embedding to Decoder Stack -->
  <line x1="470" y1="101" x2="470" y2="125" class="fig21-line"/>
  <polygon points="466,122 470,130 474,122" class="fig21-marker-arrow"/>

  <!-- === DECODER STACK === -->
  <rect x="60" y="130" width="820" height="420" rx="6" class="fig21-box-fill"/>
  <text x="80" y="152" class="fig21-text-h2">Decoder Stack</text>
  <text x="200" y="152" class="fig21-text-small">L1=dense  |  L2-L80=MoE (79 layers)</text>

  <!-- Layer 1 (Dense) -->
  <rect x="80" y="165" width="780" height="42" rx="3" class="fig21-box-dense"/>
  <text x="95" y="183" class="fig21-text-label">L1</text>
  <text x="125" y="183" class="fig21-text-label">[Dense]</text>
  <!-- L1 internal: RMSNorm -> GQA -> RMSNorm -> Dense FFN -->
  <rect x="195" y="171" width="55" height="18" rx="2" fill="none" stroke="#1a3a6e" stroke-width="0.8"/>
  <text x="222" y="184" text-anchor="middle" class="fig21-text-tiny">RMSNorm</text>
  <line x1="250" y1="180" x2="265" y2="180" class="fig21-line-thin"/>
  <polygon points="262,177 268,180 262,183" fill="#1a3a6e"/>
  <rect x="270" y="171" width="70" height="18" rx="2" fill="none" stroke="#1a3a6e" stroke-width="0.8"/>
  <text x="305" y="184" text-anchor="middle" class="fig21-text-tiny">GQA 64H/8KV</text>
  <line x1="340" y1="180" x2="355" y2="180" class="fig21-line-thin"/>
  <polygon points="352,177 358,180 352,183" fill="#1a3a6e"/>
  <rect x="360" y="171" width="55" height="18" rx="2" fill="none" stroke="#1a3a6e" stroke-width="0.8"/>
  <text x="387" y="184" text-anchor="middle" class="fig21-text-tiny">RMSNorm</text>
  <line x1="415" y1="180" x2="430" y2="180" class="fig21-line-thin"/>
  <polygon points="427,177 433,180 427,183" fill="#1a3a6e"/>
  <rect x="435" y="171" width="70" height="18" rx="2" fill="none" stroke="#1a3a6e" stroke-width="0.8"/>
  <text x="470" y="184" text-anchor="middle" class="fig21-text-tiny">FFN Dense</text>
  <text x="720" y="184" text-anchor="end" class="fig21-text-tiny">QK-Norm  head_dim=128</text>
  <text x="840" y="184" text-anchor="end" class="fig21-text-tiny">w/ RoPE</text>

  <!-- Ellipsis -->
  <text x="470" y="222" text-anchor="middle" class="fig21-text-norm">...</text>

  <!-- Layer 2 (MoE) representative -->
  <rect x="80" y="235" width="780" height="42" rx="3" class="fig21-box-moe"/>
  <text x="95" y="253" class="fig21-text-accent">L2</text>
  <text x="125" y="253" class="fig21-text-accent">[MoE]</text>
  <!-- L2 internal: RMSNorm -> GQA -> RMSNorm -> MoE FFN -->
  <rect x="195" y="241" width="55" height="18" rx="2" fill="none" stroke="#b8721a" stroke-width="0.8"/>
  <text x="222" y="254" text-anchor="middle" class="fig21-text-tiny">RMSNorm</text>
  <line x1="250" y1="250" x2="265" y2="250" stroke="#b8721a" stroke-width="1"/>
  <polygon points="262,247 268,250 262,253" fill="#b8721a"/>
  <rect x="270" y="241" width="70" height="18" rx="2" fill="none" stroke="#b8721a" stroke-width="0.8"/>
  <text x="305" y="254" text-anchor="middle" class="fig21-text-tiny">GQA 64H/8KV</text>
  <line x1="340" y1="250" x2="355" y2="250" stroke="#b8721a" stroke-width="1"/>
  <polygon points="352,247 358,250 352,253" fill="#b8721a"/>
  <rect x="360" y="241" width="55" height="18" rx="2" fill="none" stroke="#b8721a" stroke-width="0.8"/>
  <text x="387" y="254" text-anchor="middle" class="fig21-text-tiny">RMSNorm</text>
  <line x1="415" y1="250" x2="430" y2="250" stroke="#b8721a" stroke-width="1"/>
  <polygon points="427,247 433,250 427,253" fill="#b8721a"/>

  <!-- MoE FFN expanded view -->
  <rect x="435" y="235" width="190" height="30" rx="2" fill="none" stroke="#b8721a" stroke-width="1.2"/>
  <text x="530" y="246" text-anchor="middle" class="fig21-text-tiny">MoE FFN (192E, top-8)</text>
  <!-- Sigmoid router inside -->
  <rect x="445" y="250" width="75" height="12" rx="1" fill="none" stroke="#b8721a" stroke-width="0.6"/>
  <text x="482" y="259" text-anchor="middle" class="fig21-text-tiny">Sigmoid Router</text>
  <!-- shared expert -->
  <rect x="530" y="250" width="55" height="12" rx="1" fill="none" stroke="#4a7ab0" stroke-width="0.6"/>
  <text x="557" y="259" text-anchor="middle" class="fig21-text-tiny">1x SharedE</text>

  <text x="720" y="254" text-anchor="end" class="fig21-text-tiny">QK-Norm  head_dim=128</text>
  <text x="840" y="254" text-anchor="end" class="fig21-text-tiny">w/ RoPE</text>

  <!-- Ellipsis -->
  <text x="470" y="292" text-anchor="middle" class="fig21-text-norm">...</text>

  <!-- Layer 80 (MoE) -->
  <rect x="80" y="305" width="780" height="35" rx="3" class="fig21-box-moe"/>
  <text x="95" y="325" class="fig21-text-accent">L80</text>
  <text x="135" y="325" class="fig21-text-accent">[MoE]</text>
  <rect x="195" y="313" width="55" height="15" rx="2" fill="none" stroke="#b8721a" stroke-width="0.7"/>
  <text x="222" y="324" text-anchor="middle" class="fig21-text-tiny">RMSNorm</text>
  <line x1="250" y1="321" x2="260" y2="321" stroke="#b8721a" stroke-width="0.8"/>
  <polygon points="258,319 262,321 258,323" fill="#b8721a"/>
  <rect x="264" y="313" width="60" height="15" rx="2" fill="none" stroke="#b8721a" stroke-width="0.7"/>
  <text x="294" y="324" text-anchor="middle" class="fig21-text-tiny">GQA</text>
  <line x1="324" y1="321" x2="334" y2="321" stroke="#b8721a" stroke-width="0.8"/>
  <polygon points="332,319 336,321 332,323" fill="#b8721a"/>
  <rect x="338" y="313" width="55" height="15" rx="2" fill="none" stroke="#b8721a" stroke-width="0.7"/>
  <text x="365" y="324" text-anchor="middle" class="fig21-text-tiny">RMSNorm</text>
  <line x1="393" y1="321" x2="403" y2="321" stroke="#b8721a" stroke-width="0.8"/>
  <polygon points="401,319 405,321 401,323" fill="#b8721a"/>
  <rect x="407" y="313" width="130" height="15" rx="2" fill="none" stroke="#b8721a" stroke-width="0.7"/>
  <text x="472" y="324" text-anchor="middle" class="fig21-text-tiny">MoE FFN (192E, top-8)</text>
  <text x="840" y="324" text-anchor="end" class="fig21-text-tiny">QK-Norm  w/ RoPE</text>

  <!-- Skip connections arrows -->
  <line x1="100" y1="207" x2="100" y2="235" stroke="#4a7ab0" stroke-width="0.8"/>
  <text x="108" y="224" class="fig21-text-tiny" fill="#4a7ab0">+</text>
  <line x1="860" y1="207" x2="860" y2="235" stroke="#4a7ab0" stroke-width="0.8"/>
  <line x1="100" y1="277" x2="100" y2="305" stroke="#4a7ab0" stroke-width="0.8"/>
  <text x="108" y="294" class="fig21-text-tiny" fill="#4a7ab0">+</text>
  <line x1="860" y1="277" x2="860" y2="305" stroke="#4a7ab0" stroke-width="0.8"/>

  <!-- Bottom of decoder stack arrows -->
  <line x1="340" y1="340" x2="340" y2="350" stroke="#4a7ab0" stroke-width="0.8"/>
  <text x="315" y="348" class="fig21-text-tiny" fill="#4a7ab0">+residual</text>

  <!-- MTP Layers -->
  <rect x="350" y="355" width="240" height="26" rx="3" stroke="#1a3a6e" stroke-width="1" stroke-dasharray="4,3" fill="#e8eef6"/>
  <text x="470" y="373" text-anchor="middle" class="fig21-text-norm">MTP Layer (1 layer)</text>

  <!-- Annotation lines for skip connections -->
  <text x="60" y="190" class="fig21-text-tiny" fill="#4a7ab0">res</text>
  <text x="860" y="190" class="fig21-text-tiny" fill="#4a7ab0">+res</text>

  <!-- End of decoder stack -->
  <text x="200" y="545" class="fig21-text-small" font-style="italic">Residual from last layer L80</text>

  <!-- Arrow out of stack -->
  <line x1="470" y1="550" x2="470" y2="580" class="fig21-line"/>
  <polygon points="466,577 470,585 474,577" class="fig21-marker-arrow"/>

  <!-- RMS Norm before LM Head -->
  <rect x="370" y="585" width="200" height="30" rx="3" class="fig21-box-outline"/>
  <text x="470" y="605" text-anchor="middle" class="fig21-text-norm">RMS Norm (final)</text>

  <!-- Arrow to LM Head -->
  <line x1="470" y1="615" x2="470" y2="640" class="fig21-line"/>
  <polygon points="466,637 470,645 474,637" class="fig21-marker-arrow"/>

  <!-- LM Head -->
  <rect x="370" y="645" width="200" height="36" rx="4" class="fig21-box-outline"/>
  <text x="470" y="660" text-anchor="middle" class="fig21-text-norm">LM Head (Linear)</text>
  <text x="470" y="674" text-anchor="middle" class="fig21-text-tiny">d=4096 -> vocab=120832</text>

  <!-- Loss arrow -->
  <line x1="470" y1="681" x2="470" y2="705" class="fig21-line"/>
  <text x="478" y="700" class="fig21-text-small">CE Loss</text>

  <!-- Key params callout on the right -->
  <text x="920" y="90" class="fig21-text-h2">Key Hyperparams</text>
  <line x1="920" y1="96" x2="1060" y2="96" stroke="#888" stroke-width="0.5"/>

  <text x="920" y="118" class="fig21-text-norm">layers (L)</text>
  <text x="1045" y="118" text-anchor="end" class="fig21-text-norm">80</text>

  <text x="920" y="138" class="fig21-text-norm">hidden_size (d)</text>
  <text x="1045" y="138" text-anchor="end" class="fig21-text-norm">4096</text>

  <text x="920" y="158" class="fig21-text-norm">attention heads (Hq)</text>
  <text x="1045" y="158" text-anchor="end" class="fig21-text-norm">64</text>

  <text x="920" y="178" class="fig21-text-norm">KV heads (Hkv)</text>
  <text x="1045" y="178" text-anchor="end" class="fig21-text-norm">8</text>

  <text x="920" y="198" class="fig21-text-norm">head_dim (D)</text>
  <text x="1045" y="198" text-anchor="end" class="fig21-text-norm">128</text>

  <text x="920" y="218" class="fig21-text-norm">num_experts</text>
  <text x="1045" y="218" text-anchor="end" class="fig21-text-norm">192</text>

  <text x="920" y="238" class="fig21-text-norm">top-k experts</text>
  <text x="1045" y="238" text-anchor="end" class="fig21-text-norm">8</text>

  <text x="920" y="258" class="fig21-text-norm">shared experts</text>
  <text x="1045" y="258" text-anchor="end" class="fig21-text-norm">1</text>

  <text x="920" y="278" class="fig21-text-norm">max ctx length</text>
  <text x="1045" y="278" text-anchor="end" class="fig21-text-norm">256K</text>

  <text x="920" y="298" class="fig21-text-norm">vocab_size</text>
  <text x="1045" y="298" text-anchor="end" class="fig21-text-norm">120,832</text>

  <text x="920" y="318" class="fig21-text-norm">qk_norm</text>
  <text x="1045" y="318" text-anchor="end" class="fig21-text-norm">True</text>

  <text x="920" y="338" class="fig21-text-norm">route_norm</text>
  <text x="1045" y="338" text-anchor="end" class="fig21-text-norm">True</text>

  <text x="920" y="358" class="fig21-text-norm">router type</text>
  <text x="1045" y="358" text-anchor="end" class="fig21-text-accent">Sigmoid</text>

  <text x="920" y="378" class="fig21-text-norm">router scale factor</text>
  <text x="1045" y="378" text-anchor="end" class="fig21-text-norm">2.826</text>

  <text x="920" y="398" class="fig21-text-norm">activation</text>
  <text x="1045" y="398" text-anchor="end" class="fig21-text-norm">SiLU</text>

  <text x="920" y="418" class="fig21-text-norm">MTP layers</text>
  <text x="1045" y="418" text-anchor="end" class="fig21-text-norm">1</text>

  <text x="920" y="438" class="fig21-text-norm">total params</text>
  <text x="1045" y="438" text-anchor="end" class="fig21-text-norm" font-weight="bold">295B</text>

  <text x="920" y="458" class="fig21-text-norm">active params</text>
  <text x="1045" y="458" text-anchor="end" class="fig21-text-norm">21B</text>

  <text x="920" y="478" class="fig21-text-norm">tie embeddings</text>
  <text x="1045" y="478" text-anchor="end" class="fig21-text-norm">False</text>

  <text x="920" y="498" class="fig21-text-norm">rope_theta</text>
  <text x="1045" y="498" text-anchor="end" class="fig21-text-norm">11,158,840</text>

  <!-- Legend -->
  <rect x="60" y="710" width="500" height="65" rx="4" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="75" y="728" class="fig21-text-legend-title">Legend</text>
  <rect x="75" y="737" width="20" height="12" rx="2" class="fig21-box-dense"/>
  <text x="100" y="747" class="fig21-text-legend">Dense FFN</text>
  <rect x="185" y="737" width="20" height="12" rx="2" class="fig21-box-moe"/>
  <text x="210" y="747" class="fig21-text-legend">MoE FFN (Sigmoid Router)</text>
  <rect x="370" y="737" width="20" height="12" rx="2" stroke="#1a3a6e" stroke-width="1.2" fill="#f4f7fc"/>
  <text x="395" y="747" class="fig21-text-legend">Norm / Standard</text>
  <rect x="75" y="754" width="20" height="12" rx="2" stroke="#888" stroke-width="0.8" stroke-dasharray="4,3" fill="#e8eef6"/>
  <text x="100" y="764" class="fig21-text-legend">MTP (speculative decoding)</text>
</svg>