<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#64748b"/>
    </marker>
    <marker id="ao" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#ffffff" rx="8"/>

  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">MoE 路由机制 — 256 Experts, Top-8 + Shared Expert</text>
  <text x="450" y="48" text-anchor="middle" font-size="12" fill="#64748b">Fig 5.1: Mixture of Experts Routing — per-token dispatch to top-8 + parallel shared expert</text>

  <!-- Input token -->
  <rect x="350" y="70" width="200" height="35" rx="5" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="450" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">Hidden State: (B*L, 2048)</text>

  <line x1="450" y1="105" x2="450" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Router Gate -->
  <rect x="300" y="130" width="300" height="45" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Top-K Router Gate</text>
  <text x="450" y="164" text-anchor="middle" font-size="9" fill="#b45309">W_gate (256 x 2048) -> softmax -> top-8 -> normalize weights</text>

  <!-- Branch: Shared Expert vs Routed Experts -->
  <line x1="330" y1="175" x2="230" y2="210" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="570" y1="175" x2="670" y2="210" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Shared Expert (left) -->
  <rect x="80" y="210" width="300" height="90" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="230" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Shared Expert (ALL tokens)</text>
  <text x="230" y="248" text-anchor="middle" font-size="9" fill="#22c55e">SwiGLU MLP: W_gate x 512, W_up x 512, W_down x 2048</text>
  <text x="230" y="266" text-anchor="middle" font-size="9" fill="#22c55e">Output gated by: sigmoid(W_gate(x)) * shared_output</text>
  <text x="230" y="286" text-anchor="middle" font-size="9" fill="#22c55e" font-style="italic">Runs unconditionally on every token</text>

  <!-- Routed Experts (right) -->
  <rect x="490" y="210" width="350" height="90" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="665" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Routed Experts (Top-8 per token)</text>
  <text x="665" y="250" text-anchor="middle" font-size="9" fill="#3b82f6">256 experts, each: SwiGLU(512, SwiGLU, 2048)</text>
  <text x="665" y="268" text-anchor="middle" font-size="9" fill="#3b82f6">gate_up_proj (256 x 1024 x 2048) + down_proj (256 x 2048 x 512)</text>
  <text x="665" y="286" text-anchor="middle" font-size="9" fill="#3b82f6" font-style="italic">Token i dispatched to experts E_j1 ... E_j8</text>

  <!-- Expert dispatch illustration -->
  <rect x="490" y="310" width="350" height="120" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="665" y="328" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Expert Dispatch (per-layer)</text>

  <g transform="translate(510, 340)">
    <!-- Token 1 -->
    <rect x="0" y="0" width="30" height="14" rx="2" fill="#3b82f6"/>
    <text x="15" y="10" text-anchor="middle" font-size="7" fill="#fff">T1</text>
    <line x1="33" y1="7" x2="55" y2="7" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="60" y="10" font-size="7" fill="#64748b">E12, E45, E128, E3, E200, E67, E188, E250</text>

    <!-- Token 2 -->
    <rect x="0" y="20" width="30" height="14" rx="2" fill="#16a34a"/>
    <text x="15" y="30" text-anchor="middle" font-size="7" fill="#fff">T2</text>
    <line x1="33" y1="27" x2="55" y2="27" stroke="#16a34a" stroke-width="0.8"/>
    <text x="60" y="30" font-size="7" fill="#64748b">E88, E12, E156, E200, E7, E33, E199, E42</text>

    <!-- Token 3 -->
    <rect x="0" y="40" width="30" height="14" rx="2" fill="#a855f7"/>
    <text x="15" y="50" text-anchor="middle" font-size="7" fill="#fff">T3</text>
    <line x1="33" y1="47" x2="55" y2="47" stroke="#a855f7" stroke-width="0.8"/>
    <text x="60" y="50" font-size="7" fill="#64748b">E1, E255, E67, E128, E200, E45, E99, E178</text>

    <text x="250" y="10" font-size="7" fill="#94a3b8" font-style="italic">Shared: E156*</text>
    <text x="250" y="30" font-size="7" fill="#94a3b8" font-style="italic">E12* loaded</text>
    <text x="250" y="50" font-size="7" fill="#94a3b8" font-style="italic">from same</text>
  </g>

  <line x1="230" y1="300" x2="230" y2="340" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="665" y1="430" x2="665" y2="460" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Expert computation detail -->
  <rect x="490" y="460" width="350" height="60" rx="5" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.2"/>
  <text x="665" y="477" text-anchor="middle" font-size="10" font-weight="600" fill="#0369a1">Per Expert Computation (SwiGLU)</text>
  <text x="665" y="495" text-anchor="middle" font-size="9" fill="#0ea5e9" font-family="monospace">y = W_down @ (SiLU(W_gate @ x) * W_up @ x)</text>
  <text x="665" y="512" text-anchor="middle" font-size="9" fill="#0ea5e9">Weighted by routing probability: final += routing_weight * y</text>

  <!-- Combine -->
  <line x1="230" y1="340" x2="230" y2="400" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="80" y="400" width="300" height="30" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <line x1="665" y1="520" x2="665" y2="450" stroke="#64748b" stroke-width="1.2"/>

  <!-- Combine box -->
  <rect x="300" y="530" width="300" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="548" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Combine: Routed * weights + Shared * gate</text>
  <text x="450" y="564" text-anchor="middle" font-size="9" fill="#b45309">output = sum(weight_i * expert_i(x)) + sigmoid(W_shared_gate(x)) * shared(x)</text>

  <!-- Left: Aux Loss -->
  <rect x="80" y="530" width="180" height="40" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="170" y="548" text-anchor="middle" font-size="10" font-weight="600" fill="#9d174d">Load Balancing Aux Loss</text>
  <text x="170" y="564" text-anchor="middle" font-size="9" fill="#be185d">coef=0.001, Switch Transformer</text>

  <!-- Key numbers box -->
  <rect x="320" y="440" width="120" height="80" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="458" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Expert Params</text>
  <text x="380" y="476" text-anchor="middle" font-size="9" fill="#64748b" font-family="monospace">per expert:</text>
  <text x="380" y="490" text-anchor="middle" font-size="9" fill="#64748b" font-family="monospace">2*512*2048</text>
  <text x="380" y="504" text-anchor="middle" font-size="9" fill="#64748b" font-family="monospace">+ 2048*512</text>
  <text x="380" y="516" text-anchor="middle" font-size="9" fill="#64748b" font-family="monospace">= 3.15M</text>

  <rect x="320" y="575" width="120" height="35" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="593" text-anchor="middle" font-size="9" fill="#64748b">256 x 3.15M = 806M</text>
  <text x="380" y="605" text-anchor="middle" font-size="9" fill="#64748b">per layer</text>
</svg>
