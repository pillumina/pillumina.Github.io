  <g transform="translate(615, 108)">
    <!-- Pie chart approximation with bars -->
    <text x="0" y="0" font-size="11" font-weight="600" fill="#1e293b">Token Mixer Type</text>
    <rect x="0" y="12" width="18" height="18" rx="3" fill="#3b82f6"/>
    <text x="25" y="26" font-size="11" fill="#1e40af">GDN: 30 layers (75%)</text>
    <rect x="0" y="36" width="18" height="18" rx="3" fill="#22c55e"/>
    <text x="25" y="50" font-size="11" fill="#166534">Full Attn: 10 layers (25%)</text>
    <rect x="0" y="60" width="18" height="18" rx="3" fill="#94a3b8"/>
    <text x="25" y="74" font-size="11" fill="#64748b">MLP-only: 0 layers (0%)</text>

    <text x="0" y="110" font-size="11" font-weight="600" fill="#1e293b">MoE at Every Layer</text>
    <rect x="0" y="122" width="18" height="18" rx="3" fill="#f59e0b"/>
    <text x="25" y="136" font-size="11" fill="#92400e">Same MoE block (256E, top-8)</text>
    <text x="25" y="152" font-size="9" fill="#b45309">+ Shared expert at every layer</text>

    <text x="0" y="185" font-size="11" font-weight="600" fill="#1e293b">Full Attention Indices</text>
    <text x="0" y="204" font-size="10" fill="#475569" font-family="monospace">L3, L7, L11, L15, L19,</text>
    <text x="0" y="220" font-size="10" fill="#475569" font-family="monospace">L23, L27, L31, L35, L39</text>
    <text x="0" y="242" font-size="9" fill="#94a3b8" font-style="italic">Every 4th layer (index % 4 == 3)</text>

    <text x="0" y="272" font-size="11" font-weight="600" fill="#1e293b">Full Attention Layers (GQA)</text>
    <text x="0" y="290" font-size="9" fill="#64748b">16 Q-heads, 2 KV-heads (8:1)</text>
    <text x="0" y="306" font-size="9" fill="#64748b">head_dim=256, QK RMSNorm</text>
    <text x="0" y="322" font-size="9" fill="#64748b">Partial RoPE (25% rotary)</text>

    <text x="0" y="350" font-size="11" font-weight="600" fill="#1e293b">GDN Layers (Linear Attn)</text>
    <text x="0" y="368" font-size="9" fill="#64748b">16 Key heads, 32 Value heads</text>
    <text x="0" y="384" font-size="9" fill="#64748b">head_k=128, head_v=128</text>
    <text x="0" y="400" font-size="9" fill="#64748b">Causal Conv1D kernel=4</text>
    <text x="0" y="416" font-size="9" fill="#64748b">QK L2norm + Gated output</text>
    <text x="0" y="432" font-size="9" fill="#64748b">Recurrent state: (32,128,128)</text>

    <text x="0" y="458" font-size="9" fill="#94a3b8" font-style="italic">Config: full_attention_interval=4</text>
