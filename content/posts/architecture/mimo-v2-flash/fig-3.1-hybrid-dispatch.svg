<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="Courier New, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a3a6e"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">混合注意力层分发机制 — hybrid_layer_pattern 驱动</text>

  <!-- Decision diamond -->
  <text x="450" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">MiMoV2DecoderLayer.__init__(config, layer_idx)</text>

  <!-- Code box -->
  <rect x="150" y="75" width="600" height="75" rx="2" fill="#f8f8f8" stroke="#000" stroke-width="1"/>
  <text x="170" y="95" font-size="10" fill="#1a3a6e" font-weight="bold">is_swa_layer = config.hybrid_layer_pattern[layer_idx] == 1</text>
  <text x="170" y="113" font-size="10" fill="#000">self.self_attn = MiMoV2Attention(config, is_swa_layer, layer_idx)</text>
  <text x="170" y="131" font-size="10" fill="#000">self.mlp = MiMoV2MoE(config) if moe_layer_freq[layer_idx] else MiMoV2MLP(config)</text>

  <!-- Branch: is_swa_layer -->
  <text x="280" y="170" text-anchor="middle" font-size="9" fill="#888">is_swa_layer?</text>

  <!-- SWA branch -->
  <line x1="280" y1="178" x2="160" y2="210" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="195" text-anchor="middle" font-size="9" fill="#888">True (1)</text>

  <rect x="30" y="215" width="260" height="110" rx="2" fill="#f0f4ff" stroke="#000" stroke-width="1.5"/>
  <text x="160" y="238" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">SWA 层 (39/48 = 81%)</text>
  <line x1="45" y1="248" x2="275" y2="248" stroke="#888" stroke-width="0.5"/>
  <text x="45" y="265" font-size="9" fill="#000">Q heads: 64 (swa_num_attention_heads)</text>
  <text x="45" y="280" font-size="9" fill="#000">KV heads: 8 (swa_num_key_value_heads)</text>
  <text x="45" y="295" font-size="9" fill="#000">Window: 128 (sliding_window_size)</text>
  <text x="45" y="310" font-size="9" fill="#1a3a6e">Sink bias: ✓ (add_swa_sink_bias=true)</text>

  <!-- GA branch -->
  <line x1="280" y1="178" x2="400" y2="210" stroke="#1a3a6e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="195" text-anchor="middle" font-size="9" fill="#1a3a6e">False (0)</text>

  <rect x="310" y="215" width="260" height="110" rx="2" fill="#f0f4ff" stroke="#1a3a6e" stroke-width="1.5"/>
  <text x="440" y="238" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a6e">GA 层 (9/48 = 19%)</text>
  <line x1="325" y1="248" x2="555" y2="248" stroke="#888" stroke-width="0.5"/>
  <text x="325" y="265" font-size="9" fill="#000">Q heads: 64 (num_attention_heads)</text>
  <text x="325" y="280" font-size="9" fill="#000">KV heads: 4 (num_key_value_heads)</text>
  <text x="325" y="295" font-size="9" fill="#000">Window: 全序列 (global)</text>
  <text x="325" y="310" font-size="9" fill="#888">Sink bias: ✗ (add_full_sink_bias=false)</text>

  <!-- RoPE theta switch -->
  <text x="610" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">双 Theta RoPE</text>

  <rect x="600" y="240" width="280" height="85" rx="2" fill="none" stroke="#b8721a" stroke-width="1"/>
  <text x="615" y="260" font-size="9" fill="#000">SWA: theta = 10,000</text>
  <text x="615" y="278" font-size="9" fill="#888">→ 128 窗口内高位置分辨率</text>
  <text x="615" y="296" font-size="9" fill="#000">GA:  theta = 5,000,000</text>
  <text x="615" y="314" font-size="9" fill="#888">→ 256K 范围位置不循环</text>

  <!-- Pattern visualization -->
  <text x="450" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">hybrid_layer_pattern 可视化 (48 层)</text>

  <rect x="20" y="378" width="860" height="50" rx="2" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>

  <!-- Block 0 -->
  <rect x="30" y="388" width="130" height="30" rx="2" fill="#1a3a6e" opacity="0.2" stroke="#1a3a6e" stroke-width="1"/>
  <text x="95" y="408" text-anchor="middle" font-size="8" fill="#1a3a6e">L0: GA (Dense)</text>

  <!-- Block 1-6 SWA -->
  <rect x="170" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="200" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="230" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="260" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="290" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>

  <!-- Block 1 L6 GA -->
  <rect x="320" y="388" width="27" height="30" rx="2" fill="#1a3a6e" opacity="0.15" stroke="#1a3a6e" stroke-width="1"/>

  <text x="360" y="408" text-anchor="middle" font-size="7" fill="#888">... ×7 more blocks ...</text>

  <!-- Last block SWA -->
  <rect x="500" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="530" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="560" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="590" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="620" y="388" width="27" height="30" rx="2" fill="#bbb" stroke="#000" stroke-width="0.5"/>
  <rect x="650" y="388" width="27" height="30" rx="2" fill="#1a3a6e" opacity="0.15" stroke="#1a3a6e" stroke-width="1"/>

  <text x="720" y="408" text-anchor="middle" font-size="8" fill="#888">L42-L47 (Block 8)</text>

  <!-- Legend -->
  <rect x="25" y="445" width="280" height="22" rx="2" fill="none" stroke="#888" stroke-width="0.5"/>
  <text x="50" y="460" font-size="8" fill="#1a3a6e">■ GA 层 (9层)</text>
  <text x="130" y="460" font-size="8" fill="#000">□ SWA 层 (39层)</text>
  <text x="230" y="460" font-size="8" fill="#888">[0,1,1,1,1,1] × 8</text>

  <!-- Layer count verification -->
  <text x="450" y="475" text-anchor="middle" font-size="9" fill="#888">代码验证: MiMoV2DecoderLayer.__init__ (L404-L414) | config.hybrid_layer_pattern | 8 blocks × 6 = 48 layers ✓</text>
</svg>